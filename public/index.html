<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no"/>
<title>WatchTogether — Sync Watch Party + Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --surface3: #22223a;
    --accent: #7c6cfc;
    --accent2: #fc6cbe;
    --text: #e8e8f0;
    --text2: #8888a8;
    --border: rgba(124,108,252,0.18);
    --glow: rgba(124,108,252,0.35);
    --danger: #fc4c4c;
    --success: #4cfc9c;
    --radius: 14px;
    --radius-sm: 8px;
    --overlay-bg: rgba(0, 0, 0, 0.85);
  }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
  }

  /* Landing - clean, no chat, just create/join */
  #landing {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    z-index: 100;
    padding: 24px;
    animation: fadeIn 0.6s ease;
  }
  .lbg { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
  .lbg::before { content:''; position:absolute; top:-40%; left:50%; transform:translateX(-50%); width:700px; height:700px; background:radial-gradient(circle,rgba(124,108,252,0.15) 0%,transparent 70%); }
  .lbg::after  { content:''; position:absolute; bottom:-30%; right:-10%; width:500px; height:500px; background:radial-gradient(circle,rgba(252,108,190,0.10) 0%,transparent 70%); }
  @keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  .logo { font-family:'Syne',sans-serif; font-size:clamp(2rem,6vw,3.5rem); font-weight:800; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:8px; letter-spacing:-1px; text-align:center; }
  .tagline { color:var(--text2); margin-bottom:32px; text-align:center; font-size:0.9rem; }
  .cards { display:grid; grid-template-columns:1fr 1fr; gap:20px; width:100%; max-width:600px; }
  @media(max-width:560px){ .cards { grid-template-columns:1fr; gap:16px; } }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:24px 20px; display:flex; flex-direction:column; gap:12px; }
  .card h3 { font-family:'Syne',sans-serif; font-size:1rem; }
  input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text); padding:10px 12px; font-size:0.9rem; outline:none; }
  input:focus { border-color:var(--accent); }
  .btn { padding:10px 16px; border:none; border-radius:var(--radius-sm); font-weight:600; cursor:pointer; transition:0.2s; font-family:'Syne',sans-serif; }
  .btn-primary { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; }
  .btn-primary:hover { transform:translateY(-2px); }
  .err { font-size:0.75rem; color:var(--danger); margin-top:4px; min-height:20px; }

  /* Main App */
  #app { display:none; height:100vh; flex-direction:column; background:var(--bg); overflow:hidden; }
  #app.on { display:flex; }
  .hdr { display:flex; align-items:center; justify-content:space-between; padding:8px 16px; background:var(--surface); border-bottom:1px solid var(--border); flex-wrap:wrap; gap:8px; flex-shrink:0; }
  .hlogo { font-family:'Syne',sans-serif; font-weight:800; font-size:1rem; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .rbadge { display:flex; align-items:center; gap:6px; background:var(--surface2); border-radius:40px; padding:4px 12px; font-size:0.8rem; }
  .rcode { font-family:'Syne',sans-serif; font-weight:700; letter-spacing:2px; color:var(--accent); }
  .copybtn { background:none; border:none; color:var(--text2); cursor:pointer; font-size:0.8rem; }
  .dot { width:8px; height:8px; border-radius:50%; background:var(--danger); box-shadow:0 0 6px var(--danger); }
  .dot.on { background:var(--success); }
  .hbadge { background:rgba(124,108,252,0.15); color:var(--accent); border-radius:40px; padding:2px 10px; font-size:0.7rem; font-weight:600; }
  .toggle-switch { width:32px; height:18px; background:#444; border-radius:30px; display:inline-block; position:relative; cursor:pointer; transition:0.2s; vertical-align:middle; }
  .toggle-switch.active { background:var(--accent); }
  .toggle-switch::after { content:''; width:14px; height:14px; background:white; border-radius:50%; position:absolute; top:2px; left:3px; transition:0.2s; }
  .toggle-switch.active::after { left:15px; }
  .message-toggle { display:flex; align-items:center; gap:6px; background:var(--surface2); padding:3px 10px; border-radius:30px; }

  /* Video area */
  .body { display:flex; flex:1; overflow:hidden; position:relative; }
  .vsec { flex:1; display:flex; flex-direction:column; min-width:0; }
  .mtabs { display:flex; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; }
  .mtab { flex:1; padding:8px; background:none; border:none; color:var(--text2); font-weight:600; cursor:pointer; border-bottom:2px solid transparent; }
  .mtab.on { color:var(--accent); border-bottom-color:var(--accent); }
  .vnotice { display:none; padding:6px 12px; background:rgba(124,108,252,0.08); font-size:0.75rem; color:var(--text2); }
  .vnotice.on { display:flex; }
  .hpanel { display:none; padding:8px 12px; background:var(--surface); gap:8px; flex-wrap:wrap; border-bottom:1px solid var(--border); }
  .hpanel.on { display:flex; }
  .ytwrap { display:flex; gap:8px; flex:1; min-width:160px; }
  .ssctrl { display:flex; gap:8px; }
  .sharebar { display:none; padding:6px 12px; background:rgba(76,252,156,0.1); color:var(--success); font-size:0.75rem; gap:8px; }
  .sharebar.on { display:flex; }

  .vcont { flex:1; position:relative; background:#000; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  #ytp { display:none; position:absolute; inset:0; width:100%; height:100%; }
  #ytp iframe { width:100% !important; height:100% !important; border:0; }
  #ssv { display:none; position:absolute; inset:0; width:100%; height:100%; object-fit:contain; background:#000; }
  #ssv.on { display:block; }
  .placeholder { text-align:center; color:var(--text2); padding:20px; }
  .vctrl { display:none; padding:8px 12px; background:var(--surface); gap:10px; align-items:center; flex-wrap:wrap; border-top:1px solid var(--border); flex-shrink:0; }
  .vctrl.on { display:flex; }
  .prog { flex:1; height:4px; background:var(--surface3); border-radius:4px; cursor:pointer; position:relative; }
  .progfill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:4px; width:0%; }
  .tlbl { font-size:0.7rem; font-family:monospace; }
  .fullscreen-btn { background:rgba(0,0,0,0.6); border:none; color:white; padding:4px 10px; border-radius:20px; font-size:11px; cursor:pointer; position:absolute; bottom:12px; right:12px; z-index:30; }

  /* FLOATING CHAT - works in fullscreen, mobile, desktop - perfectly positioned */
  .float-chat-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 52px;
    height: 52px;
    border-radius: 30px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    color: white;
    font-size: 1.6rem;
    cursor: pointer;
    z-index: 1000;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.2s;
  }
  .float-chat-btn:hover { transform: scale(1.05); }
  .float-chat-panel {
    position: fixed;
    bottom: 90px;
    right: 20px;
    width: 320px;
    max-width: calc(100vw - 40px);
    background: var(--surface);
    backdrop-filter: blur(16px);
    border-radius: 20px;
    border: 1px solid var(--border);
    box-shadow: 0 20px 35px rgba(0,0,0,0.5);
    z-index: 1000;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: 0.2s;
    opacity: 0;
    visibility: hidden;
    transform: translateY(20px);
    pointer-events: none;
    max-height: 60vh;
  }
  .float-chat-panel.open {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
    pointer-events: auto;
  }
  .float-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    font-weight: bold;
    font-size: 0.9rem;
  }
  .float-header button {
    background: none;
    border: none;
    color: var(--text2);
    font-size: 1rem;
    cursor: pointer;
  }
  .float-chat-msgs {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 40vh;
    min-height: 200px;
  }
  .float-chat-input {
    display: flex;
    gap: 8px;
    padding: 10px;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }
  .float-chat-input input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: white;
    padding: 8px 12px;
    border-radius: 30px;
    font-size: 0.85rem;
  }
  .float-chat-input button {
    background: var(--accent);
    border: none;
    border-radius: 30px;
    padding: 6px 16px;
    color: white;
    cursor: pointer;
    font-weight: 600;
  }
  .cmsg {
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 6px 10px;
    border: 1px solid var(--border);
  }
  .cmsg .sndr {
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--accent);
  }
  .cmsg .sndr.me { color: var(--accent2); }
  .cmsg .txt { font-size: 0.8rem; word-break: break-word; }

  /* MESSAGE OVERLAY - only from others, auto-dismiss, bottom left */
  .msg-overlay {
    position: fixed;
    bottom: 90px;
    left: 20px;
    right: auto;
    max-width: 340px;
    width: auto;
    z-index: 950;
    display: flex;
    flex-direction: column-reverse;
    gap: 8px;
    pointer-events: none;
  }
  .msg-toast {
    background: var(--overlay-bg);
    backdrop-filter: blur(12px);
    border-left: 4px solid var(--accent);
    border-radius: 12px;
    padding: 8px 14px;
    color: white;
    font-size: 0.85rem;
    box-shadow: 0 6px 16px rgba(0,0,0,0.3);
    animation: slideIn 0.25s ease;
    pointer-events: none;
  }
  .msg-toast strong { color: var(--accent2); }
  .msg-toast .preview { font-size: 0.8rem; opacity: 0.9; margin-top: 2px; }
  @keyframes slideIn { from { opacity:0; transform:translateX(-15px); } to { opacity:1; transform:translateX(0); } }
  .toast-fadeout { animation: fadeOut 0.4s forwards !important; }
  @keyframes fadeOut { to { opacity:0; transform:translateX(-10px); visibility:hidden; } }

  #toasts { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:2000; display:flex; flex-direction:column; gap:6px; pointer-events:none; }
  .toast { background:var(--surface2); border-radius:30px; padding:6px 16px; font-size:0.8rem; border:1px solid var(--border); }
</style>
</head>
<body>

<!-- LANDING - Clean, no chat, only create/join -->
<div id="landing">
  <div class="lbg"></div>
  <div class="logo">WatchTogether</div>
  <p class="tagline">Sync YouTube or Screen — Real-time chat + overlays</p>
  <div class="cards">
    <div class="card">
      <h3>🚀 Create Room</h3>
      <input type="text" id="cname" placeholder="Your name" maxlength="24"/>
      <button class="btn btn-primary" onclick="createRoom()">Create Room</button>
      <div class="err" id="cerr"></div>
    </div>
    <div class="card">
      <h3>🔗 Join Room</h3>
      <input type="text" id="jname" placeholder="Your name" maxlength="24"/>
      <input type="text" id="jcode" placeholder="Room code (e.g., A1B2C3)" maxlength="6" style="text-transform:uppercase"/>
      <button class="btn btn-primary" onclick="joinRoom()">Join Room</button>
      <div class="err" id="jerr"></div>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <header class="hdr">
    <div class="hlogo">▶ WatchTogether</div>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <div class="dot" id="dot"></div>
      <div class="rbadge"><span>Room:</span><span class="rcode" id="rdisplay">------</span><button class="copybtn" onclick="copyCode()">📋</button></div>
      <span class="hbadge" id="hbadge" style="display:none">HOST</span>
      <div class="message-toggle"><span>💬 Overlay</span><div id="msgToggleBtn" class="toggle-switch active" onclick="toggleMessageOverlay()"></div></div>
    </div>
    <button class="btn btn-secondary" onclick="leaveRoom()" style="padding:4px 12px;font-size:0.75rem">Leave</button>
  </header>

  <div class="body">
    <div class="vsec">
      <div class="mtabs" id="mtabs" style="display:none">
        <button class="mtab on" id="tab-yt" onclick="switchMode('youtube')">🎵 YouTube</button>
        <button class="mtab" id="tab-ss" onclick="switchMode('screenshare')">🖥️ Screen</button>
      </div>
      <div class="vnotice" id="vnotice">👁️ Viewing — host controls</div>
      <div class="hpanel" id="hpanel">
        <div class="ytwrap" id="ytctrl"><input type="text" id="yturl" placeholder="YouTube URL or ID"/><button class="btn btn-secondary" onclick="loadYT()">Load</button></div>
        <div class="ssctrl" id="ssctrl" style="display:none"><button class="btn btn-success" id="bss" onclick="startShare()">🎥 Share</button><button class="btn btn-danger" id="bss2" onclick="stopShare()" style="display:none">🛑 Stop</button></div>
      </div>
      <div class="sharebar" id="sharebar"><span class="blink">●</span><span>Screen sharing active</span></div>

      <div class="vcont" id="vcont">
        <div class="placeholder" id="ph"><div class="ico">🎬</div><p>Load video or start screen share</p></div>
        <div id="ytp"></div>
        <video id="ssv" autoplay playsinline></video>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Full</button>
      </div>

      <div class="vctrl" id="vctrl">
        <button class="cbtn" id="bpp" onclick="togglePlay()">▶</button>
        <div class="prog" id="prog" onclick="seekClick(event)"><div class="progfill" id="pf"></div></div>
        <span class="tlbl" id="tlbl">0:00 / 0:00</span>
        <input type="range" id="vol" min="0" max="100" value="80" oninput="setVol(this.value)" style="width:70px"/>
      </div>
    </div>
  </div>
</div>

<!-- FLOATING CHAT (works in fullscreen, mobile, desktop, safe area) -->
<button id="floatChatBtn" class="float-chat-btn">💬</button>
<div id="floatChatPanel" class="float-chat-panel">
  <div class="float-header"><span>💬 Room Chat</span><button onclick="closeFloatChat()">✕</button></div>
  <div id="floatChatMsgs" class="float-chat-msgs"></div>
  <div class="float-chat-input">
    <input type="text" id="floatChatInput" placeholder="Type a message..." maxlength="300" onkeydown="if(event.key==='Enter')sendFloatMsg()"/>
    <button onclick="sendFloatMsg()">Send</button>
  </div>
</div>

<!-- MESSAGE OVERLAY (only other users) -->
<div id="messageOverlay" class="msg-overlay"></div>
<div id="toasts"></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
  // ---------- GLOBALS ----------
  let socket = null, myId = '', myName = '', roomId = '', isHost = false, iceServers = [];
  let currentMode = 'youtube', ytPlayer = null, ytAPIReady = false, ytPlayerReady = false;
  let pendingSeek = null, isSyncing = false, progLoop = null;
  let peerConns = {}, localStream = null, isSharing = false;
  let messageOverlayEnabled = true;

  // ---------- OVERLAY TOGGLE ----------
  function toggleMessageOverlay() {
    messageOverlayEnabled = !messageOverlayEnabled;
    const toggle = document.getElementById('msgToggleBtn');
    if(messageOverlayEnabled) toggle.classList.add('active');
    else toggle.classList.remove('active');
    toast(`Overlay ${messageOverlayEnabled ? 'ON' : 'OFF'}`);
  }

  // Show overlay only for others (sender !== myId)
  function showMessageOverlay(senderName, fullMessage, senderId) {
    if(!messageOverlayEnabled) return;
    if(senderId === myId) return; // Do not show own messages
    let displayText = fullMessage;
    if(fullMessage.length > 48) displayText = fullMessage.substring(0, 45) + '...';
    const container = document.getElementById('messageOverlay');
    const el = document.createElement('div');
    el.className = 'msg-toast';
    el.innerHTML = `<strong>${escapeHtml(senderName)}</strong> <span>✧</span> <div class="preview">${escapeHtml(displayText)}</div>`;
    container.appendChild(el);
    setTimeout(() => {
      el.classList.add('toast-fadeout');
      setTimeout(() => el.remove(), 500);
    }, 4000);
  }

  // Floating chat helpers
  function appendFloatMessage(senderName, message, isMe) {
    const container = document.getElementById('floatChatMsgs');
    const div = document.createElement('div');
    div.className = 'cmsg';
    div.innerHTML = `<div class="sndr${isMe ? ' me' : ''}">${escapeHtml(senderName)}${isMe ? ' (you)' : ''}</div><div class="txt">${escapeHtml(message)}</div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    if(container.children.length > 100) container.removeChild(container.children[0]);
  }

  function sendFloatMsg() {
    const inp = document.getElementById('floatChatInput');
    const msg = inp.value.trim();
    if(!msg || !socket) return;
    socket.emit('chat:send', { message: msg });
    inp.value = '';
  }

  function closeFloatChat() {
    document.getElementById('floatChatPanel').classList.remove('open');
  }

  // ---------- YOUTUBE API ----------
  window.onYouTubeIframeAPIReady = function() {
    ytAPIReady = true;
    if(window._pendingVid) { _mkPlayer(window._pendingVid); window._pendingVid = null; }
  };
  function _mkPlayer(videoId) {
    if(ytPlayer) try{ ytPlayer.destroy(); }catch(e){}
    ytPlayerReady = false;
    let div = document.getElementById('ytp');
    if(!div) { div = document.createElement('div'); div.id='ytp'; document.getElementById('vcont').appendChild(div); }
    div.style.cssText = 'display:block;position:absolute;inset:0;width:100%;height:100%;';
    ytPlayer = new YT.Player('ytp', {
      videoId, width:'100%', height:'100%',
      playerVars: { autoplay:1, controls:0, rel:0, modestbranding:1, iv_load_policy:3, disablekb:1, playsinline:1 },
      events: { onReady: _ytReady, onStateChange: _ytState, onError: () => toast('YT error','err') }
    });
  }
  function _ytReady(e) {
    ytPlayerReady = true;
    setVol(document.getElementById('vol').value);
    if(pendingSeek) {
      let { currentTime, playing } = pendingSeek;
      pendingSeek = null;
      isSyncing = true;
      e.target.seekTo(currentTime, true);
      playing ? e.target.playVideo() : e.target.pauseVideo();
      setTimeout(() => isSyncing = false, 1200);
    }
    _startLoop();
  }
  function _ytState(e) {
    if(isSyncing || !isHost) return;
    if(e.data === YT.PlayerState.PLAYING) {
      document.getElementById('bpp').textContent = '⏸';
      socket.emit('playback:update', { playing: true, currentTime: ytPlayer.getCurrentTime() });
    } else if(e.data === YT.PlayerState.PAUSED) {
      document.getElementById('bpp').textContent = '▶';
      socket.emit('playback:update', { playing: false, currentTime: ytPlayer.getCurrentTime() });
    }
  }

  // ---------- SOCKET INIT ----------
  function initSocket() {
    socket = io({ transports: ['websocket','polling'] });
    socket.on('connect', () => { myId = socket.id; document.getElementById('dot').classList.add('on'); });
    socket.on('disconnect', () => { document.getElementById('dot').classList.remove('on'); toast('Disconnected','err'); });
    socket.on('room:members', () => {});
    socket.on('room:user-joined', ({ id }) => { if(isSharing && localStream) setTimeout(() => _mkSenderPeer(id), 600); });
    socket.on('room:user-left', ({ id }) => { if(peerConns[id]) { peerConns[id].close(); delete peerConns[id]; } });
    socket.on('room:promoted-host', () => { isHost = true; _showHostUI(); toast('You are host now'); });
    
    socket.on('chat:message', (msg) => {
      appendFloatMessage(msg.senderName, msg.message, msg.senderId === myId);
      showMessageOverlay(msg.senderName, msg.message, msg.senderId);
    });
    
    socket.on('youtube:load', ({ videoId }) => { if(!isHost) { currentMode='youtube'; _showYT(); _loadVid(videoId, null); } });
    socket.on('playback:update', ({ playing, currentTime }) => {
      if(!isHost && ytPlayer && ytPlayerReady) {
        isSyncing = true;
        ytPlayer.seekTo(currentTime, true);
        playing ? ytPlayer.playVideo() : ytPlayer.pauseVideo();
        document.getElementById('bpp').textContent = playing ? '⏸' : '▶';
        setTimeout(() => isSyncing = false, 1000);
      }
    });
    socket.on('playback:time', ({ currentTime, playing }) => {
      if(!isHost && ytPlayer && ytPlayerReady) {
        let myTime = ytPlayer.getCurrentTime();
        if(Math.abs(myTime - currentTime) > 1.2) {
          isSyncing = true;
          ytPlayer.seekTo(currentTime, true);
          setTimeout(() => isSyncing = false, 800);
        }
        let playingState = ytPlayer.getPlayerState() === YT.PlayerState.PLAYING;
        if(playing && !playingState) { ytPlayer.playVideo(); }
        if(!playing && playingState) { ytPlayer.pauseVideo(); }
      }
    });
    socket.on('webrtc:offer', async ({ from, offer }) => { await _handleOffer(from, offer); });
    socket.on('webrtc:answer', async ({ from, answer }) => { if(peerConns[from]) await peerConns[from].setRemoteDescription(new RTCSessionDescription(answer)); });
    socket.on('webrtc:ice', async ({ from, candidate }) => { if(peerConns[from] && candidate) await peerConns[from].addIceCandidate(new RTCIceCandidate(candidate)); });
    socket.on('webrtc:viewer-ready', async ({ from }) => { if(isSharing && localStream) await _mkSenderPeer(from); });
    socket.on('screenshare:active', ({ sharerId }) => {
      if(sharerId === myId) return;
      currentMode = 'screenshare'; _showSS();
      document.getElementById('sharebar').classList.add('on');
      socket.emit('webrtc:viewer-ready', { to: sharerId });
    });
    socket.on('screenshare:stopped', () => {
      let vid = document.getElementById('ssv'); vid.srcObject = null; vid.classList.remove('on');
      document.getElementById('sharebar').classList.remove('on');
      document.getElementById('ph').style.display = 'flex';
      document.getElementById('vctrl').classList.remove('on');
      Object.values(peerConns).forEach(p => p.close()); peerConns = {};
    });
  }

  // room methods
  function createRoom() {
    let name = document.getElementById('cname').value.trim();
    if(!name) { document.getElementById('cerr').innerText = 'Enter name'; return; }
    if(!socket) initSocket();
    socket.emit('room:create', { name }, (res) => {
      if(!res.success) { document.getElementById('cerr').innerText = res.error; return; }
      myName = name; roomId = res.roomId; isHost = true; iceServers = res.iceServers || [];
      _enter();
    });
  }
  function joinRoom() {
    let name = document.getElementById('jname').value.trim();
    let code = document.getElementById('jcode').value.trim().toUpperCase();
    if(!name) { document.getElementById('jerr').innerText = 'Enter name'; return; }
    if(code.length !== 6) { document.getElementById('jerr').innerText = 'Invalid room code'; return; }
    if(!socket) initSocket();
    socket.emit('room:join', { name, roomId: code }, (res) => {
      if(!res.success) { document.getElementById('jerr').innerText = res.error; return; }
      myName = name; roomId = res.roomId; isHost = false; iceServers = res.iceServers || [];
      _enter(res.playback);
    });
  }
  function _enter(pb) {
    document.getElementById('landing').style.display = 'none';
    document.getElementById('app').classList.add('on');
    document.getElementById('rdisplay').innerText = roomId;
    if(isHost) _showHostUI();
    else {
      document.getElementById('vnotice').classList.add('on');
      if(pb && pb.mode === 'youtube' && pb.src) {
        _showYT();
        let elapsed = pb.playing ? (Date.now() - pb.lastSyncAt)/1000 : 0;
        pendingSeek = { currentTime: pb.currentTime + elapsed, playing: pb.playing };
        _loadVid(pb.src, pendingSeek);
      }
    }
  }
  function _showHostUI() {
    document.getElementById('hbadge').style.display = 'inline-block';
    document.getElementById('mtabs').style.display = 'flex';
    document.getElementById('hpanel').classList.add('on');
    document.getElementById('vnotice').classList.remove('on');
  }
  function switchMode(m) { currentMode = m; document.getElementById('tab-yt').classList.toggle('on', m==='youtube'); document.getElementById('tab-ss').classList.toggle('on', m==='screenshare'); document.getElementById('ytctrl').style.display = m==='youtube' ? 'flex' : 'none'; document.getElementById('ssctrl').style.display = m==='screenshare' ? 'flex' : 'none'; if(m==='screenshare') { document.getElementById('ytp').style.display='none'; document.getElementById('ph').style.display='flex'; document.getElementById('vctrl').classList.remove('on'); } if(m==='youtube' && ytPlayerReady) _showYT(); }
  function loadYT() { let val = document.getElementById('yturl').value.trim(); let id = _ytId(val); if(!id) { toast('Invalid URL','err'); return; } _showYT(); _loadVid(id, null); socket.emit('youtube:load', { videoId: id }); }
  function _ytId(url) { if(/^[a-zA-Z0-9_-]{11}$/.test(url)) return url; let m = url.match(/(?:v=|youtu\.be\/|embed\/|shorts\/)([a-zA-Z0-9_-]{11})/); return m ? m[1] : null; }
  function _showYT() { document.getElementById('ph').style.display='none'; document.getElementById('ssv').classList.remove('on'); document.getElementById('ytp').style.display='block'; document.getElementById('vctrl').classList.add('on'); }
  function _showSS() { document.getElementById('ph').style.display='none'; document.getElementById('ytp').style.display='none'; document.getElementById('ssv').classList.add('on'); document.getElementById('vctrl').classList.remove('on'); }
  function _loadVid(videoId, seek) { if(seek) pendingSeek = seek; if(!ytAPIReady) { window._pendingVid = videoId; return; } if(!ytPlayer || !ytPlayerReady) { _mkPlayer(videoId); return; } let curId = ytPlayer.getVideoData?.().video_id; if(curId === videoId) { if(pendingSeek) { let { currentTime, playing } = pendingSeek; pendingSeek = null; isSyncing=true; ytPlayer.seekTo(currentTime,true); playing?ytPlayer.playVideo():ytPlayer.pauseVideo(); setTimeout(()=>isSyncing=false,1200); } } else { ytPlayer.loadVideoById({ videoId, startSeconds: pendingSeek ? pendingSeek.currentTime : 0 }); pendingSeek = null; } }
  function _startLoop() { if(progLoop) clearInterval(progLoop); progLoop = setInterval(() => { if(!ytPlayer||!ytPlayerReady) return; let cur = ytPlayer.getCurrentTime()||0, dur = ytPlayer.getDuration()||0; document.getElementById('pf').style.width = (dur ? (cur/dur)*100 : 0)+'%'; document.getElementById('tlbl').innerText = `${_fmt(cur)} / ${_fmt(dur)}`; document.getElementById('bpp').textContent = ytPlayer.getPlayerState()===YT.PlayerState.PLAYING?'⏸':'▶'; if(isHost) socket.emit('playback:time', { currentTime: cur, playing: ytPlayer.getPlayerState()===YT.PlayerState.PLAYING, sentAt: Date.now() }); }, 500); }
  function _fmt(s) { s = Math.floor(s||0); return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }
  function togglePlay() { if(!ytPlayer||!ytPlayerReady||!isHost) { toast('Only host can control'); return; } ytPlayer.getPlayerState()===YT.PlayerState.PLAYING ? ytPlayer.pauseVideo() : ytPlayer.playVideo(); }
  function seekClick(e) { if(!ytPlayer||!ytPlayerReady||!isHost) return; let rect = document.getElementById('prog').getBoundingClientRect(); let t = ((e.clientX - rect.left)/rect.width) * (ytPlayer.getDuration()||0); isSyncing=true; ytPlayer.seekTo(t,true); setTimeout(()=>isSyncing=false,600); socket.emit('playback:update', { playing: ytPlayer.getPlayerState()===YT.PlayerState.PLAYING, currentTime: t }); }
  function setVol(v) { if(ytPlayer && ytPlayerReady) ytPlayer.setVolume(+v); let vid = document.getElementById('ssv'); if(vid) vid.volume = v/100; }
  async function startShare() { try { let stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true }); localStream = stream; isSharing = true; _showSS(); document.getElementById('ssv').srcObject = stream; document.getElementById('bss').style.display='none'; document.getElementById('bss2').style.display=''; document.getElementById('sharebar').classList.add('on'); stream.getVideoTracks()[0].addEventListener('ended', stopShare); socket.emit('screenshare:start'); } catch(e) { toast('Share failed','err'); } }
  function stopShare() { if(localStream) { localStream.getTracks().forEach(t=>t.stop()); localStream=null; } isSharing=false; document.getElementById('ssv').srcObject=null; document.getElementById('bss').style.display=''; document.getElementById('bss2').style.display='none'; document.getElementById('sharebar').classList.remove('on'); document.getElementById('ph').style.display='flex'; socket.emit('screenshare:stop'); Object.values(peerConns).forEach(p=>p.close()); peerConns={}; }
  async function _mkSenderPeer(peerId) { if(peerConns[peerId]) peerConns[peerId].close(); const pc = new RTCPeerConnection({ iceServers }); peerConns[peerId] = pc; if(localStream) localStream.getTracks().forEach(t => pc.addTrack(t, localStream)); pc.onicecandidate = e => { if(e.candidate) socket.emit('webrtc:ice', { to: peerId, candidate: e.candidate }); }; const offer = await pc.createOffer(); await pc.setLocalDescription(offer); socket.emit('webrtc:offer', { to: peerId, offer }); }
  async function _handleOffer(fromId, offer) { if(peerConns[fromId]) peerConns[fromId].close(); const pc = new RTCPeerConnection({ iceServers }); peerConns[fromId] = pc; pc.onicecandidate = e => { if(e.candidate) socket.emit('webrtc:ice', { to: fromId, candidate: e.candidate }); }; pc.ontrack = e => { let vid = document.getElementById('ssv'); vid.srcObject = e.streams[0]; vid.classList.add('on'); _showSS(); vid.play().catch(()=>{}); }; await pc.setRemoteDescription(new RTCSessionDescription(offer)); const answer = await pc.createAnswer(); await pc.setLocalDescription(answer); socket.emit('webrtc:answer', { to: fromId, answer }); }
  function copyCode() { navigator.clipboard?.writeText(roomId); toast('Code copied'); }
  function leaveRoom() { if(isSharing) stopShare(); if(progLoop) clearInterval(progLoop); if(socket) socket.disconnect(); location.reload(); }
  function toast(msg, type='') { let t = document.createElement('div'); t.className = 'toast'; t.innerText = msg; document.getElementById('toasts').appendChild(t); setTimeout(() => t.remove(), 2500); }
  function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function toggleFullscreen() { let el = document.getElementById('vcont'); if(!document.fullscreenElement) el.requestFullscreen().catch(e=>toast('FS error')); else document.exitFullscreen(); }
  
  document.getElementById('floatChatBtn').addEventListener('click', () => { document.getElementById('floatChatPanel').classList.toggle('open'); });
  document.getElementById('cname').addEventListener('keydown', e => { if(e.key === 'Enter') createRoom(); });
  document.getElementById('jname').addEventListener('keydown', e => { if(e.key === 'Enter') joinRoom(); });
  document.getElementById('jcode').addEventListener('keydown', e => { if(e.key === 'Enter') joinRoom(); });
</script>
</body>
