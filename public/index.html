<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"/>
<title>Watch Party - YouTube & Amazon Mini TV</title>
<script src="https://www.youtube.com/iframe_api"></script>
<script src="/socket.io/socket.io.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --accent: #7c3aed;
    --accent2: #a855f7;
    --text: #f0eeff;
    --muted: #8884a8;
    --border: rgba(255,255,255,0.07);
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
  }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    height: 100vh;
  }
  
  /* Lobby */
  #lobby {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(124,58,237,0.15), var(--bg));
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px;
    width: 420px;
    max-width: 100%;
    animation: slideUp 0.4s ease;
  }
  
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  .logo {
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(135deg, #a78bfa, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  
  .sub {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 32px;
  }
  
  .tabs {
    display: flex;
    gap: 8px;
    background: rgba(255,255,255,0.05);
    padding: 4px;
    border-radius: 12px;
    margin-bottom: 24px;
  }
  
  .tab {
    flex: 1;
    padding: 10px;
    background: transparent;
    border: none;
    color: var(--muted);
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
  }
  
  .tab.active {
    background: var(--accent);
    color: white;
  }
  
  .field {
    margin-bottom: 16px;
  }
  
  .field label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  
  .field input {
    width: 100%;
    padding: 12px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 14px;
    outline: none;
  }
  
  .field input:focus {
    border-color: var(--accent);
  }
  
  .btn {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    color: white;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: 0.2s;
  }
  
  .btn:hover {
    background: var(--accent2);
    transform: translateY(-1px);
  }
  
  .err {
    color: var(--danger);
    font-size: 12px;
    margin-top: 12px;
    text-align: center;
  }
  
  /* App */
  #app {
    display: none;
    height: 100vh;
    flex-direction: column;
  }
  
  #app.active {
    display: flex;
  }
  
  .topbar {
    height: 56px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    flex-shrink: 0;
  }
  
  .topbar-left {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  
  .room-info {
    background: rgba(255,255,255,0.05);
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  
  .copy-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
  }
  
  .host-badge {
    background: var(--accent);
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
  }
  
  .sync-status {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  
  .sync-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--success);
    animation: pulse 2s infinite;
  }
  
  .sync-dot.warning {
    background: var(--warning);
  }
  
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  
  .member-count {
    font-size: 12px;
    color: var(--muted);
  }
  
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }
  
  .video-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #000;
    min-width: 0;
  }
  
  .url-bar {
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  
  .url-bar input {
    flex: 1;
    padding: 10px 14px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 13px;
    min-width: 180px;
  }
  
  .url-bar button {
    padding: 10px 20px;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
  }
  
  .url-bar button:hover {
    background: var(--accent2);
  }
  
  .detected-platform {
    padding: 8px 16px;
    background: var(--sur2);
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }
  
  .platform-badge {
    background: var(--accent);
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 10px;
    color: white;
  }
  
  .platform-badge.warning {
    background: var(--warning);
  }
  
  .player-container {
    flex: 1;
    position: relative;
    background: #000;
  }
  
  .player-wrapper {
    width: 100%;
    height: 100%;
  }
  
  iframe, #youtube-player {
    width: 100%;
    height: 100%;
    border: none;
  }
  
  .placeholder {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: var(--muted);
    z-index: 10;
    background: #000;
    padding: 20px;
    border-radius: 16px;
    pointer-events: none;
  }
  
  .amazon-instructions {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--surface);
    padding: 24px;
    border-radius: 16px;
    text-align: center;
    max-width: 90%;
    z-index: 20;
    border: 1px solid var(--border);
  }
  
  .amazon-instructions h3 {
    margin-bottom: 16px;
    color: var(--warning);
  }
  
  .amazon-instructions p {
    margin-bottom: 12px;
    font-size: 14px;
  }
  
  .amazon-instructions button {
    margin-top: 16px;
    padding: 10px 20px;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    color: white;
    cursor: pointer;
  }
  
  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  
  .control-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: 0.2s;
  }
  
  .control-btn:hover:not(:disabled) {
    background: var(--accent);
    border-color: var(--accent);
  }
  
  .control-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  
  .sidebar {
    width: 280px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  
  .members-section {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    max-height: 200px;
    overflow-y: auto;
  }
  
  .section-title {
    font-size: 11px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    font-weight: 600;
  }
  
  .member-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  
  .member-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    padding: 5px 8px;
    border-radius: 8px;
  }
  
  .member-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 12px;
  }
  
  .member-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  
  .host-tag {
    font-size: 9px;
    background: var(--accent);
    padding: 2px 6px;
    border-radius: 10px;
  }
  
  .chat-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  
  .message {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  
  .message.system {
    align-items: center;
  }
  
  .system-text {
    font-size: 11px;
    background: rgba(255,255,255,0.05);
    padding: 4px 12px;
    border-radius: 20px;
    color: var(--muted);
  }
  
  .message-header {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
  }
  
  .message-name {
    font-weight: 600;
  }
  
  .message-time {
    color: var(--muted);
    font-size: 10px;
  }
  
  .message-bubble {
    background: rgba(255,255,255,0.05);
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 13px;
    max-width: 220px;
    word-wrap: break-word;
  }
  
  .message.mine {
    align-items: flex-end;
  }
  
  .message.mine .message-bubble {
    background: var(--accent);
  }
  
  .chat-input {
    display: flex;
    gap: 8px;
    padding: 12px;
    border-top: 1px solid var(--border);
  }
  
  .chat-input input {
    flex: 1;
    padding: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 24px;
    color: var(--text);
    outline: none;
    font-size: 13px;
  }
  
  .chat-input button {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    color: white;
    cursor: pointer;
  }
  
  #toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--sur2);
    padding: 10px 20px;
    border-radius: 24px;
    font-size: 13px;
    z-index: 1000;
    opacity: 0;
    transition: 0.2s;
    pointer-events: none;
    text-align: center;
    white-space: nowrap;
  }
  
  #toast.show {
    opacity: 1;
  }
  
  @media (max-width: 768px) {
    .sidebar {
      position: fixed;
      right: -100%;
      top: 56px;
      bottom: 0;
      width: 85%;
      max-width: 300px;
      z-index: 20;
      transition: right 0.3s ease;
    }
    
    .sidebar.open {
      right: 0;
    }
    
    .chat-toggle {
      display: flex;
      position: fixed;
      bottom: 20px;
      right: 16px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: white;
      font-size: 20px;
      cursor: pointer;
      z-index: 15;
      align-items: center;
      justify-content: center;
    }
    
    .url-bar {
      flex-direction: column;
    }
  }
  
  @media (min-width: 769px) {
    .chat-toggle {
      display: none;
    }
  }
</style>
</head>
<body>

<div id="lobby">
  <div class="card">
    <div class="logo">🎬 Watch Party</div>
    <p class="sub">Watch YouTube & Amazon Mini TV together!</p>
    <div class="tabs">
      <button class="tab active" id="tabCreate">Create Room</button>
      <button class="tab" id="tabJoin">Join Room</button>
    </div>
    <div id="createForm">
      <div class="field">
        <label>Your Name</label>
        <input type="text" id="createName" placeholder="Enter your name" maxlength="24">
      </div>
      <button class="btn" id="createRoomBtn">🚀 Create Room</button>
    </div>
    <div id="joinForm" style="display: none;">
      <div class="field">
        <label>Your Name</label>
        <input type="text" id="joinName" placeholder="Enter your name" maxlength="24">
      </div>
      <div class="field">
        <label>Room Code</label>
        <input type="text" id="joinCode" placeholder="Enter room code" maxlength="6" style="text-transform: uppercase;">
      </div>
      <button class="btn" id="joinRoomBtn">🔗 Join Room</button>
    </div>
    <div class="err" id="lobbyError"></div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <span class="app-logo">🎬 Watch Party</span>
      <div class="room-info">
        <span>Room: <strong id="roomCode">------</strong></span>
        <button class="copy-btn" id="copyRoomCode">📋</button>
      </div>
      <span class="host-badge" id="hostBadge" style="display: none;">HOST</span>
      <div class="sync-status">
        <div class="sync-dot" id="syncDot"></div>
        <span id="syncText">Ready</span>
      </div>
    </div>
    <span class="member-count" id="memberCount">0 members</span>
  </div>
  
  <div class="main">
    <div class="video-panel">
      <div class="url-bar" id="hostControls">
        <input type="text" id="videoUrl" placeholder="Paste YouTube or Amazon Mini TV URL">
        <button id="loadVideoBtn">🎬 Load Video</button>
      </div>
      <div class="url-bar" id="guestControls" style="display: none;">
        <span style="color: var(--muted);">⏳ Waiting for host to load a video...</span>
      </div>
      
      <div class="detected-platform" id="detectedPlatform" style="display: none;">
        <span>🔍 Detected:</span>
        <span class="platform-badge" id="platformName">-</span>
        <span id="syncWarning" style="display: none; color: #f59e0b;">⚠️ Manual sync only</span>
      </div>
      
      <div class="player-container" id="playerContainer">
        <div class="player-wrapper" id="playerWrapper">
          <iframe id="videoFrame" style="width:100%; height:100%; display:none;"></iframe>
          <div id="youtube-player"></div>
        </div>
        <div class="placeholder" id="placeholder">
          <div style="font-size: 48px; margin-bottom: 12px;">🎬</div>
          <p>No video loaded</p>
          <p style="font-size: 12px; margin-top: 8px;">Host: Paste any YouTube or Amazon Mini TV URL</p>
        </div>
      </div>
      
      <div class="controls">
        <button class="control-btn" id="playPauseBtn" disabled>▶</button>
        <button class="control-btn" id="syncBtn" style="display: none;" title="Sync with host">🔄</button>
        <span class="time" id="timeDisplay">0:00</span>
      </div>
    </div>
    
    <div class="sidebar" id="sidebar">
      <div class="members-section">
        <div class="section-title">👥 Members</div>
        <div class="member-list" id="membersList"></div>
      </div>
      <div class="chat-section">
        <div class="section-title" style="padding: 0 12px;">💬 Chat</div>
        <div class="messages" id="messages"></div>
        <div class="chat-input">
          <input type="text" id="chatMessage" placeholder="Say something..." maxlength="300">
          <button id="sendBtn">➤</button>
        </div>
      </div>
    </div>
  </div>
</div>

<button class="chat-toggle" id="chatToggleBtn" style="display: none;">💬</button>
<div id="toast"></div>

<script>
let socket, myId, myName, roomId, isHost = false;
let currentPlatform = null, currentVideoId = null;
let youtubePlayer = null;
let isSyncing = false;
let lastHostTime = 0;

function showToast(msg, duration = 3000) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), duration);
}

function formatTime(seconds) {
  if (!seconds || isNaN(seconds)) return '0:00';
  const mins = Math.floor(seconds / 60);
  const secs = Math.floor(seconds % 60);
  return `${mins}:${secs.toString().padStart(2, '0')}`;
}

function detectPlatform(url) {
  const urlLower = url.toLowerCase();
  
  // YouTube
  if (urlLower.includes('youtube.com') || urlLower.includes('youtu.be')) {
    let videoId = null;
    let match = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^?&]+)/);
    if (match) videoId = match[1];
    match = url.match(/[?&]v=([^&]+)/);
    if (match && !videoId) videoId = match[1];
    
    if (videoId) {
      return { platform: 'youtube', videoId: videoId, syncable: true };
    }
  }
  
  // Amazon Mini TV
  if (urlLower.includes('amazon') && (urlLower.includes('/minitv') || urlLower.includes('mini-tv') || urlLower.includes('amazon.in/minitv'))) {
    return { platform: 'amazon-mini-tv', url: url, syncable: false };
  }
  
  return null;
}

function initYouTubePlayer(videoId) {
  return new Promise((resolve) => {
    if (typeof YT !== 'undefined' && YT.Player) {
      if (youtubePlayer) {
        youtubePlayer.loadVideoById(videoId);
        resolve(youtubePlayer);
      } else {
        youtubePlayer = new YT.Player('youtube-player', {
          height: '100%',
          width: '100%',
          videoId: videoId,
          playerVars: {
            controls: 1,
            modestbranding: 1,
            rel: 0,
            origin: window.location.origin
          },
          events: {
            onReady: () => resolve(youtubePlayer),
            onStateChange: onPlayerStateChange
          }
        });
      }
    } else {
      setTimeout(() => initYouTubePlayer(videoId).then(resolve), 500);
    }
  });
}

function onPlayerStateChange(event) {
  if (!isHost && isSyncing) return;
  
  if (event.data === YT.PlayerState.PLAYING) {
    if (isHost) {
      socket.emit('play_video', { currentTime: youtubePlayer.getCurrentTime() });
    }
    document.getElementById('syncText').textContent = 'Playing';
    document.getElementById('playPauseBtn').textContent = '⏸';
  } else if (event.data === YT.PlayerState.PAUSED) {
    if (isHost) {
      socket.emit('pause_video', { currentTime: youtubePlayer.getCurrentTime() });
    }
    document.getElementById('syncText').textContent = 'Paused';
    document.getElementById('playPauseBtn').textContent = '▶';
  }
  
  updateTimeDisplay();
}

function updateTimeDisplay() {
  if (youtubePlayer && youtubePlayer.getCurrentTime) {
    const current = youtubePlayer.getCurrentTime();
    const duration = youtubePlayer.getDuration();
    document.getElementById('timeDisplay').textContent = `${formatTime(current)} / ${formatTime(duration)}`;
  }
}

function renderAmazonMiniTV(url) {
  const placeholder = document.getElementById('placeholder');
  const iframe = document.getElementById('videoFrame');
  const youtubeDiv = document.getElementById('youtube-player');
  
  iframe.style.display = 'none';
  youtubeDiv.style.display = 'none';
  placeholder.innerHTML = `
    <div class="amazon-instructions">
      <h3>📺 Amazon Mini TV</h3>
      <p>Due to DRM protection, everyone needs to open the link manually:</p>
      <p><strong>${url}</strong></p>
      <p style="font-size: 12px; color: #f59e0b;">⚠️ Use chat to sync playback manually!</p>
      <button onclick="window.open('${url}', '_blank')">Open Amazon Mini TV</button>
      <button onclick="document.getElementById('placeholder').style.display='none'" style="margin-left: 10px;">Close</button>
    </div>
  `;
  placeholder.style.display = 'flex';
  
  // Show sync button for manual sync
  document.getElementById('syncBtn').style.display = 'flex';
  document.getElementById('syncDot').classList.add('warning');
  document.getElementById('syncText').textContent = 'Manual sync only';
}

function renderYouTube(videoId) {
  const placeholder = document.getElementById('placeholder');
  const iframe = document.getElementById('videoFrame');
  const youtubeDiv = document.getElementById('youtube-player');
  
  iframe.style.display = 'none';
  youtubeDiv.style.display = 'block';
  placeholder.style.display = 'none';
  
  initYouTubePlayer(videoId).then(() => {
    showToast('✅ YouTube video loaded!');
    document.getElementById('syncBtn').style.display = 'none';
    document.getElementById('syncDot').classList.remove('warning');
  });
}

// Socket event handlers
function initSocket(name, callback) {
  socket = io();
  
  socket.on('connect', () => {
    myId = socket.id;
    myName = name;
    callback();
  });
  
  socket.on('room_update', (info) => updateRoomUI(info));
  
  socket.on('you_are_host', () => {
    isHost = true;
    updateUI();
    showToast('👑 You are now the host!');
  });
  
  socket.on('video_loaded', ({ videoUrl, videoPlatform, syncable }) => {
    if (videoPlatform === 'youtube' && videoUrl) {
      const videoId = videoUrl.match(/embed\/([^?]+)/)[1];
      renderYouTube(videoId);
      currentPlatform = 'youtube';
      currentVideoId = videoId;
    } else if (videoPlatform === 'amazon-mini-tv') {
      renderAmazonMiniTV(videoUrl);
      currentPlatform = 'amazon-mini-tv';
    }
  });
  
  socket.on('video_play', ({ currentTime }) => {
    if (!isHost && youtubePlayer && currentPlatform === 'youtube') {
      isSyncing = true;
      youtubePlayer.seekTo(currentTime, true);
      youtubePlayer.playVideo();
      setTimeout(() => { isSyncing = false; }, 1000);
      showToast('▶️ Host started playing', 1000);
    }
  });
  
  socket.on('video_pause', ({ currentTime }) => {
    if (!isHost && youtubePlayer && currentPlatform === 'youtube') {
      isSyncing = true;
      youtubePlayer.pauseVideo();
      setTimeout(() => { isSyncing = false; }, 1000);
      showToast('⏸️ Host paused', 1000);
    }
  });
  
  socket.on('video_seek', ({ currentTime }) => {
    if (!isHost && youtubePlayer && currentPlatform === 'youtube') {
      isSyncing = true;
      youtubePlayer.seekTo(currentTime, true);
      setTimeout(() => { isSyncing = false; }, 1000);
      showToast(`⏩ Seek to ${formatTime(currentTime)}`, 1000);
    }
  });
  
  socket.on('chat_message', (msg) => addChatMessage(msg));
}

function updateUI() {
  const hostControls = document.getElementById('hostControls');
  const guestControls = document.getElementById('guestControls');
  const hostBadge = document.getElementById('hostBadge');
  const playPauseBtn = document.getElementById('playPauseBtn');
  
  if (isHost) {
    hostControls.style.display = 'flex';
    guestControls.style.display = 'none';
    hostBadge.style.display = 'inline-block';
    playPauseBtn.disabled = false;
  } else {
    hostControls.style.display = 'none';
    guestControls.style.display = 'flex';
    hostBadge.style.display = 'none';
    playPauseBtn.disabled = true;
  }
}

function updateRoomUI(info) {
  document.getElementById('memberCount').textContent = `${info.members.length} members`;
  const membersList = document.getElementById('membersList');
  membersList.innerHTML = '';
  
  info.members.forEach(m => {
    const div = document.createElement('div');
    div.className = 'member-item';
    
    const avatar = document.createElement('div');
    avatar.className = 'member-avatar';
    avatar.style.background = m.color + '33';
    avatar.style.color = m.color;
    avatar.textContent = m.name[0].toUpperCase();
    
    const nameSpan = document.createElement('span');
    nameSpan.className = 'member-name';
    nameSpan.textContent = m.name;
    
    div.appendChild(avatar);
    div.appendChild(nameSpan);
    
    if (m.id === info.host) {
      const tag = document.createElement('span');
      tag.className = 'host-tag';
      tag.textContent = 'HOST';
      div.appendChild(tag);
    }
    
    membersList.appendChild(div);
  });
}

function addChatMessage(msg) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message';
  
  if (msg.system) {
    div.classList.add('system');
    const sysText = document.createElement('div');
    sysText.className = 'system-text';
    sysText.textContent = msg.text;
    div.appendChild(sysText);
  } else {
    const mine = msg.senderId === myId;
    if (mine) div.classList.add('mine');
    
    const header = document.createElement('div');
    header.className = 'message-header';
    const name = document.createElement('span');
    name.className = 'message-name';
    name.style.color = msg.color;
    name.textContent = mine ? 'You' : msg.name;
    const time = document.createElement('span');
    time.className = 'message-time';
    time.textContent = new Date(msg.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    header.appendChild(name);
    header.appendChild(time);
    
    const bubble = document.createElement('div');
    bubble.className = 'message-bubble';
    bubble.textContent = msg.text;
    
    div.appendChild(header);
    div.appendChild(bubble);
  }
  
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function createRoom() {
  const name = document.getElementById('createName').value.trim();
  if (!name) {
    showError('Enter your name');
    return;
  }
  
  initSocket(name, () => {
    socket.emit('create_room', { name }, (res) => {
      if (!res.ok) {
        showError(res.error);
        return;
      }
      isHost = true;
      roomId = res.roomId;
      enterApp(res.info);
    });
  });
}

function joinRoom() {
  const name = document.getElementById('joinName').value.trim();
  const code = document.getElementById('joinCode').value.trim().toUpperCase();
  
  if (!name || !code) {
    showError('Enter name and room code');
    return;
  }
  
  initSocket(name, () => {
    socket.emit('join_room', { roomId: code, name }, (res) => {
      if (!res.ok) {
        showError(res.error);
        return;
      }
      isHost = false;
      roomId = res.roomId;
      enterApp(res.info);
    });
  });
}

function showError(msg) {
  document.getElementById('lobbyError').textContent = msg;
}

function enterApp(info) {
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('app').classList.add('active');
  document.getElementById('roomCode').textContent = roomId;
  updateRoomUI(info);
  updateUI();
  
  // Setup mobile chat
  const sidebar = document.getElementById('sidebar');
  const chatToggle = document.getElementById('chatToggleBtn');
  if (window.innerWidth <= 768) {
    chatToggle.style.display = 'flex';
    chatToggle.onclick = () => sidebar.classList.toggle('open');
  }
  
  if (info.videoUrl) {
    if (info.videoPlatform === 'youtube') {
      const videoId = info.videoUrl.match(/embed\/([^?]+)/)[1];
      renderYouTube(videoId);
    } else if (info.videoPlatform === 'amazon-mini-tv') {
      renderAmazonMiniTV(info.videoUrl);
    }
  }
}

async function loadVideo() {
  if (!isHost) return;
  
  const url = document.getElementById('videoUrl').value.trim();
  if (!url) {
    showToast('Please enter a URL');
    return;
  }
  
  const detected = detectPlatform(url);
  if (!detected) {
    showToast('❌ Unsupported platform. Try YouTube or Amazon Mini TV');
    return;
  }
  
  showToast(`📡 Loading ${detected.platform.toUpperCase()}...`);
  
  // Update UI
  document.getElementById('platformName').textContent = detected.platform.toUpperCase();
  document.getElementById('detectedPlatform').style.display = 'flex';
  
  const syncWarning = document.getElementById('syncWarning');
  if (!detected.syncable) {
    syncWarning.style.display = 'inline';
  } else {
    syncWarning.style.display = 'none';
  }
  
  let embedUrl = '';
  if (detected.platform === 'youtube') {
    embedUrl = `https://www.youtube.com/embed/${detected.videoId}`;
    renderYouTube(detected.videoId);
  } else if (detected.platform === 'amazon-mini-tv') {
    embedUrl = detected.url;
    renderAmazonMiniTV(detected.url);
  }
  
  // Send to server
  socket.emit('load_video', {
    videoUrl: embedUrl,
    videoPlatform: detected.platform,
    syncable: detected.syncable
  }, (res) => {
    if (res.success) {
      showToast(`✅ ${detected.platform.toUpperCase()} loaded!`);
    }
  });
}

// Manual sync for non-syncable content
function manualSync() {
  if (currentPlatform === 'amazon-mini-tv') {
    showToast('For Amazon Mini TV: Use the link above and chat to sync manually', 3000);
  }
}

// Event listeners
document.getElementById('tabCreate').addEventListener('click', () => {
  document.getElementById('createForm').style.display = 'block';
  document.getElementById('joinForm').style.display = 'none';
  document.getElementById('tabCreate').classList.add('active');
  document.getElementById('tabJoin').classList.remove('active');
});

document.getElementById('tabJoin').addEventListener('click', () => {
  document.getElementById('createForm').style.display = 'none';
  document.getElementById('joinForm').style.display = 'block';
  document.getElementById('tabJoin').classList.add('active');
  document.getElementById('tabCreate').classList.remove('active');
});

document.getElementById('createRoomBtn').addEventListener('click', createRoom);
document.getElementById('joinRoomBtn').addEventListener('click', joinRoom);
document.getElementById('loadVideoBtn').addEventListener('click', loadVideo);
document.getElementById('copyRoomCode').addEventListener('click', () => {
  navigator.clipboard.writeText(roomId);
  showToast('Room code copied!');
});

document.getElementById('playPauseBtn').addEventListener('click', () => {
  if (!isHost || !youtubePlayer) return;
  if (youtubePlayer.getPlayerState() === 1) {
    youtubePlayer.pauseVideo();
  } else {
    youtubePlayer.playVideo();
  }
});

document.getElementById('syncBtn').addEventListener('click', manualSync);

// Chat
document.getElementById('sendBtn').addEventListener('click', () => {
  const input = document.getElementById('chatMessage');
  const text = input.value.trim();
  if (!text) return;
  socket.emit('chat_send', { text });
  input.value = '';
});

document.getElementById('chatMessage').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') document.getElementById('sendBtn').click();
});

// Update time display every second
setInterval(updateTimeDisplay, 1000);

// Load YouTube API
const tag = document.createElement('script');
tag.src = 'https://www.youtube.com/iframe_api';
document.body.appendChild(tag);
</script>
