<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Watch Party - Perfect Sync 🎬</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://www.youtube.com/iframe_api"></script>
<script src="/socket.io/socket.io.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --sur2: #1a1a26;
    --accent: #7c3aed;
    --accent2: #a855f7;
    --text: #f0eeff;
    --muted: #8884a8;
    --border: rgba(255,255,255,0.07);
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
  }
  
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    height: 100vh;
  }
  
  #lobby {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(124,58,237,0.15), var(--bg));
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px;
    width: 420px;
    max-width: 90vw;
    animation: slideUp 0.4s ease;
  }
  
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(135deg, #a78bfa, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  
  .sub {
    color: var(--muted);
    font-size: 13px;
    margin: 8px 0 32px 0;
  }
  
  .tabs {
    display: flex;
    gap: 8px;
    background: rgba(255,255,255,0.05);
    padding: 4px;
    border-radius: 12px;
    margin-bottom: 24px;
  }
  
  .tab {
    flex: 1;
    padding: 10px;
    background: transparent;
    border: none;
    color: var(--muted);
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
  }
  
  .tab.active {
    background: var(--accent);
    color: white;
  }
  
  .field {
    margin-bottom: 16px;
  }
  
  .field label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  
  .field input {
    width: 100%;
    padding: 12px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 14px;
    outline: none;
  }
  
  .field input:focus {
    border-color: var(--accent);
  }
  
  .btn {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    color: white;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: 0.2s;
  }
  
  .btn:hover {
    background: var(--accent2);
    transform: translateY(-1px);
  }
  
  .err {
    color: var(--danger);
    font-size: 12px;
    margin-top: 12px;
    text-align: center;
  }
  
  #app {
    display: none;
    height: 100vh;
    flex-direction: column;
  }
  
  #app.active {
    display: flex;
  }
  
  .topbar {
    height: 56px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    flex-wrap: wrap;
    gap: 10px;
  }
  
  .room-info {
    background: rgba(255,255,255,0.05);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  
  .copy-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
  }
  
  .host-badge {
    background: var(--accent);
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
  }
  
  .member-count {
    font-size: 12px;
    color: var(--muted);
  }
  
  .sync-status {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  
  .sync-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--success);
    animation: pulse 2s infinite;
  }
  
  .sync-dot.warning {
    background: var(--warning);
  }
  
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }
  
  .video-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #000;
  }
  
  .url-bar {
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  
  .url-bar input {
    flex: 1;
    padding: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 13px;
    min-width: 200px;
  }
  
  .url-bar button {
    padding: 10px 20px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
  }
  
  .url-bar button:hover {
    background: var(--accent2);
  }
  
  .platform-badge {
    background: var(--accent);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  
  .platform-badge.warning {
    background: var(--warning);
  }
  
  .player-container {
    flex: 1;
    position: relative;
    background: #000;
    min-height: 300px;
  }
  
  .player-wrapper {
    width: 100%;
    height: 100%;
  }
  
  #youtube-player {
    width: 100%;
    height: 100%;
  }
  
  .amazon-frame {
    width: 100%;
    height: 100%;
    border: none;
    display: none;
  }
  
  .placeholder {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: var(--muted);
    z-index: 10;
    background: #000;
    padding: 20px;
    border-radius: 12px;
  }
  
  .amazon-instructions {
    background: var(--surface);
    padding: 24px;
    border-radius: 16px;
    text-align: center;
    max-width: 400px;
  }
  
  .amazon-instructions h3 {
    margin-bottom: 16px;
    color: var(--warning);
  }
  
  .amazon-instructions p {
    margin-bottom: 12px;
    font-size: 14px;
  }
  
  .amazon-instructions a {
    display: inline-block;
    margin: 16px 0;
    padding: 12px 24px;
    background: var(--accent);
    color: white;
    text-decoration: none;
    border-radius: 12px;
  }
  
  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }
  
  .control-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: 0.2s;
  }
  
  .control-btn:hover:not(:disabled) {
    background: var(--accent);
    border-color: var(--accent);
    transform: scale(1.05);
  }
  
  .control-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  
  .seek-bar {
    flex: 1;
    height: 5px;
    border-radius: 3px;
    background: var(--sur2);
    -webkit-appearance: none;
  }
  
  .seek-bar::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }
  
  .time {
    font-size: 12px;
    font-family: monospace;
    color: var(--muted);
    min-width: 100px;
    text-align: center;
  }
  
  .volume-slider {
    width: 80px;
    height: 4px;
    -webkit-appearance: none;
    background: var(--sur2);
    border-radius: 2px;
  }
  
  .volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }
  
  .sidebar {
    width: 280px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }
  
  .members-section {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    max-height: 200px;
    overflow-y: auto;
  }
  
  .section-title {
    font-size: 11px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    font-weight: 600;
  }
  
  .member-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  
  .member-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    padding: 4px;
    border-radius: 8px;
    transition: background 0.2s;
  }
  
  .member-item:hover {
    background: rgba(255,255,255,0.05);
  }
  
  .member-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 12px;
  }
  
  .host-tag {
    font-size: 9px;
    background: var(--accent);
    padding: 2px 6px;
    border-radius: 10px;
    margin-left: auto;
  }
  
  .chat-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  
  .message {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  
  .message.system {
    align-items: center;
  }
  
  .system-text {
    font-size: 11px;
    background: rgba(255,255,255,0.05);
    padding: 4px 12px;
    border-radius: 20px;
    color: var(--muted);
  }
  
  .message-header {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
  }
  
  .message-name {
    font-weight: 600;
  }
  
  .message-time {
    color: var(--muted);
    font-size: 10px;
  }
  
  .message-bubble {
    background: rgba(255,255,255,0.05);
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 13px;
    max-width: 220px;
    word-wrap: break-word;
  }
  
  .message.mine {
    align-items: flex-end;
  }
  
  .message.mine .message-bubble {
    background: var(--accent);
  }
  
  .chat-input {
    display: flex;
    gap: 8px;
    padding: 12px;
    border-top: 1px solid var(--border);
  }
  
  .chat-input input {
    flex: 1;
    padding: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text);
    outline: none;
  }
  
  .chat-input button {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    color: white;
    cursor: pointer;
    transition: 0.2s;
  }
  
  .chat-input button:hover {
    background: var(--accent2);
  }
  
  #toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--sur2);
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    z-index: 1000;
    opacity: 0;
    transition: 0.2s;
    pointer-events: none;
    text-align: center;
    max-width: 90vw;
  }
  
  #toast.show {
    opacity: 1;
  }
  
  @media (max-width: 700px) {
    .sidebar { width: 240px; }
    .message-bubble { max-width: 160px; }
    .time { min-width: 80px; font-size: 11px; }
    .controls { gap: 8px; }
  }
  
  @media (max-width: 550px) {
    .main { flex-direction: column; }
    .sidebar { width: 100%; max-height: 280px; }
    .url-bar { flex-direction: column; }
    .url-bar input { width: 100%; }
    .url-bar button { width: 100%; }
    .topbar { flex-direction: column; align-items: flex-start; height: auto; padding: 12px; }
    .member-count { align-self: flex-end; }
  }
</style>
</head>
<body>

<div id="lobby">
  <div class="card">
    <div class="logo">Watch Party</div>
    <p class="sub">Watch YouTube & Amazon Mini TV together!</p>
    <div class="tabs">
      <button class="tab active" id="tabCreate">Create Room</button>

    </div>
    <div id="joinForm" style="display: none;">
      <div class="field">
        <label>Your Name</label>
        <input type="text" id="joinName" placeholder="e.g. Sam" maxlength="24">
      </div>
      <div class="field">
        <label>Room Code</label>
        <input type="text" id="joinCode" placeholder="e.g. AB12CD" maxlength="6" style="text-transform: uppercase;">
      </div>
      <button class="btn" id="joinRoomBtn">🔗 Join Room</button>
    </div>

  </div>
</div>

<div id="app">
  <div class="topbar">
    <div style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
      <span style="font-weight: 800;">🎬 Watch Party</span>
      <div class="room-info">
        <span>Room: <strong id="roomCode">------</strong></span>
        <button class="copy-btn" id="copyRoomCode">📋</button>
      </div>
      <span class="host-badge" id="hostBadge" style="display: none;">HOST</span>
      <div class="sync-status" id="syncStatus">
        <div class="sync-dot" id="syncDot"></div>
        <span id="syncText">Ready</span>
      </div>
    </div>
    <span class="member-count" id="memberCount">0 members</span>
  </div>
  
  <div class="main">
    <div class="video-panel">
      <div class="url-bar" id="hostControls">
        <input type="text" id="videoUrl" placeholder="YouTube URL OR Amazon Mini TV URL">
        <button id="loadVideoBtn">🎬 Load Video</button>
      </div>
      <div class="url-bar" id="guestControls" style="display: none;">
        <span style="color: var(--muted);">⏳ Waiting for host to load a video...</span>
      </div>
      
      <div style="padding: 8px 16px; background: var(--sur2); border-bottom: 1px solid var(--border); display: none;" id="platformInfo">
        <span>📺 Current:</span>
        <span class="platform-badge" id="platformBadge">YouTube</span>
      </div>
      
      <div class="player-container">
        <div class="player-wrapper">
          <div id="youtube-player"></div>
          <iframe id="amazon-frame" class="amazon-frame" sandbox="allow-same-origin allow-scripts allow-popups allow-forms"></iframe>
        </div>
        <div class="placeholder" id="placeholder">
          <div style="font-size: 48px; margin-bottom: 12px;">🎬</div>
          <p>No video loaded</p>
          <p style="font-size: 12px; margin-top: 8px;">Host: Paste a YouTube or Amazon Mini TV URL</p>
        </div>
      </div>
      
      <div class="controls">
        <button class="control-btn" id="playPauseBtn" disabled>▶</button>
        <button class="control-btn" id="manualSyncBtn" style="display: none;" title="Sync with host">🔄</button>
        <input type="range" class="seek-bar" id="seekBar" min="0" max="100" value="0" disabled>
        <span class="time" id="timeDisplay">0:00 / 0:00</span>
        <div style="display: flex; align-items: center; gap: 6px;">
          <span>🔊</span>
          <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80">
        </div>
      </div>
    </div>
    
    <div class="sidebar">
      <div class="members-section">
        <div class="section-title">👥 Members</div>
        <div class="member-list" id="membersList"></div>
      </div>
      <div class="chat-section">
        <div class="section-title" style="padding: 0 12px;">💬 Chat</div>
        <div class="messages" id="messages"></div>
        <div class="chat-input">
          <input type="text" id="chatMessage" placeholder="Say something..." maxlength="300">
          <button id="sendBtn">➤</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
let socket;
let myId;
let myName;
let roomId;
let isHost = false;
let player = null;
let playerReady = false;
let isSeeking = false;
let currentVideoId = null;
let currentPlatform = null;
let currentAmazonUrl = null;
let forceSyncInterval;

function showToast(msg, duration = 2000) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), duration);
}

function showError(msg) {
  document.getElementById('lobbyError').textContent = msg;
}

function formatTime(seconds) {
  if (isNaN(seconds) || !isFinite(seconds)) return '0:00';
  const mins = Math.floor(seconds / 60);
  const secs = Math.floor(seconds % 60);
  return `${mins}:${secs.toString().padStart(2, '0')}`;
}

function extractVideoId(url) {
  if (!url) return null;
  const patterns = [
    /(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&?#]+)/,
    /youtube\.com\/embed\/([^?]+)/
  ];
  for (const pattern of patterns) {
    const match = url.match(pattern);
    if (match) return match[1];
  }
  return null;
}

function detectPlatform(url) {
  const urlLower = url.toLowerCase();
  
  // YouTube
  if (urlLower.includes('youtube.com') || urlLower.includes('youtu.be')) {
    const videoId = extractVideoId(url);
    if (videoId) {
      return { platform: 'youtube', videoId: videoId };
    }
  }
  
  // Amazon Mini TV
  if (urlLower.includes('amazon') && (urlLower.includes('minitv') || urlLower.includes('mini-tv'))) {
    return { platform: 'amazon', url: url };
  }
  
  return null;
}

function createYouTubePlayer(videoId, startTime = 0, autoPlay = false) {
  const placeholder = document.getElementById('placeholder');
  const youtubeDiv = document.getElementById('youtube-player');
  const amazonFrame = document.getElementById('amazon-frame');
  
  placeholder.style.display = 'none';
  youtubeDiv.style.display = 'block';
  amazonFrame.style.display = 'none';
  amazonFrame.src = '';
  
  document.getElementById('platformInfo').style.display = 'flex';
  document.getElementById('platformBadge').textContent = 'YouTube';
  document.getElementById('platformBadge').classList.remove('warning');
  
  if (player) {
    try { player.destroy(); } catch(e) {}
    player = null;
    playerReady = false;
  }
  
  console.log(`Creating YouTube player: ${videoId}, start: ${startTime}`);
  
  player = new YT.Player('youtube-player', {
    height: '100%',
    width: '100%',
    videoId: videoId,
    playerVars: {
      controls: 1,
      modestbranding: 1,
      rel: 0,
      origin: window.location.origin,
      autoplay: autoPlay ? 1 : 0,
      start: Math.floor(startTime),
      playsinline: 1
    },
    events: {
      onReady: (event) => {
        playerReady = true;
        event.target.setVolume(parseInt(document.getElementById('volumeSlider').value));
        
        if (startTime > 0 && !autoPlay) {
          event.target.seekTo(startTime, true);
          event.target.pauseVideo();
        }
        
        showToast('✅ YouTube player ready!');
        document.getElementById('syncText').textContent = 'Synced';
        document.getElementById('syncDot').classList.remove('warning');
      },
      onStateChange: (event) => {
        const playBtn = document.getElementById('playPauseBtn');
        const state = event.data;
        
        if (state === YT.PlayerState.PLAYING) {
          playBtn.textContent = '⏸';
          document.getElementById('syncText').textContent = 'Playing';
          // Host sends play state to viewers
          if (isHost && playerReady) {
            socket.emit('play_video', { currentTime: player.getCurrentTime() });
          }
        } else if (state === YT.PlayerState.PAUSED) {
          playBtn.textContent = '▶';
          document.getElementById('syncText').textContent = 'Paused';
          // Host sends pause state to viewers
          if (isHost && playerReady) {
            socket.emit('pause_video', { currentTime: player.getCurrentTime() });
          }
        } else if (state === YT.PlayerState.BUFFERING) {
          document.getElementById('syncText').textContent = 'Buffering...';
        } else if (state === YT.PlayerState.ENDED) {
          playBtn.textContent = '▶';
          document.getElementById('syncText').textContent = 'Ended';
        }
      },
      onError: (event) => {
        console.error('YouTube error:', event.data);
        showToast('❌ Failed to load YouTube video');
        document.getElementById('placeholder').style.display = 'flex';
        playerReady = false;
      }
    }
  });
}

function showAmazonMiniTV(url) {
  const placeholder = document.getElementById('placeholder');
  const youtubeDiv = document.getElementById('youtube-player');
  const amazonFrame = document.getElementById('amazon-frame');
  
  youtubeDiv.style.display = 'none';
  amazonFrame.style.display = 'none';
  
  document.getElementById('platformInfo').style.display = 'flex';
  document.getElementById('platformBadge').textContent = 'Amazon Mini TV';
  document.getElementById('platformBadge').classList.add('warning');
  document.getElementById('syncDot').classList.add('warning');
  document.getElementById('syncText').textContent = 'Manual sync';
  
  // Show instructions
  placeholder.innerHTML = `
    <div class="amazon-instructions">
      <h3>📺 Amazon Mini TV</h3>
      <p>Due to DRM protection, each person needs to open the link separately:</p>
      <p><strong style="word-break: break-all;">${url}</strong></p>
      <a href="${url}" target="_blank" rel="noopener noreferrer">🎬 Open Amazon Mini TV</a>
      <p style="font-size: 12px; margin-top: 16px;">💡 Tip: Use chat to coordinate playback! Say "3,2,1, play!" together.</p>
      <button onclick="document.getElementById('placeholder').style.display='none'" style="margin-top: 12px;">Close</button>
    </div>
  `;
  placeholder.style.display = 'flex';
  
  currentAmazonUrl = url;
  currentPlatform = 'amazon';
  
  // Show manual sync button for viewers
  if (!isHost) {
    document.getElementById('manualSyncBtn').style.display = 'flex';
  }
}

// Socket event handlers
function initSocket(name, callback) {
  socket = io({ 
    transports: ['websocket', 'polling'],
    reconnection: true,
    reconnectionAttempts: 5,
    reconnectionDelay: 1000
  });
  
  socket.on('connect', () => {
    myId = socket.id;
    myName = name;
    callback();
  });
  
  socket.on('connect_error', () => showError('Cannot connect to server'));
  socket.on('disconnect', () => showToast('⚠️ Disconnected - reconnecting...'));
  socket.on('reconnect', () => {
    showToast('✅ Reconnected!');
    if (roomId) {
      socket.emit('join_room', { roomId, name: myName });
    }
  });
  
  socket.on('room_update', (info) => updateRoomUI(info));
  
  socket.on('you_are_host', () => {
    isHost = true;
    updateUI();
    showToast('👑 You are now the host!');
    if (player && playerReady) {
      // Enable host controls
      document.getElementById('playPauseBtn').disabled = false;
      document.getElementById('seekBar').disabled = false;
    }
  });
  
  socket.on('host_changed', () => {
    isHost = false;
    updateUI();
    showToast('Host left - you are now a viewer');
    if (player && playerReady) {
      document.getElementById('playPauseBtn').disabled = true;
      document.getElementById('seekBar').disabled = true;
    }
    if (currentPlatform === 'amazon') {
      document.getElementById('manualSyncBtn').style.display = 'flex';
    }
  });
  
  socket.on('video_loaded', ({ videoId, videoPlatform, videoUrl, currentTime, isPlaying }) => {
    if (videoPlatform === 'youtube' && videoId) {
      if (currentVideoId !== videoId) {
        currentVideoId = videoId;
        currentPlatform = 'youtube';
        createYouTubePlayer(videoId, currentTime, isPlaying);
      }
    } else if (videoPlatform === 'amazon' && videoUrl) {
      showAmazonMiniTV(videoUrl);
    }
  });
  
  socket.on('video_play', ({ currentTime }) => {
    if (!isHost && player && playerReady && currentPlatform === 'youtube') {
      const playerTime = player.getCurrentTime();
      const diff = Math.abs(playerTime - currentTime);
      
      if (diff > 1.0) {
        player.seekTo(currentTime, true);
      }
      
      setTimeout(() => {
        if (player && playerReady && player.getPlayerState() !== 1) {
          player.playVideo();
        }
      }, 100);
    }
  });
  
  socket.on('video_pause', ({ currentTime }) => {
    if (!isHost && player && playerReady && currentPlatform === 'youtube') {
      const playerTime = player.getCurrentTime();
      const diff = Math.abs(playerTime - currentTime);
      
      if (diff > 1.0) {
        player.seekTo(currentTime, true);
      }
      
      setTimeout(() => {
        if (player && playerReady && player.getPlayerState() === 1) {
          player.pauseVideo();
        }
      }, 100);
    }
  });
  
  socket.on('video_seek', ({ currentTime }) => {
    if (!isHost && player && playerReady && currentPlatform === 'youtube') {
      player.seekTo(currentTime, true);
    }
  });
  
  socket.on('force_sync_response', ({ currentTime, isPlaying }) => {
    if (!isHost && player && playerReady && currentPlatform === 'youtube') {
      const playerTime = player.getCurrentTime();
      const diff = Math.abs(playerTime - currentTime);
      
      if (diff > 0.5) {
        player.seekTo(currentTime, true);
        showToast(`🔧 Syncing...`, 500);
      }
      
      if (isPlaying && player.getPlayerState() !== 1) {
        player.playVideo();
      } else if (!isPlaying && player.getPlayerState() === 1) {
        player.pauseVideo();
      }
    }
  });
  
  socket.on('chat_message', (msg) => addChatMessage(msg));
}

function updateUI() {
  const hostControls = document.getElementById('hostControls');
  const guestControls = document.getElementById('guestControls');
  const hostBadge = document.getElementById('hostBadge');
  const playPauseBtn = document.getElementById('playPauseBtn');
  const seekBar = document.getElementById('seekBar');
  const manualSyncBtn = document.getElementById('manualSyncBtn');
  
  if (isHost) {
    hostControls.style.display = 'flex';
    guestControls.style.display = 'none';
    hostBadge.style.display = 'inline-block';
    playPauseBtn.disabled = false;
    seekBar.disabled = false;
    manualSyncBtn.style.display = 'none';
  } else {
    hostControls.style.display = 'none';
    guestControls.style.display = 'flex';
    hostBadge.style.display = 'none';
    playPauseBtn.disabled = true;
    seekBar.disabled = true;
    if (currentPlatform === 'amazon') {
      manualSyncBtn.style.display = 'flex';
    }
  }
}

function updateRoomUI(info) {
  document.getElementById('memberCount').textContent = `${info.members.length} members`;
  const membersList = document.getElementById('membersList');
  membersList.innerHTML = '';
  
  info.members.forEach(m => {
    const div = document.createElement('div');
    div.className = 'member-item';
    
    const avatar = document.createElement('div');
    avatar.className = 'member-avatar';
    avatar.style.background = m.color + '33';
    avatar.style.color = m.color;
    avatar.textContent = m.name[0].toUpperCase();
    
    const nameSpan = document.createElement('span');
    nameSpan.textContent = m.name;
    nameSpan.style.flex = '1';
    
    div.appendChild(avatar);
    div.appendChild(nameSpan);
    
    if (m.id === info.host) {
      const tag = document.createElement('span');
      tag.className = 'host-tag';
      tag.textContent = 'HOST';
      div.appendChild(tag);
    }
    
    membersList.appendChild(div);
  });
}

function addChatMessage(msg) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message';
  
  if (msg.system) {
    div.classList.add('system');
    const sysText = document.createElement('div');
    sysText.className = 'system-text';
    sysText.textContent = msg.text;
    div.appendChild(sysText);
  } else {
    const mine = msg.senderId === myId;
    if (mine) div.classList.add('mine');
    
    const header = document.createElement('div');
    header.className = 'message-header';
    const name = document.createElement('span');
    name.className = 'message-name';
    name.style.color = msg.color;
    name.textContent = mine ? 'You' : msg.name;
    const time = document.createElement('span');
    time.className = 'message-time';
    time.textContent = new Date(msg.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    header.appendChild(name);
    header.appendChild(time);
    
    const bubble = document.createElement('div');
    bubble.className = 'message-bubble';
    bubble.textContent = msg.text;
    
    div.appendChild(header);
    div.appendChild(bubble);
  }
  
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function createRoom() {
  const name = document.getElementById('createName').value.trim();
  if (!name) {
    showError('Enter your name');
    return;
  }
  
  initSocket(name, () => {
    socket.emit('create_room', { name }, (res) => {
      if (!res.ok) {
        showError(res.error);
        return;
      }
      isHost = true;
      roomId = res.roomId;
      enterApp(res.info);
    });
  });
}

function joinRoom() {
  const name = document.getElementById('joinName').value.trim();
  const code = document.getElementById('joinCode').value.trim().toUpperCase();
  
  if (!name) {
    showError('Enter your name');
    return;
  }
  if (!code) {
    showError('Enter room code');
    return;
  }
  
  initSocket(name, () => {
    socket.emit('join_room', { roomId: code, name }, (res) => {
      if (!res.ok) {
        showError(res.error);
        return;
      }
      isHost = false;
      roomId = res.roomId;
      enterApp(res.info);
    });
  });
}

function enterApp(info) {
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('app').classList.add('active');
  document.getElementById('roomCode').textContent = roomId;
  updateRoomUI(info);
  updateUI();
  
  if (info.videoId && info.videoPlatform === 'youtube') {
    currentVideoId = info.videoId;
    currentPlatform = 'youtube';
    createYouTubePlayer(info.videoId, info.currentTime, info.isPlaying);
  } else if (info.videoUrl && info.videoPlatform === 'amazon') {
    showAmazonMiniTV(info.videoUrl);
  }
  
  // Force sync interval for viewers - every 2 seconds
  if (!isHost) {
    forceSyncInterval = setInterval(() => {
      if (player && playerReady && currentPlatform === 'youtube' && !isSeeking) {
        socket.emit('force_sync', { 
          currentTime: player.getCurrentTime(), 
          isPlaying: player.getPlayerState() === 1 
        });
      }
    }, 2000);
  }
}

function loadVideo() {
  if (!isHost) return;
  
  const url = document.getElementById('videoUrl').value.trim();
  if (!url) {
    showToast('Please enter a URL');
    return;
  }
  
  const detected = detectPlatform(url);
  if (!detected) {
    showToast('❌ Unsupported platform. Try YouTube or Amazon Mini TV');
    return;
  }
  
  showToast(`📡 Loading ${detected.platform.toUpperCase()}...`);
  
  if (detected.platform === 'youtube') {
    currentVideoId = detected.videoId;
    currentPlatform = 'youtube';
    createYouTubePlayer(detected.videoId, 0, false);
    
    socket.emit('load_video', { 
      videoId: detected.videoId, 
      platform: 'youtube',
      videoUrl: null
    }, (res) => {
      if (res.success) {
        showToast('✅ YouTube video loaded for everyone!');
      }
    });
  } else if (detected.platform === 'amazon') {
    currentPlatform = 'amazon';
    currentAmazonUrl = detected.url;
    showAmazonMiniTV(detected.url);
    
    socket.emit('load_video', { 
      videoId: null, 
      platform: 'amazon',
      videoUrl: detected.url
    }, (res) => {
      if (res.success) {
        showToast('✅ Amazon Mini TV link shared!');
      }
    });
  }
}

function togglePlayPause() {
  if (!isHost || !player || !playerReady || currentPlatform !== 'youtube') return;
  
  const state = player.getPlayerState();
  if (state === 1) {
    player.pauseVideo();
  } else if (state === 2) {
    player.playVideo();
  }
}

function onSeekInput() {
  if (!isHost || !player || !playerReady || currentPlatform !== 'youtube') return;
  isSeeking = true;
}

function onSeekChange(e) {
  if (!isHost || !player || !playerReady || currentPlatform !== 'youtube') return;
  const percent = parseFloat(e.target.value);
  const duration = player.getDuration();
  const time = (percent / 100) * duration;
  player.seekTo(time, true);
  socket.emit('seek_video', { currentTime: time });
  setTimeout(() => { isSeeking = false; }, 100);
}

function manualSync() {
  if (currentPlatform === 'amazon') {
    showToast('For Amazon Mini TV: Use the link above and coordinate with chat!', 3000);
    socket.emit('chat_send', { text: '🎬 Everyone click play at the same time!' });
  } else if (currentPlatform === 'youtube' && !isHost) {
    // Request force sync
    if (player && playerReady) {
      socket.emit('force_sync', { 
        currentTime: player.getCurrentTime(), 
        isPlaying: player.getPlayerState() === 1 
      });
      showToast('🔄 Requesting sync...', 1000);
    }
  }
}

function updatePlayerUI() {
  if (!player || !playerReady || currentPlatform !== 'youtube') return;
  
  try {
    const currentTime = player.getCurrentTime();
    const duration = player.getDuration();
    
    if (duration && !isSeeking) {
      const percent = (currentTime / duration) * 100;
      document.getElementById('seekBar').value = percent;
      document.getElementById('timeDisplay').textContent = `${formatTime(currentTime)} / ${formatTime(duration)}`;
    }
    
    const playBtn = document.getElementById('playPauseBtn');
    const state = player.getPlayerState();
    if (state === 1) playBtn.textContent = '⏸';
    else if (state === 2) playBtn.textContent = '▶';
  } catch(e) {}
}

// Update UI every 300ms
setInterval(() => {
  updatePlayerUI();
}, 300);

// Event listeners
document.getElementById('tabCreate').addEventListener('click', () => {
  document.getElementById('createForm').style.display = 'block';
  document.getElementById('joinForm').style.display = 'none';
  document.getElementById('tabCreate').classList.add('active');
  document.getElementById('tabJoin').classList.remove('active');
  document.getElementById('lobbyError').textContent = '';
});

document.getElementById('tabJoin').addEventListener('click', () => {
  document.getElementById('createForm').style.display = 'none';
  document.getElementById('joinForm').style.display = 'block';
  document.getElementById('tabJoin').classList.add('active');
  document.getElementById('tabCreate').classList.remove('active');
  document.getElementById('lobbyError').textContent = '';
});

document.getElementById('createRoomBtn').addEventListener('click', createRoom);
document.getElementById('joinRoomBtn').addEventListener('click', joinRoom);

document.getElementById('copyRoomCode').addEventListener('click', () => {
  if (roomId) {
    navigator.clipboard.writeText(roomId);
    showToast('Room code copied!');
  }
});

document.getElementById('loadVideoBtn').addEventListener('click', loadVideo);
document.getElementById('videoUrl').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') loadVideo();
});

document.getElementById('playPauseBtn').addEventListener('click', togglePlayPause);
document.getElementById('seekBar').addEventListener('input', onSeekInput);
document.getElementById('seekBar').addEventListener('change', onSeekChange);
document.getElementById('manualSyncBtn').addEventListener('click', manualSync);

document.getElementById('volumeSlider').addEventListener('input', (e) => {
  if (player && playerReady) {
    player.setVolume(parseInt(e.target.value));
  }
  localStorage.setItem('volume', e.target.value);
});

// Chat
document.getElementById('sendBtn').addEventListener('click', () => {
  const input = document.getElementById('chatMessage');
  const text = input.value.trim();
  if (!text) return;
  socket.emit('chat_send', { text });
  input.value = '';
});

document.getElementById('chatMessage').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    document.getElementById('sendBtn').click();
  }
});

// Restore volume
const savedVolume = localStorage.getItem('volume');
if (savedVolume) {
  document.getElementById('volumeSlider').value = savedVolume;
}
</script>
