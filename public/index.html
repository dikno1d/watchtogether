<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WatchTogether</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
<style>
  /* ── Reset & Variables ───────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0A0A0F;
    --bg2:       #12121A;
    --bg3:       #1A1A2E;
    --bg4:       #1E1E2E;
    --border:    #2a2a3a;
    --purple:    #7C6CFC;
    --pink:      #FC6CBE;
    --muted:     #8888A8;
    --text:      #E8E8F0;
    --danger:    #FC4C4C;
    --success:   #4CFCA0;
    --radius:    14px;
    --font-head: 'Syne', sans-serif;
    --font-mono: 'Space Mono', monospace;
  }

  html, body { height: 100%; }

  body {
    font-family: var(--font-mono);
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  /* ── Scrollbar ───────────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── Utility ─────────────────────────────────────────────────── */
  .hidden { display: none !important; }
  .flex   { display: flex; }
  .col    { flex-direction: column; }
  .gap8   { gap: 8px; }
  .gap12  { gap: 12px; }
  .gap16  { gap: 16px; }

  /* ── Input / Button base ─────────────────────────────────────── */
  input, textarea {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color .2s;
    width: 100%;
  }
  input:focus, textarea:focus { border-color: var(--purple); }

  button {
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: 700;
    padding: 11px 20px;
    transition: opacity .15s, transform .1s;
    width: 100%;
  }
  button:hover  { opacity: .88; }
  button:active { transform: scale(.97); }
  button:disabled { opacity: .4; cursor: not-allowed; }

  .btn-primary { background: var(--purple); color: #fff; }
  .btn-secondary { background: var(--bg4); color: var(--text); }
  .btn-danger  { background: var(--danger); color: #fff; }
  .btn-icon {
    width: auto;
    padding: 8px 12px;
    background: var(--bg4);
    color: var(--text);
    border-radius: 8px;
    font-size: 16px;
    line-height: 1;
  }

  label {
    color: var(--muted);
    font-size: 11px;
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-bottom: 4px;
    display: block;
  }

  .error-msg {
    color: var(--danger);
    font-size: 12px;
    min-height: 16px;
    margin-top: 4px;
  }

  /* ── Landing ─────────────────────────────────────────────────── */
  #landing {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at top left, #1A1A2E 0%, #0A0A0F 65%);
  }

  .landing-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 0 80px rgba(124,108,252,.12);
  }

  .logo {
    font-family: var(--font-head);
    font-size: 42px;
    font-weight: 800;
    background: linear-gradient(90deg, var(--purple), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
    margin-bottom: 4px;
  }

  .tagline {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 32px;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 24px 0;
  }

  .field { margin-bottom: 12px; }

  /* ── App shell ───────────────────────────────────────────────── */
  #app {
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Topbar */
  #topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 16px;
    height: 52px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 10;
  }

  .topbar-logo {
    font-family: var(--font-head);
    font-weight: 800;
    font-size: 18px;
    background: linear-gradient(90deg, var(--purple), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  #room-badge {
    background: var(--bg4);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: border-color .2s;
    user-select: none;
  }
  #room-badge:hover { border-color: var(--purple); }

  .topbar-spacer { flex: 1; }

  .topbar-actions { display: flex; gap: 8px; }

  #viewer-banner {
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    padding: 6px 16px;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    flex-shrink: 0;
  }

  /* Main layout */
  #main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* Video area */
  #video-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #000;
    position: relative;
  }

  #yt-placeholder {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    gap: 12px;
  }
  #yt-placeholder .icon { font-size: 64px; }
  #yt-placeholder p { font-size: 14px; }

  #yt-container {
    flex: 1;
    position: relative;
  }
  #yt-container iframe,
  #yt-container > div {
    position: absolute;
    inset: 0;
    width: 100% !important;
    height: 100% !important;
  }

  /* Host controls bar */
  #host-controls {
    background: var(--bg2);
    border-top: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  #progress-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  #progress {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  #progress::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--purple);
    cursor: pointer;
    margin-top: -5px;
  }
  #progress::-webkit-slider-runnable-track {
    height: 4px;
    border-radius: 2px;
  }

  #time-display {
    font-size: 11px;
    color: var(--muted);
  }

  .ctrl-btn {
    background: var(--bg4);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 16px;
    width: auto;
    transition: background .15s;
  }
  .ctrl-btn:hover { background: var(--bg3); }

  /* Sidebar */
  #sidebar {
    width: 300px;
    flex-shrink: 0;
    background: var(--bg2);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Tabs */
  .tab-bar {
    display: flex;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .tab {
    flex: 1;
    padding: 12px;
    text-align: center;
    font-size: 12px;
    cursor: pointer;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    transition: color .2s, border-color .2s;
    background: none;
    border-radius: 0;
    width: auto;
  }
  .tab.active {
    color: var(--purple);
    border-bottom-color: var(--purple);
  }

  .tab-panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  .tab-panel.active { display: flex; }

  /* Members list */
  #members-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .member-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 10px;
    transition: background .15s;
  }
  .member-item:hover { background: var(--bg3); }

  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--purple);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
    flex-shrink: 0;
  }

  .member-name { font-size: 13px; flex: 1; }
  .host-badge  { font-size: 16px; }

  /* Chat */
  #chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .chat-msg {
    padding: 8px 12px;
    border-radius: 10px;
    background: var(--bg3);
    font-size: 12px;
    animation: fadeIn .2s ease;
  }
  .chat-msg.mine { background: rgba(124,108,252,.18); }

  .chat-sender {
    font-weight: 700;
    color: var(--purple);
    margin-bottom: 2px;
    font-size: 11px;
  }
  .chat-msg.mine .chat-sender { color: var(--pink); }

  .chat-text { color: var(--text); line-height: 1.4; }

  .chat-time {
    color: var(--muted);
    font-size: 10px;
    margin-top: 2px;
    text-align: right;
  }

  #chat-input-row {
    display: flex;
    gap: 8px;
    padding: 10px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  #chat-input-row input { flex: 1; }

  #chat-send {
    width: auto;
    padding: 10px 14px;
    background: var(--purple);
    color: #fff;
    border-radius: 8px;
    font-size: 16px;
  }

  /* Toast / overlay */
  #toast-container {
    position: fixed;
    bottom: 80px;
    left: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
    z-index: 100;
  }

  .toast {
    background: rgba(10,10,15,.92);
    border-left: 4px solid var(--purple);
    border-radius: 10px;
    padding: 12px 16px;
    backdrop-filter: blur(8px);
    animation: slideUp .25s ease, fadeOut .3s ease 3.7s forwards;
    pointer-events: none;
  }
  .toast-sender { color: var(--pink); font-weight: 700; font-size: 12px; margin-bottom: 3px; }
  .toast-text   { color: var(--text); font-size: 13px; }

  /* Modal */
  #modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    backdrop-filter: blur(4px);
  }
  #modal-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    width: 360px;
    box-shadow: 0 0 60px rgba(0,0,0,.6);
  }
  #modal-box h3 { font-family: var(--font-head); margin-bottom: 16px; font-size: 18px; }
  #modal-box input { margin-bottom: 12px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 4px; }
  .modal-actions button { flex: 1; }

  /* Animations */
  @keyframes fadeIn   { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  @keyframes slideUp  { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
  @keyframes fadeOut  { to { opacity: 0; transform: translateY(-8px); } }

  /* Responsive */
  @media (max-width: 680px) {
    #sidebar { width: 100%; position: fixed; bottom: 0; left: 0; height: 45vh; border-left: none; border-top: 1px solid var(--border); z-index: 20; }
    #main { flex-direction: column; }
    #video-area { height: 55vh; }
  }
</style>
</head>
<body>

<!-- ── Landing ─────────────────────────────────────────────────── -->
<div id="landing">
  <div class="landing-card">
    <div class="logo">WatchTogether</div>
    <div class="tagline">Stream YouTube in sync — browser edition</div>

    <div class="field">
      <label>Your name</label>
      <input id="name-input" type="text" placeholder="Enter your name" maxlength="32" />
    </div>

    <button class="btn-primary" id="create-btn">🚀 Create Room</button>
    <div class="error-msg" id="create-error"></div>

    <hr class="divider" />

    <div class="field">
      <label>Room code (6 characters)</label>
      <input id="code-input" type="text" placeholder="e.g. ABCD12" maxlength="6"
             style="text-transform:uppercase;letter-spacing:.15em;" />
    </div>

    <button class="btn-secondary" id="join-btn">🔗 Join Room</button>
    <div class="error-msg" id="join-error"></div>
  </div>
</div>

<!-- ── App ─────────────────────────────────────────────────────── -->
<div id="app" class="hidden">

  <!-- Topbar -->
  <div id="topbar">
    <span class="topbar-logo">WatchTogether</span>
    <span id="room-badge" title="Click to copy">Room: <strong id="room-id-display">——</strong></span>
    <span class="topbar-spacer"></span>
    <div class="topbar-actions">
      <button class="btn-icon" id="overlay-btn" title="Toggle chat overlay">💬</button>
      <button class="btn-icon hidden" id="load-yt-btn" title="Load YouTube video">📺</button>
      <button class="btn-icon btn-danger" id="leave-btn" title="Leave room">⬅ Leave</button>
    </div>
  </div>

  <!-- Viewer banner -->
  <div id="viewer-banner" class="hidden">👁 Viewing mode — host controls playback</div>

  <!-- Main -->
  <div id="main">

    <!-- Video area -->
    <div id="video-area">
      <div id="yt-placeholder">
        <div class="icon">▶</div>
        <p>No video loaded</p>
        <p style="font-size:12px">Host can load a YouTube video</p>
      </div>
      <div id="yt-container" class="hidden"></div>

      <!-- Host controls -->
      <div id="host-controls" class="hidden">
        <button class="ctrl-btn" id="play-pause-btn">▶</button>
        <div id="progress-wrap">
          <input type="range" id="progress" min="0" max="100" value="0" step="1" />
          <span id="time-display">0:00 / 0:00</span>
        </div>
        <button class="ctrl-btn" id="mute-btn">🔊</button>
      </div>
    </div>

    <!-- Sidebar -->
    <div id="sidebar">
      <div class="tab-bar">
        <button class="tab active" data-tab="members">👥 Members</button>
        <button class="tab"        data-tab="chat">💬 Chat</button>
      </div>

      <div class="tab-panel active" id="tab-members">
        <div id="members-list"></div>
      </div>

      <div class="tab-panel" id="tab-chat">
        <div id="chat-messages"></div>
        <div id="chat-input-row">
          <input id="chat-input" type="text" placeholder="Type a message…" maxlength="400" />
          <button id="chat-send">➤</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- Modal (YouTube URL) -->
<div id="modal-overlay" class="hidden">
  <div id="modal-box">
    <h3>Load YouTube Video</h3>
    <input id="modal-url" type="text" placeholder="YouTube URL or video ID" />
    <div class="modal-actions">
      <button class="btn-secondary" id="modal-cancel">Cancel</button>
      <button class="btn-primary"   id="modal-ok">Load</button>
    </div>
  </div>
</div>

<!-- Socket.IO client (served by the server) -->
<script src="/socket.io/socket.io.js"></script>
<script>
'use strict';

// ── State ──────────────────────────────────────────────────────
const state = {
  socket:      null,
  roomId:      null,
  myName:      null,
  myId:        null,
  isHost:      false,
  overlayOn:   true,
  ytPlayer:    null,
  ytReady:     false,
  videoId:     null,
  isSyncing:   false,
  syncTimer:   null,
  progressDrag: false,
  muted:       false,
};

// ── DOM refs ───────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const landing     = $('landing');
const appShell    = $('app');
const nameInput   = $('name-input');
const codeInput   = $('code-input');
const createBtn   = $('create-btn');
const joinBtn     = $('join-btn');
const createError = $('create-error');
const joinError   = $('join-error');
const roomBadge   = $('room-badge');
const roomDisplay = $('room-id-display');
const viewerBanner= $('viewer-banner');
const loadYtBtn   = $('load-yt-btn');
const overlayBtn  = $('overlay-btn');
const leaveBtn    = $('leave-btn');
const ytPlaceholder=$('yt-placeholder');
const ytContainer = $('yt-container');
const hostControls= $('host-controls');
const playPauseBtn= $('play-pause-btn');
const progressEl  = $('progress');
const timeDisplay = $('time-display');
const muteBtn     = $('mute-btn');
const membersList = $('members-list');
const chatMessages= $('chat-messages');
const chatInput   = $('chat-input');
const chatSend    = $('chat-send');
const toastCont   = $('toast-container');
const modalOverlay= $('modal-overlay');
const modalUrl    = $('modal-url');
const modalCancel = $('modal-cancel');
const modalOk     = $('modal-ok');

// ── YouTube IFrame API ─────────────────────────────────────────
// Loaded lazily the first time a video is needed
let ytApiLoaded = false;
function loadYtApi() {
  if (ytApiLoaded) return;
  ytApiLoaded = true;
  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
}

window.onYouTubeIframeAPIReady = function () {
  // If a video was queued before the API loaded, create it now
  if (state.videoId) createPlayer(state.videoId);
};

function createPlayer(videoId) {
  // Clear old player
  if (state.ytPlayer) {
    try { state.ytPlayer.destroy(); } catch (_) {}
    state.ytPlayer = null;
    state.ytReady  = false;
  }
  ytContainer.innerHTML = '';
  const div = document.createElement('div');
  div.id = 'yt-iframe';
  ytContainer.appendChild(div);

  state.ytPlayer = new YT.Player('yt-iframe', {
    videoId,
    playerVars: {
      autoplay:       1,
      controls:       state.isHost ? 0 : 1, // host uses custom controls
      disablekb:      state.isHost ? 1 : 0,
      modestbranding: 1,
      rel:            0,
    },
    events: {
      onReady:       onYtReady,
      onStateChange: onYtStateChange,
    },
  });
}

function onYtReady() {
  state.ytReady = true;
  if (state.isHost) {
    hostControls.classList.remove('hidden');
    startHostHeartbeat();
  }
}

function onYtStateChange(e) {
  if (!state.isHost || state.isSyncing) return;
  const playing = e.data === YT.PlayerState.PLAYING;
  const currentTime = state.ytPlayer.getCurrentTime() || 0;
  // Emit playback:update on play/pause changes
  if (e.data === YT.PlayerState.PLAYING || e.data === YT.PlayerState.PAUSED) {
    state.socket.emit('playback:update', { playing, currentTime });
    updatePlayPauseBtn();
  }
}

function startHostHeartbeat() {
  if (state.syncTimer) clearInterval(state.syncTimer);
  state.syncTimer = setInterval(() => {
    if (!state.ytReady || !state.ytPlayer || !state.isHost) return;
    const playing     = state.ytPlayer.getPlayerState() === YT.PlayerState.PLAYING;
    const currentTime = state.ytPlayer.getCurrentTime() || 0;
    state.socket.emit('playback:time', { playing, currentTime });
    updateProgressBar();
  }, 2000);
}

function updateProgressBar() {
  if (!state.ytReady || !state.ytPlayer || state.progressDrag) return;
  const dur = state.ytPlayer.getDuration() || 0;
  const cur = state.ytPlayer.getCurrentTime() || 0;
  progressEl.max   = Math.floor(dur);
  progressEl.value = Math.floor(cur);
  timeDisplay.textContent = `${fmtTime(cur)} / ${fmtTime(dur)}`;
  updatePlayPauseBtn();
}

function updatePlayPauseBtn() {
  if (!state.ytPlayer) return;
  const playing = state.ytPlayer.getPlayerState() === YT.PlayerState.PLAYING;
  playPauseBtn.textContent = playing ? '⏸' : '▶';
}

function applySync(playing, currentTime) {
  if (!state.ytReady || !state.ytPlayer || state.isSyncing) return;
  state.isSyncing = true;
  const cur = state.ytPlayer.getCurrentTime() || 0;
  if (Math.abs(cur - currentTime) > 1.5) {
    state.ytPlayer.seekTo(currentTime, true);
  }
  if (playing && state.ytPlayer.getPlayerState() !== YT.PlayerState.PLAYING) {
    state.ytPlayer.playVideo();
  } else if (!playing && state.ytPlayer.getPlayerState() === YT.PlayerState.PLAYING) {
    state.ytPlayer.pauseVideo();
  }
  setTimeout(() => { state.isSyncing = false; }, 500);
}

function loadVideo(videoId, autoPlay) {
  state.videoId = videoId;
  ytPlaceholder.classList.add('hidden');
  ytContainer.classList.remove('hidden');

  if (typeof YT !== 'undefined' && YT.Player) {
    createPlayer(videoId);
  } else {
    loadYtApi(); // will call createPlayer via onYouTubeIframeAPIReady
  }
}

// ── Socket setup ───────────────────────────────────────────────
function connectSocket() {
  const socket = io({ transports: ['websocket', 'polling'] });
  state.socket = socket;
  state.myId   = null; // set on connect

  socket.on('connect', () => {
    state.myId = socket.id;
  });

  socket.on('room:created', (data) => {
    if (data.success) enterRoom(data.roomId, true, null);
    else showCreateError(data.error || 'Failed to create room');
    setLoading(false);
  });

  socket.on('room:joined', (data) => {
    if (data.success) enterRoom(data.roomId, false, data.playback);
    else showJoinError(data.error || 'Room not found');
    setLoading(false);
  });

  socket.on('room:error', (data) => {
    showCreateError(data?.error || 'Error');
    showJoinError(data?.error || 'Error');
    setLoading(false);
  });

  socket.on('room:members', (members) => {
    renderMembers(members);
  });

  socket.on('room:promoted-host', () => {
    state.isHost = true;
    viewerBanner.classList.add('hidden');
    loadYtBtn.classList.remove('hidden');
    if (state.ytReady) {
      hostControls.classList.remove('hidden');
      startHostHeartbeat();
    }
    showToast('System', '⭐ You are now the host!');
  });

  socket.on('chat:message', (msg) => {
    appendChatMessage(msg);
    if (state.overlayOn && msg.senderId !== state.myId) {
      showToast(msg.senderName, msg.message);
    }
  });

  socket.on('playback:sync', (data) => {
    if (!state.isHost) applySync(data.playing, data.currentTime);
  });

  socket.on('playback:time', (data) => {
    if (!state.isHost) applySync(data.playing, data.currentTime);
  });

  socket.on('youtube:load', (data) => {
    if (!state.isHost) loadVideo(data.videoId, true);
  });

  socket.on('disconnect', () => {
    showToast('System', 'Disconnected from server');
  });

  return socket;
}

// ── Room flow ──────────────────────────────────────────────────
function enterRoom(roomId, isHost, initialPlayback) {
  state.roomId  = roomId;
  state.isHost  = isHost;

  roomDisplay.textContent = roomId;
  landing.classList.add('hidden');
  appShell.classList.remove('hidden');

  if (isHost) {
    loadYtBtn.classList.remove('hidden');
    viewerBanner.classList.add('hidden');
  } else {
    loadYtBtn.classList.add('hidden');
    viewerBanner.classList.remove('hidden');
  }

  // Apply initial playback for joiners
  if (!isHost && initialPlayback && initialPlayback.mode === 'youtube' && initialPlayback.src) {
    loadYtApi();
    loadVideo(initialPlayback.src, false);
    // Seek once player is ready — handled by onYtReady + sync heartbeat
  }
}

function leaveRoom() {
  if (state.syncTimer) clearInterval(state.syncTimer);
  if (state.ytPlayer) {
    try { state.ytPlayer.destroy(); } catch (_) {}
    state.ytPlayer = null;
    state.ytReady  = false;
  }
  if (state.socket) state.socket.disconnect();
  state.socket   = null;
  state.roomId   = null;
  state.isHost   = false;
  state.videoId  = null;

  // Reset UI
  ytContainer.innerHTML = '';
  ytContainer.classList.add('hidden');
  ytPlaceholder.classList.remove('hidden');
  hostControls.classList.add('hidden');
  membersList.innerHTML  = '';
  chatMessages.innerHTML = '';
  appShell.classList.add('hidden');
  landing.classList.remove('hidden');
  createError.textContent = '';
  joinError.textContent   = '';
  nameInput.value = '';
  codeInput.value = '';

  // Reconnect fresh socket for next session
  connectSocket();
}

// ── Members rendering ──────────────────────────────────────────
function renderMembers(members) {
  membersList.innerHTML = '';
  members.forEach(m => {
    const el = document.createElement('div');
    el.className = 'member-item';
    el.innerHTML = `
      <div class="avatar">${m.name[0].toUpperCase()}</div>
      <span class="member-name">${esc(m.name)}${m.id === state.myId ? ' <span style="color:var(--muted);font-size:10px">(you)</span>' : ''}</span>
      ${m.isHost ? '<span class="host-badge">⭐</span>' : ''}
    `;
    membersList.appendChild(el);
  });
}

// ── Chat ───────────────────────────────────────────────────────
function appendChatMessage(msg) {
  const mine = msg.senderId === state.myId;
  const el   = document.createElement('div');
  el.className = `chat-msg${mine ? ' mine' : ''}`;
  el.innerHTML = `
    <div class="chat-sender">${esc(msg.senderName)}</div>
    <div class="chat-text">${esc(msg.message)}</div>
    <div class="chat-time">${fmtTimestamp(msg.ts)}</div>
  `;
  chatMessages.appendChild(el);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function sendChat() {
  const text = chatInput.value.trim();
  if (!text || !state.socket) return;
  state.socket.emit('chat:send', { message: text });
  chatInput.value = '';
}

// ── Toast ──────────────────────────────────────────────────────
function showToast(sender, message) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `<div class="toast-sender">${esc(sender)}</div><div class="toast-text">${esc(message)}</div>`;
  toastCont.appendChild(el);
  setTimeout(() => el.remove(), 4100);
}

// ── Modal ──────────────────────────────────────────────────────
function openModal() {
  modalUrl.value = '';
  modalOverlay.classList.remove('hidden');
  modalUrl.focus();
}
function closeModal() { modalOverlay.classList.add('hidden'); }
function confirmModal() {
  const url = modalUrl.value.trim();
  if (!url) return;
  const id = extractVideoId(url);
  if (!id) { showToast('Error', 'Invalid YouTube URL or ID'); return; }
  closeModal();
  loadVideo(id, true);
  state.socket.emit('youtube:load', { videoId: id });
}

// ── Helpers ────────────────────────────────────────────────────
function extractVideoId(url) {
  if (/^[a-zA-Z0-9_-]{11}$/.test(url)) return url;
  const m = url.match(/(?:v=|\/)([a-zA-Z0-9_-]{11})(?:[&?]|$)/);
  return m ? m[1] : null;
}

function fmtTime(secs) {
  secs = Math.floor(secs || 0);
  const m = Math.floor(secs / 60);
  const s = String(secs % 60).padStart(2, '0');
  return `${m}:${s}`;
}

function fmtTimestamp(ts) {
  const d = new Date(ts);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setLoading(on) {
  createBtn.disabled = on;
  joinBtn.disabled   = on;
}

function showCreateError(msg) { createError.textContent = msg; }
function showJoinError(msg)   { joinError.textContent   = msg; }

// ── Event listeners ────────────────────────────────────────────
createBtn.addEventListener('click', () => {
  const name = nameInput.value.trim();
  if (!name) { showCreateError('Enter your name'); return; }
  showCreateError('');
  showJoinError('');
  setLoading(true);
  state.socket.emit('room:create', { name });
  state.myName = name;
});

joinBtn.addEventListener('click', () => {
  const name = nameInput.value.trim();
  const code = codeInput.value.trim().toUpperCase();
  if (!name)          { showJoinError('Enter your name'); return; }
  if (code.length !== 6) { showJoinError('Room code must be 6 characters'); return; }
  showCreateError('');
  showJoinError('');
  setLoading(true);
  state.socket.emit('room:join', { name, roomId: code });
  state.myName = name;
});

nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') createBtn.click(); });
codeInput.addEventListener('keydown', e => { if (e.key === 'Enter') joinBtn.click(); });
codeInput.addEventListener('input',   e => { e.target.value = e.target.value.toUpperCase(); });

leaveBtn.addEventListener('click', leaveRoom);

loadYtBtn.addEventListener('click', openModal);
modalCancel.addEventListener('click', closeModal);
modalOk.addEventListener('click', confirmModal);
modalUrl.addEventListener('keydown', e => { if (e.key === 'Enter') confirmModal(); });
modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });

overlayBtn.addEventListener('click', () => {
  state.overlayOn = !state.overlayOn;
  overlayBtn.style.opacity = state.overlayOn ? '1' : '0.45';
});

roomBadge.addEventListener('click', () => {
  navigator.clipboard.writeText(state.roomId || '').then(() => {
    showToast('Copied!', `Room code ${state.roomId} copied to clipboard`);
  });
});

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    $(`tab-${tab.dataset.tab}`).classList.add('active');
  });
});

// Host controls
playPauseBtn.addEventListener('click', () => {
  if (!state.ytReady || !state.ytPlayer) return;
  const playing = state.ytPlayer.getPlayerState() === YT.PlayerState.PLAYING;
  if (playing) state.ytPlayer.pauseVideo();
  else         state.ytPlayer.playVideo();
});

muteBtn.addEventListener('click', () => {
  if (!state.ytReady || !state.ytPlayer) return;
  state.muted = !state.muted;
  state.muted ? state.ytPlayer.mute() : state.ytPlayer.unMute();
  muteBtn.textContent = state.muted ? '🔇' : '🔊';
});

progressEl.addEventListener('mousedown', () => { state.progressDrag = true; });
progressEl.addEventListener('mouseup',   () => {
  state.progressDrag = false;
  if (!state.ytReady || !state.ytPlayer) return;
  state.ytPlayer.seekTo(Number(progressEl.value), true);
  state.socket.emit('playback:update', {
    playing: state.ytPlayer.getPlayerState() === YT.PlayerState.PLAYING,
    currentTime: Number(progressEl.value),
  });
});
progressEl.addEventListener('input', () => {
  timeDisplay.textContent = `${fmtTime(progressEl.value)} / ${fmtTime(state.ytPlayer?.getDuration() || 0)}`;
});

chatSend.addEventListener('click',  sendChat);
chatInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendChat(); });

// ── Boot ───────────────────────────────────────────────────────
connectSocket();
</script>
</body>
</html>
