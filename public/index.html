<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Watch Party 🎬</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://www.youtube.com/iframe_api"></script>
<script src="/socket.io/socket.io.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --sur2: #1a1a26;
    --accent: #7c3aed;
    --accent2: #a855f7;
    --text: #f0eeff;
    --muted: #8884a8;
    --border: rgba(255,255,255,0.07);
    --success: #10b981;
    --danger: #ef4444;
  }
  
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    height: 100vh;
  }
  
  /* Lobby */
  #lobby {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(124,58,237,0.15), var(--bg));
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px;
    width: 420px;
    max-width: 90vw;
    animation: slideUp 0.4s ease;
  }
  
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(135deg, #a78bfa, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  
  .sub {
    color: var(--muted);
    font-size: 13px;
    margin: 8px 0 32px 0;
  }
  
  .tabs {
    display: flex;
    gap: 8px;
    background: rgba(255,255,255,0.05);
    padding: 4px;
    border-radius: 12px;
    margin-bottom: 24px;
  }
  
  .tab {
    flex: 1;
    padding: 10px;
    background: transparent;
    border: none;
    color: var(--muted);
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
  }
  
  .tab.active {
    background: var(--accent);
    color: white;
  }
  
  .field {
    margin-bottom: 16px;
  }
  
  .field label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  
  .field input {
    width: 100%;
    padding: 12px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 14px;
    outline: none;
  }
  
  .field input:focus {
    border-color: var(--accent);
  }
  
  .btn {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    color: white;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: 0.2s;
  }
  
  .btn:hover {
    background: var(--accent2);
    transform: translateY(-1px);
  }
  
  .err {
    color: var(--danger);
    font-size: 12px;
    margin-top: 12px;
    text-align: center;
  }
  
  /* App */
  #app {
    display: none;
    height: 100vh;
    flex-direction: column;
  }
  
  #app.active {
    display: flex;
  }
  
  .topbar {
    height: 56px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
  }
  
  .room-info {
    background: rgba(255,255,255,0.05);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  
  .copy-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
  }
  
  .host-badge {
    background: var(--accent);
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
  }
  
  .member-count {
    font-size: 12px;
    color: var(--muted);
  }
  
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }
  
  /* Video Panel */
  .video-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #000;
  }
  
  .url-bar {
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  
  .url-bar input {
    flex: 1;
    padding: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 13px;
    min-width: 200px;
  }
  
  .url-bar button {
    padding: 10px 20px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: white;
    font-weight: 600;
    cursor: pointer;
  }
  
  .url-bar button:hover {
    background: var(--accent2);
  }
  
  .video-type-buttons {
    display: flex;
    gap: 8px;
    padding: 8px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  
  .type-btn {
    padding: 6px 14px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    transition: 0.2s;
  }
  
  .type-btn.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  
  .type-btn:hover:not(.active) {
    background: var(--sur2);
    color: var(--text);
  }
  
  .player-container {
    flex: 1;
    position: relative;
    background: #000;
    min-height: 300px;
  }
  
  .video-wrapper {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  iframe {
    width: 100%;
    height: 100%;
    border: none;
  }
  
  video {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  
  .placeholder {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: var(--muted);
    z-index: 10;
  }
  
  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }
  
  .control-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: 0.2s;
  }
  
  .control-btn:hover:not(:disabled) {
    background: var(--accent);
    border-color: var(--accent);
  }
  
  .control-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  
  .seek-bar {
    flex: 1;
    height: 4px;
    border-radius: 2px;
    background: var(--sur2);
    -webkit-appearance: none;
  }
  
  .seek-bar::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }
  
  .time {
    font-size: 12px;
    font-family: monospace;
    color: var(--muted);
  }
  
  .volume-slider {
    width: 80px;
    height: 4px;
    -webkit-appearance: none;
    background: var(--sur2);
    border-radius: 2px;
  }
  
  .volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }
  
  /* Sidebar */
  .sidebar {
    width: 280px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }
  
  .members-section {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    max-height: 200px;
    overflow-y: auto;
  }
  
  .section-title {
    font-size: 11px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    font-weight: 600;
  }
  
  .member-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  
  .member-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    padding: 4px;
  }
  
  .member-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 12px;
  }
  
  .host-tag {
    font-size: 9px;
    background: var(--accent);
    padding: 2px 6px;
    border-radius: 10px;
    margin-left: auto;
  }
  
  .chat-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  
  .message {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  
  .message.system {
    align-items: center;
  }
  
  .system-text {
    font-size: 11px;
    background: rgba(255,255,255,0.05);
    padding: 4px 12px;
    border-radius: 20px;
    color: var(--muted);
  }
  
  .message-header {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
  }
  
  .message-name {
    font-weight: 600;
  }
  
  .message-time {
    color: var(--muted);
    font-size: 10px;
  }
  
  .message-bubble {
    background: rgba(255,255,255,0.05);
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 13px;
    max-width: 220px;
    word-wrap: break-word;
  }
  
  .message.mine {
    align-items: flex-end;
  }
  
  .message.mine .message-bubble {
    background: var(--accent);
  }
  
  .chat-input {
    display: flex;
    gap: 8px;
    padding: 12px;
    border-top: 1px solid var(--border);
  }
  
  .chat-input input {
    flex: 1;
    padding: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text);
    outline: none;
  }
  
  .chat-input button {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    color: white;
    cursor: pointer;
  }
  
  #toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--sur2);
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    z-index: 1000;
    opacity: 0;
    transition: 0.2s;
    pointer-events: none;
    white-space: nowrap;
    max-width: 90vw;
    white-space: normal;
    text-align: center;
  }
  
  #toast.show {
    opacity: 1;
  }
  
  @media (max-width: 700px) {
    .sidebar { width: 240px; }
    .message-bubble { max-width: 160px; }
  }
  
  @media (max-width: 550px) {
    .main { flex-direction: column; }
    .sidebar { width: 100%; max-height: 280px; }
    .url-bar { flex-direction: column; }
    .url-bar input { width: 100%; }
    .url-bar button { width: 100%; }
    .controls { gap: 8px; }
    .control-btn { width: 36px; height: 36px; }
  }
</style>
</head>
<body>

<div id="lobby">
  <div class="card">
    <div class="logo">Watch Party</div>
    <p class="sub">Watch videos with friends — perfectly synced!</p>
    <div class="tabs">
      <button class="tab active" id="tabCreate">Create Room</button>
      <button class="tab" id="tabJoin">Join Room</button>
    </div>
    <div id="createForm">
      <div class="field">
        <label>Your Name</label>
        <input type="text" id="createName" placeholder="e.g. Alex" maxlength="24">
      </div>
      <button class="btn" id="createRoomBtn">🚀 Create Room</button>
    </div>
    <div id="joinForm" style="display: none;">
      <div class="field">
        <label>Your Name</label>
        <input type="text" id="joinName" placeholder="e.g. Sam" maxlength="24">
      </div>
      <div class="field">
        <label>Room Code</label>
        <input type="text" id="joinCode" placeholder="e.g. AB12CD" maxlength="6" style="text-transform: uppercase;">
      </div>
      <button class="btn" id="joinRoomBtn">🔗 Join Room</button>
    </div>
    <div class="err" id="lobbyError"></div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
      <span style="font-weight: 800;">🎬 Watch Party</span>
      <div class="room-info">
        <span>Room: <strong id="roomCode">------</strong></span>
        <button class="copy-btn" id="copyRoomCode">📋</button>
      </div>
      <span class="host-badge" id="hostBadge" style="display: none;">HOST</span>
    </div>
    <span class="member-count" id="memberCount">0/20 members</span>
  </div>
  
  <div class="main">
    <div class="video-panel">
      <div class="url-bar" id="hostControls">
        <input type="text" id="videoUrl" placeholder="Paste video URL (YouTube, MP4, etc.)">
        <button id="loadVideoBtn">🎬 Load Video</button>
      </div>
      <div class="url-bar" id="guestControls" style="display: none;">
        <span style="color: var(--muted);">⏳ Waiting for host to load a video...</span>
      </div>
      
      <div class="video-type-buttons" id="videoTypeSelector">
        <button class="type-btn active" data-type="youtube">YouTube</button>
        <button class="type-btn" data-type="vimeo">Vimeo</button>
        <button class="type-btn" data-type="mp4">MP4 Video</button>
        <button class="type-btn" data-type="embed">Embed Link</button>
      </div>
      
      <div class="player-container">
        <div class="video-wrapper" id="videoWrapper">
          <div class="placeholder" id="placeholder">
            <div style="font-size: 48px; margin-bottom: 12px;">🎬</div>
            <p>No video loaded</p>
            <p style="font-size: 12px; margin-top: 8px;">Host: Paste a URL and click Load</p>
            <p style="font-size: 11px; margin-top: 8px; color: var(--muted);">Supports: YouTube, Vimeo, MP4, WebM, and any embeddable video</p>
          </div>
        </div>
      </div>
      
      <div class="controls">
        <button class="control-btn" id="playPauseBtn" disabled>▶</button>
        <input type="range" class="seek-bar" id="seekBar" min="0" max="100" value="0" disabled>
        <span class="time" id="timeDisplay">0:00 / 0:00</span>
        <div style="display: flex; align-items: center; gap: 6px;">
          <span>🔊</span>
          <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80">
        </div>
      </div>
    </div>
    
    <div class="sidebar">
      <div class="members-section">
        <div class="section-title">👥 Members</div>
        <div class="member-list" id="membersList"></div>
      </div>
      <div class="chat-section">
        <div class="section-title" style="padding: 0 12px;">💬 Chat</div>
        <div class="messages" id="messages"></div>
        <div class="chat-input">
          <input type="text" id="chatMessage" placeholder="Say something..." maxlength="300">
          <button id="sendBtn">➤</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// Global variables
let socket;
let myId;
let myName;
let roomId;
let isHost = false;
let currentVideoType = 'youtube';
let currentPlayer = null;
let playerReady = false;
let isSeeking = false;
let syncInterval;
let currentVideoUrl = null;

// Helper functions
function showToast(msg, duration = 3000) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), duration);
}

function showError(msg) {
  document.getElementById('lobbyError').textContent = msg;
}

function formatTime(seconds) {
  if (isNaN(seconds) || !isFinite(seconds)) return '0:00';
  const mins = Math.floor(seconds / 60);
  const secs = Math.floor(seconds % 60);
  return `${mins}:${secs.toString().padStart(2, '0')}`;
}

// Extract video ID from YouTube URL
function extractYouTubeId(url) {
  const patterns = [
    /(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&?#]+)/,
    /youtube\.com\/embed\/([^?]+)/
  ];
  for (const pattern of patterns) {
    const match = url.match(pattern);
    if (match) return match[1];
  }
  return null;
}

// Extract Vimeo ID
function extractVimeoId(url) {
  const match = url.match(/vimeo\.com\/(\d+)/);
  return match ? match[1] : null;
}

// Render video based on type
function renderVideo(url, type, currentTime = 0, isPlaying = false) {
  const wrapper = document.getElementById('videoWrapper');
  const placeholder = document.getElementById('placeholder');
  
  // Clear existing player
  if (currentPlayer) {
    wrapper.innerHTML = '';
    currentPlayer = null;
  }
  
  placeholder.style.display = 'none';
  playerReady = false;
  
  try {
    switch(type) {
      case 'youtube':
        const youtubeId = extractYouTubeId(url);
        if (!youtubeId) {
          showToast('❌ Invalid YouTube URL');
          return false;
        }
        const youtubeIframe = document.createElement('iframe');
        youtubeIframe.src = `https://www.youtube.com/embed/${youtubeId}?enablejsapi=1&controls=0&start=${Math.floor(currentTime)}&autoplay=${isPlaying ? 1 : 0}`;
        youtubeIframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
        youtubeIframe.allowFullscreen = true;
        wrapper.appendChild(youtubeIframe);
        currentPlayer = youtubeIframe;
        playerReady = true;
        break;
        
      case 'vimeo':
        const vimeoId = extractVimeoId(url);
        if (!vimeoId) {
          showToast('❌ Invalid Vimeo URL');
          return false;
        }
        const vimeoIframe = document.createElement('iframe');
        vimeoIframe.src = `https://player.vimeo.com/video/${vimeoId}?autoplay=${isPlaying ? 1 : 0}#t=${currentTime}`;
        vimeoIframe.allow = 'autoplay; fullscreen';
        vimeoIframe.allowFullscreen = true;
        wrapper.appendChild(vimeoIframe);
        currentPlayer = vimeoIframe;
        playerReady = true;
        break;
        
      case 'mp4':
        const video = document.createElement('video');
        video.src = url;
        video.currentTime = currentTime;
        video.autoplay = isPlaying;
        video.controls = false;
        video.style.width = '100%';
        video.style.height = '100%';
        
        video.addEventListener('loadedmetadata', () => {
          playerReady = true;
          if (currentTime > 0) video.currentTime = currentTime;
        });
        
        video.addEventListener('play', () => {
          if (isHost) socket.emit('play_video', { currentTime: video.currentTime });
        });
        
        video.addEventListener('pause', () => {
          if (isHost) socket.emit('pause_video', { currentTime: video.currentTime });
        });
        
        video.addEventListener('seeked', () => {
          if (isHost && isSeeking) {
            socket.emit('seek_video', { currentTime: video.currentTime });
            isSeeking = false;
          }
        });
        
        video.addEventListener('timeupdate', () => {
          if (!isSeeking && playerReady) {
            const seekBar = document.getElementById('seekBar');
            const timeDisplay = document.getElementById('timeDisplay');
            if (video.duration) {
              const percent = (video.currentTime / video.duration) * 100;
              seekBar.value = percent;
              timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
            }
          }
        });
        
        wrapper.appendChild(video);
        currentPlayer = video;
        break;
        
      case 'embed':
        const embedIframe = document.createElement('iframe');
        embedIframe.src = url;
        embedIframe.allowFullscreen = true;
        wrapper.appendChild(embedIframe);
        currentPlayer = embedIframe;
        playerReady = true;
        break;
    }
    
    showToast(`✅ Video loaded (${type.toUpperCase()})`);
    return true;
    
  } catch (error) {
    console.error('Render error:', error);
    showToast('❌ Failed to load video');
    placeholder.style.display = 'flex';
    return false;
  }
}

// Socket event handlers
function initSocket(name, callback) {
  socket = io({ transports: ['websocket', 'polling'] });
  
  socket.on('connect', () => {
    myId = socket.id;
    myName = name;
    callback();
  });
  
  socket.on('connect_error', () => showError('Cannot connect to server'));
  socket.on('disconnect', () => showToast('⚠️ Disconnected from server'));
  
  socket.on('room_update', (info) => updateRoomUI(info));
  
  socket.on('you_are_host', () => {
    isHost = true;
    updateUI();
    showToast('👑 You are now the host!');
  });
  
  socket.on('host_changed', () => {
    isHost = false;
    updateUI();
    showToast('Host left - you are now a viewer');
  });
  
  socket.on('video_loaded', ({ videoUrl, videoType, currentTime, isPlaying }) => {
    currentVideoUrl = videoUrl;
    currentVideoType = videoType;
    renderVideo(videoUrl, videoType, currentTime, isPlaying);
  });
  
  socket.on('video_play', ({ currentTime }) => {
    if (!isHost && currentPlayer && currentPlayer.tagName === 'VIDEO') {
      currentPlayer.currentTime = currentTime;
      currentPlayer.play();
    }
  });
  
  socket.on('video_pause', ({ currentTime }) => {
    if (!isHost && currentPlayer && currentPlayer.tagName === 'VIDEO') {
      currentPlayer.currentTime = currentTime;
      currentPlayer.pause();
    }
  });
  
  socket.on('video_seek', ({ currentTime }) => {
    if (!isHost && currentPlayer && currentPlayer.tagName === 'VIDEO') {
      currentPlayer.currentTime = currentTime;
    }
  });
  
  socket.on('sync_response', ({ isPlaying, currentTime }) => {
    if (!isHost && currentPlayer && currentPlayer.tagName === 'VIDEO') {
      const diff = Math.abs(currentPlayer.currentTime - currentTime);
      if (diff > 1.5) {
        currentPlayer.currentTime = currentTime;
      }
      if (isPlaying && currentPlayer.paused) {
        currentPlayer.play();
      } else if (!isPlaying && !currentPlayer.paused) {
        currentPlayer.pause();
      }
    }
  });
  
  socket.on('chat_message', (msg) => addChatMessage(msg));
}

function updateUI() {
  const hostControls = document.getElementById('hostControls');
  const guestControls = document.getElementById('guestControls');
  const hostBadge = document.getElementById('hostBadge');
  const playPauseBtn = document.getElementById('playPauseBtn');
  const seekBar = document.getElementById('seekBar');
  const typeSelector = document.getElementById('videoTypeSelector');
  
  if (isHost) {
    hostControls.style.display = 'flex';
    guestControls.style.display = 'none';
    hostBadge.style.display = 'inline-block';
    playPauseBtn.disabled = false;
    seekBar.disabled = false;
    typeSelector.style.display = 'flex';
  } else {
    hostControls.style.display = 'none';
    guestControls.style.display = 'flex';
    hostBadge.style.display = 'none';
    playPauseBtn.disabled = true;
    seekBar.disabled = true;
    typeSelector.style.display = 'none';
  }
}

function updateRoomUI(info) {
  document.getElementById('memberCount').textContent = `${info.members.length}/20 members`;
  const membersList = document.getElementById('membersList');
  membersList.innerHTML = '';
  
  info.members.forEach(m => {
    const div = document.createElement('div');
    div.className = 'member-item';
    
    const avatar = document.createElement('div');
    avatar.className = 'member-avatar';
    avatar.style.background = m.color + '33';
    avatar.style.color = m.color;
    avatar.textContent = m.name[0].toUpperCase();
    
    const nameSpan = document.createElement('span');
    nameSpan.textContent = m.name;
    nameSpan.style.flex = '1';
    
    div.appendChild(avatar);
    div.appendChild(nameSpan);
    
    if (m.id === info.host) {
      const tag = document.createElement('span');
      tag.className = 'host-tag';
      tag.textContent = 'HOST';
      div.appendChild(tag);
    }
    
    membersList.appendChild(div);
  });
}

function addChatMessage(msg) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message';
  
  if (msg.system) {
    div.classList.add('system');
    const sysText = document.createElement('div');
    sysText.className = 'system-text';
    sysText.textContent = msg.text;
    div.appendChild(sysText);
  } else {
    const mine = msg.senderId === myId;
    if (mine) div.classList.add('mine');
    
    const header = document.createElement('div');
    header.className = 'message-header';
    const name = document.createElement('span');
    name.className = 'message-name';
    name.style.color = msg.color;
    name.textContent = mine ? 'You' : msg.name;
    const time = document.createElement('span');
    time.className = 'message-time';
    time.textContent = new Date(msg.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    header.appendChild(name);
    header.appendChild(time);
    
    const bubble = document.createElement('div');
    bubble.className = 'message-bubble';
    bubble.textContent = msg.text;
    
    div.appendChild(header);
    div.appendChild(bubble);
  }
  
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

// Room actions
function createRoom() {
  const name = document.getElementById('createName').value.trim();
  if (!name) {
    showError('Enter your name');
    return;
  }
  
  initSocket(name, () => {
    socket.emit('create_room', { name }, (res) => {
      if (!res.ok) {
        showError(res.error);
        return;
      }
      isHost = true;
      roomId = res.roomId;
      enterApp(res.info);
    });
  });
}

function joinRoom() {
  const name = document.getElementById('joinName').value.trim();
  const code = document.getElementById('joinCode').value.trim().toUpperCase();
  
  if (!name) {
    showError('Enter your name');
    return;
  }
  if (!code) {
    showError('Enter room code');
    return;
  }
  
  initSocket(name, () => {
    socket.emit('join_room', { roomId: code, name }, (res) => {
      if (!res.ok) {
        showError(res.error);
        return;
      }
      isHost = false;
      roomId = res.roomId;
      enterApp(res.info);
    });
  });
}

function enterApp(info) {
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('app').classList.add('active');
  document.getElementById('roomCode').textContent = roomId;
  updateRoomUI(info);
  updateUI();
  
  if (info.videoUrl) {
    currentVideoUrl = info.videoUrl;
    currentVideoType = info.videoType || 'youtube';
    renderVideo(info.videoUrl, currentVideoType, info.currentTime, info.isPlaying);
  }
  
  // Sync interval for guests
  setInterval(() => {
    if (!isHost && currentPlayer && currentPlayer.tagName === 'VIDEO') {
      socket.emit('sync_request');
    }
  }, 3000);
}

// Load video (host only)
function loadVideo() {
  if (!isHost) return;
  
  const url = document.getElementById('videoUrl').value.trim();
  if (!url) {
    showToast('Please enter a video URL');
    return;
  }
  
  // Validate based on type
  if (currentVideoType === 'youtube' && !extractYouTubeId(url)) {
    showToast('❌ Invalid YouTube URL');
    return;
  }
  
  if (currentVideoType === 'vimeo' && !extractVimeoId(url)) {
    showToast('❌ Invalid Vimeo URL');
    return;
  }
  
  if (currentVideoType === 'mp4' && !url.match(/\.(mp4|webm|mov|mkv)(\?|$)/i)) {
    showToast('⚠️ Make sure this is a direct video file URL (.mp4, .webm, etc.)');
  }
  
  // Test render locally first
  const testRender = renderVideo(url, currentVideoType, 0, false);
  if (!testRender) return;
  
  // Send to server
  socket.emit('load_video', { videoUrl: url, videoType: currentVideoType }, (res) => {
    if (res.success) {
      showToast('✅ Video loaded for everyone!');
      currentVideoUrl = url;
    } else {
      showToast('❌ Failed to load video on server');
    }
  });
}

// Video type selector
document.querySelectorAll('.type-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentVideoType = btn.dataset.type;
    
    // Update placeholder text
    const placeholder = document.getElementById('placeholder');
    if (placeholder.style.display !== 'none') {
      const urlInput = document.getElementById('videoUrl');
      if (currentVideoType === 'youtube') urlInput.placeholder = 'Paste YouTube URL (e.g., https://youtube.com/watch?v=...)';
      else if (currentVideoType === 'vimeo') urlInput.placeholder = 'Paste Vimeo URL (e.g., https://vimeo.com/123456789)';
      else if (currentVideoType === 'mp4') urlInput.placeholder = 'Paste direct MP4/Video URL (e.g., https://example.com/video.mp4)';
      else urlInput.placeholder = 'Paste embed URL (e.g., https://... embed link)';
    }
  });
});

// Event listeners
document.getElementById('tabCreate').addEventListener('click', () => {
  document.getElementById('createForm').style.display = 'block';
  document.getElementById('joinForm').style.display = 'none';
  document.getElementById('tabCreate').classList.add('active');
  document.getElementById('tabJoin').classList.remove('active');
  document.getElementById('lobbyError').textContent = '';
});

document.getElementById('tabJoin').addEventListener('click', () => {
  document.getElementById('createForm').style.display = 'none';
  document.getElementById('joinForm').style.display = 'block';
  document.getElementById('tabJoin').classList.add('active');
  document.getElementById('tabCreate').classList.remove('active');
  document.getElementById('lobbyError').textContent = '';
});

document.getElementById('createRoomBtn').addEventListener('click', createRoom);
document.getElementById('joinRoomBtn').addEventListener('click', joinRoom);

document.getElementById('copyRoomCode').addEventListener('click', () => {
  if (roomId) {
    navigator.clipboard.writeText(roomId);
    showToast('Room code copied!');
  }
});

document.getElementById('loadVideoBtn').addEventListener('click', loadVideo);
document.getElementById('videoUrl').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') loadVideo();
});

// Video controls for native player
document.getElementById('playPauseBtn').addEventListener('click', () => {
  if (!isHost || !currentPlayer || currentPlayer.tagName !== 'VIDEO') return;
  if (currentPlayer.paused) {
    currentPlayer.play();
  } else {
    currentPlayer.pause();
  }
});

document.getElementById('seekBar').addEventListener('input', (e) => {
  if (!isHost || !currentPlayer || currentPlayer.tagName !== 'VIDEO') return;
  isSeeking = true;
  const percent = parseFloat(e.target.value);
  const time = (percent / 100) * currentPlayer.duration;
  currentPlayer.currentTime = time;
});

document.getElementById('seekBar').addEventListener('change', () => {
  if (!isHost || !currentPlayer || currentPlayer.tagName !== 'VIDEO') return;
  socket.emit('seek_video', { currentTime: currentPlayer.currentTime });
  setTimeout(() => { isSeeking = false; }, 100);
});

document.getElementById('volumeSlider').addEventListener('input', (e) => {
  if (currentPlayer && currentPlayer.tagName === 'VIDEO') {
    currentPlayer.volume = parseFloat(e.target.value) / 100;
  }
});

// Chat
document.getElementById('sendBtn').addEventListener('click', () => {
  const input = document.getElementById('chatMessage');
  const text = input.value.trim();
  if (!text) return;
  socket.emit('chat_send', { text });
  input.value = '';
});

document.getElementById('chatMessage').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    document.getElementById('sendBtn').click();
  }
});
</script>
