<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>WatchTogether Stream 🎬</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="/socket.io/socket.io.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --sur2: #1a1a26;
    --sur3: #22223a;
    --border: rgba(255,255,255,0.07);
    --accent: #7c3aed;
    --accent2: #a855f7;
    --glow: rgba(124,58,237,0.35);
    --text: #f0eeff;
    --muted: #8884a8;
    --danger: #ef4444;
    --success: #10b981;
    --font-h: 'Syne', sans-serif;
    --font-b: 'DM Sans', sans-serif;
  }
  html, body { height:100%; background:var(--bg); color:var(--text); font-family:var(--font-b); overflow:hidden; }
  
  @media (max-width: 768px) {
    .card { padding: 32px 24px !important; width: 90% !important; }
    .sidebar { width: 260px !important; }
    .controls { gap: 8px !important; }
  }
  
  @media (max-width: 550px) {
    .main { flex-direction: column !important; }
    .sidebar { width: 100% !important; max-height: 280px !important; }
    .urlbar { flex-direction: column !important; }
    #urlInput { width: 100% !important; }
    .load-btn { width: 100% !important; }
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--sur2); }
  ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 99px; }

  #lobby {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(124,58,237,0.18), transparent 70%), var(--bg);
    padding: 20px;
  }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 24px;
    padding: 44px 40px; width: 420px; max-width: 100%;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    animation: fadeUp 0.4s ease;
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: none; } }
  .logo { font-family: var(--font-h); font-size: 28px; font-weight: 800; background: linear-gradient(135deg, #a78bfa, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 32px; margin-top: 4px; }
  .tabs { display: flex; gap: 4px; background: var(--sur2); border-radius: 10px; padding: 4px; margin-bottom: 28px; }
  .tab { flex: 1; padding: 9px; border: none; background: transparent; color: var(--muted);
    font-family: var(--font-h); font-size: 13px; font-weight: 700; border-radius: 8px; cursor: pointer; transition: 0.18s ease; }
  .tab.active { background: var(--accent); color: #fff; box-shadow: 0 4px 16px var(--glow); }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; }
  .field input {
    width: 100%; padding: 12px 14px; background: var(--sur2); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text); font-size: 14px; outline: none;
  }
  .field input:focus { border-color: var(--accent); }
  .btn {
    width: 100%; padding: 13px; background: var(--accent); border: none; border-radius: 12px;
    color: #fff; font-family: var(--font-h); font-size: 15px; font-weight: 700; cursor: pointer;
    transition: 0.18s ease; box-shadow: 0 4px 24px var(--glow);
  }
  .btn:hover { background: var(--accent2); transform: translateY(-1px); }
  .err { color: var(--danger); font-size: 12px; margin-top: 10px; text-align: center; }

  #app { display: none; height: 100vh; flex-direction: column; }
  #app.on { display: flex; }
  .topbar {
    height: 56px; display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; background: var(--surface); border-bottom: 1px solid var(--border);
  }
  .tl { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .logo-sm { font-family: var(--font-h); font-weight: 800; font-size: 17px;
    background: linear-gradient(135deg, #a78bfa, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .room-pill { background: var(--sur2); border: 1px solid var(--border); border-radius: 99px;
    padding: 5px 14px; font-size: 12px; display: flex; align-items: center; gap: 8px; }
  .rid { font-family: var(--font-h); font-weight: 700; letter-spacing: 2px; }
  .copy-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 11px; padding: 4px; }
  .copy-btn:hover { color: var(--accent2); }
  .host-badge { background: var(--accent); color: #fff; font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 99px; }
  .main { display: flex; flex: 1; overflow: hidden; }

  .vpanel { flex: 1; display: flex; flex-direction: column; background: #000; min-width: 0; }
  .urlbar { display: flex; gap: 10px; padding: 12px 16px; background: var(--surface); border-bottom: 1px solid var(--border); }
  #urlInput { flex: 1; padding: 10px 14px; background: var(--sur2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 13px; outline: none; }
  #urlInput:focus { border-color: var(--accent); }
  .load-btn { padding: 10px 24px; background: var(--accent); border: none; border-radius: 10px; color: #fff; font-weight: 700; cursor: pointer; }
  .load-btn:hover { background: var(--accent2); }
  
  .video-container {
    flex: 1;
    position: relative;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  video {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .video-info {
    position: absolute;
    bottom: 20px;
    left: 20px;
    background: rgba(0,0,0,0.7);
    padding: 8px 16px;
    border-radius: 99px;
    font-size: 12px;
    backdrop-filter: blur(4px);
    pointer-events: none;
  }
  
  .controls {
    display: flex; align-items: center; gap: 12px; padding: 12px 16px;
    background: var(--surface); border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .cbtn {
    width: 40px; height: 40px; border-radius: 50%; background: var(--sur2);
    border: 1px solid var(--border); color: var(--text); font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .cbtn:hover:not(:disabled) { background: var(--accent); border-color: var(--accent); }
  .cbtn:disabled { opacity: 0.35; cursor: not-allowed; }
  .seek {
    flex: 1; height: 4px; border-radius: 99px; background: var(--sur3);
    -webkit-appearance: none; cursor: pointer;
  }
  .seek::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent2); cursor: pointer;
  }
  .time { font-size: 12px; color: var(--muted); font-family: monospace; }
  .vol-wrap { display: flex; align-items: center; gap: 8px; }
  .vol-sl { width: 80px; height: 4px; border-radius: 99px; background: var(--sur3); cursor: pointer; }

  .sidebar { width: 300px; display: flex; flex-direction: column; background: var(--surface); border-left: 1px solid var(--border); }
  .members-panel { padding: 14px 16px; border-bottom: 1px solid var(--border); }
  .ptitle { font-family: var(--font-h); font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
  .mlist { display: flex; flex-direction: column; gap: 6px; max-height: 140px; overflow-y: auto; }
  .mrow { display: flex; align-items: center; gap: 9px; padding: 6px 8px; border-radius: 8px; }
  .mrow:hover { background: var(--sur2); }
  .mav { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; }
  .mtag { font-size: 10px; color: var(--muted); background: var(--sur3); padding: 2px 8px; border-radius: 99px; }
  .chat-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .chat-msgs { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
  .cmsg { display: flex; flex-direction: column; gap: 4px; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  .cmsg.sys { align-items: center; }
  .sys-text { font-size: 11px; color: var(--muted); background: var(--sur2); padding: 4px 12px; border-radius: 99px; }
  .chdr { display: flex; align-items: center; gap: 8px; }
  .cname { font-size: 12px; font-weight: 700; }
  .cts { font-size: 10px; color: var(--muted); }
  .cbub { background: var(--sur2); border: 1px solid var(--border); border-radius: 4px 12px 12px 12px;
    padding: 8px 12px; font-size: 13px; max-width: 220px; word-break: break-word; }
  .cmsg.mine .cbub { background: var(--accent); border-color: var(--accent); border-radius: 12px 12px 4px 12px; }
  .cmsg.mine { align-items: flex-end; }
  .cinput-row { display: flex; gap: 8px; padding: 12px; border-top: 1px solid var(--border); background: var(--surface); }
  #chatInput { flex: 1; padding: 10px 12px; background: var(--sur2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); outline: none; }
  .send-btn { width: 40px; height: 40px; border-radius: 10px; background: var(--accent); border: none; color: #fff; cursor: pointer; }

  .placeholder {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: var(--muted);
  }
  .placeholder .ico { font-size: 48px; margin-bottom: 16px; }
  
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--sur2); border: 1px solid var(--border);
    padding: 10px 20px; border-radius: 99px; font-size: 13px; z-index: 999;
    pointer-events: none; opacity: 0; transition: opacity 0.3s;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="lobby">
  <div class="card">
    <div class="logo">WatchTogether Stream</div>
    <p class="sub">Server-streamed video — no lag for anyone!</p>
    <div class="tabs">
      <button class="tab active" id="tabC">Create Room</button>
      <button class="tab" id="tabJ">Join Room</button>
    </div>
    <div id="createForm">
      <div class="field"><label>Your Name</label>
        <input id="createName" type="text" placeholder="e.g. Alex" maxlength="24"/></div>
      <button class="btn" id="createBtn">🚀 Create Room</button>
    </div>
    <div id="joinForm" style="display:none">
      <div class="field"><label>Your Name</label>
        <input id="joinName" type="text" placeholder="e.g. Sam" maxlength="24"/></div>
      <div class="field"><label>Room Code</label>
        <input id="joinCode" type="text" placeholder="e.g. AB12CD" maxlength="6" style="text-transform:uppercase"/></div>
      <button class="btn" id="joinBtn">🔗 Join Room</button>
    </div>
    <div class="err" id="lobbyErr"></div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="tl">
      <span class="logo-sm">WatchTogether</span>
      <div class="room-pill">
        Room: <span class="rid" id="dispRoom">------</span>
        <button class="copy-btn" id="copyCodeBtn">📋 copy</button>
      </div>
      <span class="host-badge" id="hostBadge" style="display:none">HOST</span>
    </div>
    <span id="memberCount">0/10 members</span>
  </div>

  <div class="main">
    <div class="vpanel">
      <div class="urlbar" id="hostBar">
        <input id="urlInput" type="text" placeholder="Paste YouTube URL here"/>
        <button class="load-btn" id="loadVideoBtn">🎬 Load Video</button>
      </div>
      <div class="urlbar" id="guestBar" style="display:none">
        <span style="color:var(--muted);font-size:13px;">⏳ Waiting for host to load a video...</span>
      </div>

      <div class="video-container" id="videoContainer">
        <video id="videoPlayer" controls playsinline></video>
        <div class="video-info" id="videoInfo" style="display:none;"></div>
        <div class="placeholder" id="placeholder">
          <div class="ico">🎬</div>
          <p>No video loaded</p>
          <p style="font-size:12px;">Host will load a video for everyone</p>
        </div>
      </div>

      <div class="controls">
        <button class="cbtn" id="playPauseBtn" disabled>▶</button>
        <input type="range" class="seek" id="seekBar" min="0" max="100" value="0" disabled/>
        <span class="time" id="timeDisplay">0:00 / 0:00</span>
        <div class="vol-wrap">
          <span>🔊</span>
          <input type="range" class="vol-sl" id="volumeSlider" min="0" max="100" value="80"/>
        </div>
      </div>
    </div>

    <div class="sidebar">
      <div class="members-panel">
        <div class="ptitle">👥 Members</div>
        <div class="mlist" id="membersList"></div>
      </div>
      <div class="chat-panel">
        <div class="ptitle" style="padding:14px 16px 0">💬 Chat</div>
        <div class="chat-msgs" id="chatMsgs"></div>
        <div class="cinput-row">
          <input id="chatInput" type="text" placeholder="Say something..." maxlength="300"/>
          <button class="send-btn" id="sendBtn">➤</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  let socket = null;
  let myId = null;
  let myName = "";
  let roomId = "";
  let isHost = false;
  let videoPlayer = document.getElementById('videoPlayer');
  let currentVideoUrl = null;
  let isSeeking = false;
  let syncInterval = null;
  
  const fmt = (s) => { s = Math.floor(s || 0); return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; };
  
  function toast(msg, ms=2500) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), ms);
  }
  
  function setErr(m) { document.getElementById('lobbyErr').textContent = m; }
  
  function applyHostUI() {
    document.getElementById('hostBar').style.display = isHost ? 'flex' : 'none';
    document.getElementById('guestBar').style.display = isHost ? 'none' : 'flex';
    document.getElementById('hostBadge').style.display = isHost ? 'inline-block' : 'none';
    document.getElementById('playPauseBtn').disabled = !isHost;
    document.getElementById('seekBar').disabled = !isHost;
    
    if (!isHost && videoPlayer) {
      videoPlayer.disabled = true;
    }
  }
  
  function updateRoom(info) {
    document.getElementById('memberCount').textContent = `${info.members.length}/10 members`;
    const list = document.getElementById('membersList');
    list.innerHTML = '';
    info.members.forEach(m => {
      const row = document.createElement('div');
      row.className = 'mrow';
      const av = document.createElement('div');
      av.className = 'mav';
      av.style.background = m.color + '33';
      av.style.color = m.color;
      av.textContent = m.name[0].toUpperCase();
      const name = document.createElement('span');
      name.textContent = m.name;
      name.style.flex = '1';
      row.appendChild(av);
      row.appendChild(name);
      if (m.id === info.host) {
        const tag = document.createElement('span');
        tag.className = 'mtag';
        tag.textContent = 'host';
        row.appendChild(tag);
      }
      list.appendChild(row);
    });
  }
  
  function appendChat(msg) {
    const box = document.getElementById('chatMsgs');
    const div = document.createElement('div');
    if (msg.system) {
      div.className = 'cmsg sys';
      const sp = document.createElement('span');
      sp.className = 'sys-text';
      sp.textContent = msg.text;
      div.appendChild(sp);
    } else {
      const mine = msg.senderId === myId;
      div.className = 'cmsg' + (mine ? ' mine' : '');
      const hdr = document.createElement('div');
      hdr.className = 'chdr';
      const name = document.createElement('span');
      name.className = 'cname';
      name.style.color = msg.color;
      name.textContent = mine ? 'You' : msg.name;
      const time = document.createElement('span');
      time.className = 'cts';
      time.textContent = new Date(msg.ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
      hdr.appendChild(name);
      hdr.appendChild(time);
      const bubble = document.createElement('div');
      bubble.className = 'cbub';
      bubble.textContent = msg.text;
      div.appendChild(hdr);
      div.appendChild(bubble);
    }
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }
  
  function copyCode() {
    navigator.clipboard.writeText(roomId);
    toast('Room code copied!');
  }
  
  function setupVideoEventListeners() {
    videoPlayer.addEventListener('play', () => {
      if (isHost) {
        socket.emit('play_video');
        document.getElementById('playPauseBtn').textContent = '⏸';
      }
    });
    
    videoPlayer.addEventListener('pause', () => {
      if (isHost) {
        socket.emit('pause_video');
        document.getElementById('playPauseBtn').textContent = '▶';
      }
    });
    
    videoPlayer.addEventListener('seeking', () => {
      if (isHost && !isSeeking) {
        isSeeking = true;
      }
    });
    
    videoPlayer.addEventListener('seeked', () => {
      if (isHost && isSeeking) {
        socket.emit('seek_video', { currentTime: videoPlayer.currentTime });
        isSeeking = false;
      }
    });
    
    videoPlayer.addEventListener('timeupdate', () => {
      if (isHost && syncInterval && !isSeeking) {
        socket.emit('sync_time', { currentTime: videoPlayer.currentTime });
      }
      if (!isSeeking) {
        const percent = (videoPlayer.currentTime / videoPlayer.duration) * 100;
        document.getElementById('seekBar').value = percent || 0;
      }
      document.getElementById('timeDisplay').textContent = `${fmt(videoPlayer.currentTime)} / ${fmt(videoPlayer.duration)}`;
    });
    
    document.getElementById('seekBar').addEventListener('input', (e) => {
      if (!isHost) return;
      const percent = parseFloat(e.target.value);
      const time = (percent / 100) * videoPlayer.duration;
      videoPlayer.currentTime = time;
    });
    
    document.getElementById('volumeSlider').addEventListener('input', (e) => {
      videoPlayer.volume = parseFloat(e.target.value) / 100;
    });
    
    document.getElementById('playPauseBtn').addEventListener('click', () => {
      if (!isHost) return;
      if (videoPlayer.paused) {
        videoPlayer.play();
      } else {
        videoPlayer.pause();
      }
    });
  }
  
  function initSocket(name, onConn) {
    socket = io({ transports: ['websocket', 'polling'], reconnection: true });
    socket.on('connect', () => {
      myId = socket.id;
      myName = name;
      onConn();
    });
    socket.on('connect_error', () => setErr('Cannot connect to server'));
    socket.on('disconnect', () => toast('Disconnected - reconnecting...'));
    socket.on('room_update', info => updateRoom(info));
    socket.on('you_are_host', () => {
      isHost = true;
      applyHostUI();
      toast('👑 You are now the host!');
    });
    socket.on('host_changed', () => {
      isHost = false;
      applyHostUI();
      toast('Host left - you are now a viewer');
    });
    socket.on('video_loaded', ({ video, streamUrl }) => {
      currentVideoUrl = streamUrl;
      videoPlayer.src = streamUrl;
      videoPlayer.load();
      document.getElementById('placeholder').style.display = 'none';
      document.getElementById('videoInfo').style.display = 'flex';
      document.getElementById('videoInfo').textContent = `Now playing: ${video.title}`;
      toast(`Loaded: ${video.title}`);
    });
    socket.on('video_play', ({ currentTime }) => {
      if (!isHost && videoPlayer.currentTime !== currentTime) {
        videoPlayer.currentTime = currentTime;
      }
      videoPlayer.play();
      document.getElementById('playPauseBtn').textContent = '⏸';
    });
    socket.on('video_pause', ({ currentTime }) => {
      if (!isHost && videoPlayer.currentTime !== currentTime) {
        videoPlayer.currentTime = currentTime;
      }
      videoPlayer.pause();
      document.getElementById('playPauseBtn').textContent = '▶';
    });
    socket.on('video_seek', ({ currentTime }) => {
      if (!isHost) {
        videoPlayer.currentTime = currentTime;
      }
    });
    socket.on('time_sync', ({ currentTime }) => {
      if (!isHost && Math.abs(videoPlayer.currentTime - currentTime) > 1) {
        videoPlayer.currentTime = currentTime;
      }
    });
    socket.on('chat_message', msg => appendChat(msg));
  }
  
  function createRoom() {
    const name = document.getElementById('createName').value.trim();
    if (!name) { setErr('Enter your name'); return; }
    initSocket(name, () => {
      socket.emit('create_room', { name }, res => {
        if (!res.ok) { setErr(res.error); return; }
        isHost = true;
        enterApp(res.roomId, res.info);
      });
    });
  }
  
  function joinRoom() {
    const name = document.getElementById('joinName').value.trim();
    const code = document.getElementById('joinCode').value.trim().toUpperCase();
    if (!name) { setErr('Enter your name'); return; }
    if (!code) { setErr('Enter room code'); return; }
    initSocket(name, () => {
      socket.emit('join_room', { roomId: code, name }, res => {
        if (!res.ok) { setErr(res.error); return; }
        isHost = false;
        enterApp(res.roomId, res.info);
      });
    });
  }
  
  function enterApp(id, info) {
    roomId = id;
    document.getElementById('lobby').style.display = 'none';
    document.getElementById('app').classList.add('on');
    document.getElementById('dispRoom').textContent = roomId;
    applyHostUI();
    updateRoom(info);
    setupVideoEventListeners();
    syncInterval = setInterval(() => {
      if (isHost && videoPlayer && !videoPlayer.paused) {
        socket.emit('sync_time', { currentTime: videoPlayer.currentTime });
      }
    }, 2000);
  }
  
  function loadVideo() {
    if (!isHost) return;
    const url = document.getElementById('urlInput').value.trim();
    if (!url) { toast('Enter a YouTube URL'); return; }
    socket.emit('load_video', { url }, (res) => {
      if (res.error) {
        toast('Error: ' + res.error);
      } else {
        toast('Loading video...');
      }
    });
  }
  
  function sendChat() {
    const inp = document.getElementById('chatInput');
    const txt = inp.value.trim();
    if (!txt) return;
    socket.emit('chat_send', { text: txt });
    inp.value = '';
  }
  
  // Event bindings
  document.getElementById('tabC').addEventListener('click', () => {
    document.getElementById('createForm').style.display = 'block';
    document.getElementById('joinForm').style.display = 'none';
    document.getElementById('tabC').classList.add('active');
    document.getElementById('tabJ').classList.remove('active');
  });
  document.getElementById('tabJ').addEventListener('click', () => {
    document.getElementById('createForm').style.display = 'none';
    document.getElementById('joinForm').style.display = 'block';
    document.getElementById('tabJ').classList.add('active');
    document.getElementById('tabC').classList.remove('active');
  });
  document.getElementById('createBtn').addEventListener('click', createRoom);
  document.getElementById('joinBtn').addEventListener('click', joinRoom);
  document.getElementById('copyCodeBtn').addEventListener('click', copyCode);
  document.getElementById('loadVideoBtn').addEventListener('click', loadVideo);
  document.getElementById('sendBtn').addEventListener('click', sendChat);
  document.getElementById('chatInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendChat(); });
});
</script>
</body>
</html>
