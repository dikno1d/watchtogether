<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Watch Party - No Buffer 🎬</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://www.youtube.com/iframe_api"></script>
<script src="/socket.io/socket.io.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --sur2: #1a1a26;
    --accent: #7c3aed;
    --accent2: #a855f7;
    --text: #f0eeff;
    --muted: #8884a8;
    --border: rgba(255,255,255,0.07);
    --success: #10b981;
    --danger: #ef4444;
  }
  
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    height: 100vh;
  }
  
  #lobby {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(124,58,237,0.15), var(--bg));
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px;
    width: 420px;
    max-width: 90vw;
    animation: slideUp 0.4s ease;
  }
  
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(135deg, #a78bfa, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  
  .sub {
    color: var(--muted);
    font-size: 13px;
    margin: 8px 0 32px 0;
  }
  
  .tabs {
    display: flex;
    gap: 8px;
    background: rgba(255,255,255,0.05);
    padding: 4px;
    border-radius: 12px;
    margin-bottom: 24px;
  }
  
  .tab {
    flex: 1;
    padding: 10px;
    background: transparent;
    border: none;
    color: var(--muted);
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
  }
  
  .tab.active {
    background: var(--accent);
    color: white;
  }
  
  .field {
    margin-bottom: 16px;
  }
  
  .field label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  
  .field input {
    width: 100%;
    padding: 12px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 14px;
    outline: none;
  }
  
  .field input:focus {
    border-color: var(--accent);
  }
  
  .btn {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    color: white;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: 0.2s;
  }
  
  .btn:hover {
    background: var(--accent2);
    transform: translateY(-1px);
  }
  
  .err {
    color: var(--danger);
    font-size: 12px;
    margin-top: 12px;
    text-align: center;
  }
  
  #app {
    display: none;
    height: 100vh;
    flex-direction: column;
  }
  
  #app.active {
    display: flex;
  }
  
  .topbar {
    height: 56px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    flex-wrap: wrap;
    gap: 10px;
  }
  
  .room-info {
    background: rgba(255,255,255,0.05);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  
  .copy-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
  }
  
  .host-badge {
    background: var(--accent);
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
  }
  
  .member-count {
    font-size: 12px;
    color: var(--muted);
  }
  
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }
  
  .video-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #000;
  }
  
  .url-bar {
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  
  .url-bar input {
    flex: 1;
    padding: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 13px;
    min-width: 200px;
  }
  
  .url-bar button {
    padding: 10px 20px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
  }
  
  .url-bar button:hover {
    background: var(--accent2);
  }
  
  .player-container {
    flex: 1;
    position: relative;
    background: #000;
    min-height: 300px;
  }
  
  .player-wrapper {
    width: 100%;
    height: 100%;
  }
  
  #youtube-player {
    width: 100%;
    height: 100%;
  }
  
  .placeholder {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: var(--muted);
    z-index: 10;
    background: #000;
    padding: 20px;
    border-radius: 12px;
  }
  
  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }
  
  .control-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: 0.2s;
  }
  
  .control-btn:hover:not(:disabled) {
    background: var(--accent);
    border-color: var(--accent);
    transform: scale(1.05);
  }
  
  .control-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  
  .seek-bar {
    flex: 1;
    height: 5px;
    border-radius: 3px;
    background: var(--sur2);
    -webkit-appearance: none;
  }
  
  .seek-bar::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }
  
  .time {
    font-size: 12px;
    font-family: monospace;
    color: var(--muted);
    min-width: 100px;
    text-align: center;
  }
  
  .volume-slider {
    width: 80px;
    height: 4px;
    -webkit-appearance: none;
    background: var(--sur2);
    border-radius: 2px;
  }
  
  .volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }
  
  .sync-status {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  
  .sync-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--success);
    animation: pulse 2s infinite;
  }
  
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  
  .sidebar {
    width: 280px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }
  
  .members-section {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    max-height: 200px;
    overflow-y: auto;
  }
  
  .section-title {
    font-size: 11px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    font-weight: 600;
  }
  
  .member-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  
  .member-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    padding: 4px;
    border-radius: 8px;
    transition: background 0.2s;
  }
  
  .member-item:hover {
    background: rgba(255,255,255,0.05);
  }
  
  .member-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 12px;
  }
  
  .host-tag {
    font-size: 9px;
    background: var(--accent);
    padding: 2px 6px;
    border-radius: 10px;
    margin-left: auto;
  }
  
  .chat-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  
  .message {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  
  .message.system {
    align-items: center;
  }
  
  .system-text {
    font-size: 11px;
    background: rgba(255,255,255,0.05);
    padding: 4px 12px;
    border-radius: 20px;
    color: var(--muted);
  }
  
  .message-header {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
  }
  
  .message-name {
    font-weight: 600;
  }
  
  .message-time {
    color: var(--muted);
    font-size: 10px;
  }
  
  .message-bubble {
    background: rgba(255,255,255,0.05);
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 13px;
    max-width: 220px;
    word-wrap: break-word;
  }
  
  .message.mine {
    align-items: flex-end;
  }
  
  .message.mine .message-bubble {
    background: var(--accent);
  }
  
  .chat-input {
    display: flex;
    gap: 8px;
    padding: 12px;
    border-top: 1px solid var(--border);
  }
  
  .chat-input input {
    flex: 1;
    padding: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text);
    outline: none;
  }
  
  .chat-input button {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    color: white;
    cursor: pointer;
    transition: 0.2s;
  }
  
  .chat-input button:hover {
    background: var(--accent2);
  }
  
  #toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--sur2);
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    z-index: 1000;
    opacity: 0;
    transition: 0.2s;
    pointer-events: none;
    text-align: center;
    max-width: 90vw;
  }
  
  #toast.show {
    opacity: 1;
  }
  
  @media (max-width: 700px) {
    .sidebar { width: 240px; }
    .message-bubble { max-width: 160px; }
    .time { min-width: 80px; font-size: 11px; }
    .controls { gap: 8px; }
  }
  
  @media (max-width: 550px) {
    .main { flex-direction: column; }
    .sidebar { width: 100%; max-height: 280px; }
    .url-bar { flex-direction: column; }
    .url-bar input { width: 100%; }
    .url-bar button { width: 100%; }
    .topbar { flex-direction: column; align-items: flex-start; height: auto; padding: 12px; }
    .member-count { align-self: flex-end; }
  }
</style>
</head>
<body>

<div id="lobby">
  <div class="card">
    <div class="logo">Watch Party</div>
    <p class="sub">Perfectly synced YouTube - No buffering for viewers!</p>
    <div class="tabs">
      <button class="tab active" id="tabCreate">Create Room</button>
      <button class="tab" id="tabJoin">Join Room</button>
    </div>
    <div id="createForm">
      <div class="field">
        <label>Your Name</label>
        <input type="text" id="createName" placeholder="e.g. Alex" maxlength="24">
      </div>
      <button class="btn" id="createRoomBtn">🚀 Create Room</button>
    </div>
    <div id="joinForm" style="display: none;">
      <div class="field">
        <label>Your Name</label>
        <input type="text" id="joinName" placeholder="e.g. Sam" maxlength="24">
      </div>
      <div class="field">
        <label>Room Code</label>
        <input type="text" id="joinCode" placeholder="e.g. AB12CD" maxlength="6" style="text-transform: uppercase;">
      </div>
      <button class="btn" id="joinRoomBtn">🔗 Join Room</button>
    </div>
    <div class="err" id="lobbyError"></div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
      <span style="font-weight: 800;">🎬 Watch Party</span>
      <div class="room-info">
        <span>Room: <strong id="roomCode">------</strong></span>
        <button class="copy-btn" id="copyRoomCode">📋</button>
      </div>
      <span class="host-badge" id="hostBadge" style="display: none;">HOST</span>
      <div class="sync-status" id="syncStatus">
        <div class="sync-dot"></div>
        <span id="syncText">Synced</span>
      </div>
    </div>
    <span class="member-count" id="memberCount">0/20 members</span>
  </div>
  
  <div class="main">
    <div class="video-panel">
      <div class="url-bar" id="hostControls">
        <input type="text" id="videoUrl" placeholder="Paste YouTube URL (e.g., https://youtube.com/watch?v=...)">
        <button id="loadVideoBtn">🎬 Load Video</button>
      </div>
      <div class="url-bar" id="guestControls" style="display: none;">
        <span style="color: var(--muted);">⏳ Waiting for host to load a video...</span>
      </div>
      
      <div class="player-container">
        <div class="player-wrapper">
          <div id="youtube-player"></div>
        </div>
        <div class="placeholder" id="placeholder">
          <div style="font-size: 48px; margin-bottom: 12px;">🎬</div>
          <p>No video loaded</p>
          <p style="font-size: 12px; margin-top: 8px;">Host: Paste a YouTube URL and click Load</p>
        </div>
      </div>
      
      <div class="controls">
        <button class="control-btn" id="playPauseBtn" disabled>▶</button>
        <input type="range" class="seek-bar" id="seekBar" min="0" max="100" value="0" disabled>
        <span class="time" id="timeDisplay">0:00 / 0:00</span>
        <div style="display: flex; align-items: center; gap: 6px;">
          <span>🔊</span>
          <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80">
        </div>
      </div>
    </div>
    
    <div class="sidebar">
      <div class="members-section">
        <div class="section-title">👥 Members</div>
        <div class="member-list" id="membersList"></div>
      </div>
      <div class="chat-section">
        <div class="section-title" style="padding: 0 12px;">💬 Chat</div>
        <div class="messages" id="messages"></div>
        <div class="chat-input">
          <input type="text" id="chatMessage" placeholder="Say something..." maxlength="300">
          <button id="sendBtn">➤</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// Global variables
let socket;
let myId;
let myName;
let roomId;
let isHost = false;
let player = null;
let playerReady = false;
let isSeeking = false;
let currentVideoId = null;
let lastSyncTime = 0;
let forceSyncInterval;
let viewerForceSyncInterval;
let lastState = { playing: false, time: 0 };

// Helper functions
function showToast(msg, duration = 2000) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), duration);
}

function showError(msg) {
  document.getElementById('lobbyError').textContent = msg;
}

function formatTime(seconds) {
  if (isNaN(seconds) || !isFinite(seconds)) return '0:00';
  const mins = Math.floor(seconds / 60);
  const secs = Math.floor(seconds % 60);
  return `${mins}:${secs.toString().padStart(2, '0')}`;
}

function extractVideoId(url) {
  if (!url) return null;
  const patterns = [
    /(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&?#]+)/,
    /youtube\.com\/embed\/([^?]+)/
  ];
  for (const pattern of patterns) {
    const match = url.match(pattern);
    if (match) return match[1];
  }
  return null;
}

// Create YouTube player with forced low quality for viewers
function createPlayer(videoId, startTime = 0, autoPlay = false) {
  const placeholder = document.getElementById('placeholder');
  placeholder.style.display = 'none';
  
  if (player) {
    try { player.destroy(); } catch(e) {}
    player = null;
    playerReady = false;
  }
  
  console.log(`Creating player: ${videoId}, start: ${startTime}, autoPlay: ${autoPlay}`);
  
  player = new YT.Player('youtube-player', {
    height: '100%',
    width: '100%',
    videoId: videoId,
    playerVars: {
      controls: 0,
      disablekb: 1,
      modestbranding: 1,
      rel: 0,
      origin: window.location.origin,
      autoplay: autoPlay ? 1 : 0,
      start: Math.floor(startTime),
      iv_load_policy: 3,
      playsinline: 1
    },
    events: {
      onReady: (event) => {
        playerReady = true;
        event.target.setVolume(parseInt(document.getElementById('volumeSlider').value));
        
        // FORCE LOW QUALITY FOR VIEWERS - This prevents buffering!
        if (!isHost) {
          setTimeout(() => {
            if (player && playerReady) {
              // Force lowest quality for smooth playback
              player.setPlaybackQuality('small');
              console.log('Forced low quality for viewer');
            }
          }, 500);
        } else {
          setTimeout(() => {
            if (player && playerReady) {
              player.setPlaybackQuality('auto');
            }
          }, 500);
        }
        
        if (startTime > 0 && !autoPlay) {
          event.target.seekTo(startTime, true);
          event.target.pauseVideo();
        }
        
        showToast('✅ Player ready!');
        document.getElementById('syncText').textContent = 'Synced';
      },
      onStateChange: (event) => {
        const playBtn = document.getElementById('playPauseBtn');
        const state = event.data;
        
        if (state === YT.PlayerState.PLAYING) {
          playBtn.textContent = '⏸';
          document.getElementById('syncText').textContent = 'Playing';
          lastState.playing = true;
        } else if (state === YT.PlayerState.PAUSED) {
          playBtn.textContent = '▶';
          document.getElementById('syncText').textContent = 'Paused';
          lastState.playing = false;
        } else if (state === YT.PlayerState.BUFFERING) {
          document.getElementById('syncText').textContent = 'Buffering...';
          // Force quality down if buffering
          if (!isHost && player && playerReady) {
            setTimeout(() => {
              try { player.setPlaybackQuality('small'); } catch(e) {}
            }, 500);
          }
        } else if (state === YT.PlayerState.ENDED) {
          playBtn.textContent = '▶';
          document.getElementById('syncText').textContent = 'Ended';
        }
      },
      onError: (event) => {
        console.error('YouTube error:', event.data);
        let errorMsg = 'Failed to load video. ';
        if (event.data === 2) errorMsg += 'Invalid video ID.';
        else if (event.data === 5) errorMsg += 'HTML5 player error.';
        else if (event.data === 100) errorMsg += 'Video not found.';
        else if (event.data === 101 || event.data === 150) errorMsg += 'Video cannot be embedded.';
        else errorMsg += 'Try another video.';
        showToast('❌ ' + errorMsg);
        document.getElementById('placeholder').style.display = 'flex';
        playerReady = false;
      }
    }
  });
}

// Socket event handlers
function initSocket(name, callback) {
  socket = io({ 
    transports: ['websocket', 'polling'],
    reconnection: true,
    reconnectionAttempts: 5,
    reconnectionDelay: 1000
  });
  
  socket.on('connect', () => {
    myId = socket.id;
    myName = name;
    callback();
  });
  
  socket.on('connect_error', () => showError('Cannot connect to server'));
  socket.on('disconnect', () => showToast('⚠️ Disconnected - reconnecting...'));
  socket.on('reconnect', () => {
    showToast('✅ Reconnected!');
    if (roomId) {
      socket.emit('join_room', { roomId, name: myName });
    }
  });
  
  socket.on('room_update', (info) => updateRoomUI(info));
  
  socket.on('you_are_host', () => {
    isHost = true;
    updateUI();
    showToast('👑 You are now the host!');
    // Reset quality for host
    if (player && playerReady) {
      player.setPlaybackQuality('auto');
    }
  });
  
  socket.on('host_changed', () => {
    isHost = false;
    updateUI();
    showToast('Host left - you are now a viewer');
    // Force low quality for viewer
    if (player && playerReady) {
      player.setPlaybackQuality('small');
    }
  });
  
  socket.on('video_loaded', ({ videoId, currentTime, isPlaying }) => {
    if (videoId && currentVideoId !== videoId) {
      currentVideoId = videoId;
      createPlayer(videoId, currentTime, isPlaying);
    }
  });
  
  socket.on('video_play', ({ currentTime }) => {
    if (!isHost && player && playerReady) {
      const playerTime = player.getCurrentTime();
      const diff = Math.abs(playerTime - currentTime);
      
      if (diff > 1.5) {
        player.seekTo(currentTime, true);
      }
      
      setTimeout(() => {
        if (player && playerReady && player.getPlayerState() !== 1) {
          player.playVideo();
        }
      }, 100);
    }
  });
  
  socket.on('video_pause', ({ currentTime }) => {
    if (!isHost && player && playerReady) {
      const playerTime = player.getCurrentTime();
      const diff = Math.abs(playerTime - currentTime);
      
      if (diff > 1.5) {
        player.seekTo(currentTime, true);
      }
      
      setTimeout(() => {
        if (player && playerReady && player.getPlayerState() === 1) {
          player.pauseVideo();
        }
      }, 100);
    }
  });
  
  socket.on('video_seek', ({ currentTime }) => {
    if (!isHost && player && playerReady) {
      player.seekTo(currentTime, true);
    }
  });
  
  socket.on('force_sync_response', ({ currentTime, isPlaying }) => {
    if (!isHost && player && playerReady) {
      const playerTime = player.getCurrentTime();
      const diff = Math.abs(playerTime - currentTime);
      
      if (diff > 0.8) {
        player.seekTo(currentTime, true);
        showToast(`🔧 Syncing...`, 1000);
      }
      
      if (isPlaying && player.getPlayerState() !== 1) {
        player.playVideo();
      } else if (!isPlaying && player.getPlayerState() === 1) {
        player.pauseVideo();
      }
    }
  });
  
  socket.on('chat_message', (msg) => addChatMessage(msg));
}

function updateUI() {
  const hostControls = document.getElementById('hostControls');
  const guestControls = document.getElementById('guestControls');
  const hostBadge = document.getElementById('hostBadge');
  const playPauseBtn = document.getElementById('playPauseBtn');
  const seekBar = document.getElementById('seekBar');
  
  if (isHost) {
    hostControls.style.display = 'flex';
    guestControls.style.display = 'none';
    hostBadge.style.display = 'inline-block';
    playPauseBtn.disabled = false;
    seekBar.disabled = false;
  } else {
    hostControls.style.display = 'none';
    guestControls.style.display = 'flex';
    hostBadge.style.display = 'none';
    playPauseBtn.disabled = true;
    seekBar.disabled = true;
  }
}

function updateRoomUI(info) {
  document.getElementById('memberCount').textContent = `${info.members.length}/20 members`;
  const membersList = document.getElementById('membersList');
  membersList.innerHTML = '';
  
  info.members.forEach(m => {
    const div = document.createElement('div');
    div.className = 'member-item';
    
    const avatar = document.createElement('div');
    avatar.className = 'member-avatar';
    avatar.style.background = m.color + '33';
    avatar.style.color = m.color;
    avatar.textContent = m.name[0].toUpperCase();
    
    const nameSpan = document.createElement('span');
    nameSpan.textContent = m.name;
    nameSpan.style.flex = '1';
    
    div.appendChild(avatar);
    div.appendChild(nameSpan);
    
    if (m.id === info.host) {
      const tag = document.createElement('span');
      tag.className = 'host-tag';
      tag.textContent = 'HOST';
      div.appendChild(tag);
    }
    
    membersList.appendChild(div);
  });
}

function addChatMessage(msg) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message';
  
  if (msg.system) {
    div.classList.add('system');
    const sysText = document.createElement('div');
    sysText.className = 'system-text';
    sysText.textContent = msg.text;
    div.appendChild(sysText);
  } else {
    const mine = msg.senderId === myId;
    if (mine) div.classList.add('mine');
    
    const header = document.createElement('div');
    header.className = 'message-header';
    const name = document.createElement('span');
    name.className = 'message-name';
    name.style.color = msg.color;
    name.textContent = mine ? 'You' : msg.name;
    const time = document.createElement('span');
    time.className = 'message-time';
    time.textContent = new Date(msg.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    header.appendChild(name);
    header.appendChild(time);
    
    const bubble = document.createElement('div');
    bubble.className = 'message-bubble';
    bubble.textContent = msg.text;
    
    div.appendChild(header);
    div.appendChild(bubble);
  }
  
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

// Room actions
function createRoom() {
  const name = document.getElementById('createName').value.trim();
  if (!name) {
    showError('Enter your name');
    return;
  }
  
  initSocket(name, () => {
    socket.emit('create_room', { name }, (res) => {
      if (!res.ok) {
        showError(res.error);
        return;
      }
      isHost = true;
      roomId = res.roomId;
      enterApp(res.info);
    });
  });
}

function joinRoom() {
  const name = document.getElementById('joinName').value.trim();
  const code = document.getElementById('joinCode').value.trim().toUpperCase();
  
  if (!name) {
    showError('Enter your name');
    return;
  }
  if (!code) {
    showError('Enter room code');
    return;
  }
  
  initSocket(name, () => {
    socket.emit('join_room', { roomId: code, name }, (res) => {
      if (!res.ok) {
        showError(res.error);
        return;
      }
      isHost = false;
      roomId = res.roomId;
      enterApp(res.info);
    });
  });
}

function enterApp(info) {
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('app').classList.add('active');
  document.getElementById('roomCode').textContent = roomId;
  updateRoomUI(info);
  updateUI();
  
  if (info.videoId) {
    currentVideoId = info.videoId;
    createPlayer(info.videoId, info.currentTime, info.isPlaying);
  }
  
  // Aggressive sync for viewers - every 1 second!
  if (!isHost) {
    viewerForceSyncInterval = setInterval(() => {
      if (player && playerReady && !isSeeking) {
        socket.emit('force_sync', { 
          currentTime: player.getCurrentTime(), 
          isPlaying: player.getPlayerState() === 1 
        });
      }
    }, 1000);
  } else {
    // Host sends sync every 2 seconds
    setInterval(() => {
      if (player && playerReady && !isSeeking) {
        socket.emit('force_sync', { 
          currentTime: player.getCurrentTime(), 
          isPlaying: player.getPlayerState() === 1 
        });
      }
    }, 2000);
  }
}

// Load video (host only)
function loadVideo() {
  if (!isHost) return;
  
  const url = document.getElementById('videoUrl').value.trim();
  if (!url) {
    showToast('Please enter a YouTube URL');
    return;
  }
  
  const videoId = extractVideoId(url);
  if (!videoId) {
    showToast('❌ Invalid YouTube URL');
    return;
  }
  
  showToast('📡 Loading video...');
  socket.emit('load_video', { videoId }, (res) => {
    if (res.success) {
      showToast('✅ Video loaded for everyone!');
      currentVideoId = videoId;
      createPlayer(videoId, 0, false);
    } else {
      showToast('❌ Failed to load video');
    }
  });
}

// Video controls (host only)
function togglePlayPause() {
  if (!isHost || !player || !playerReady) return;
  
  const state = player.getPlayerState();
  if (state === 1) {
    const currentTime = player.getCurrentTime();
    player.pauseVideo();
    socket.emit('pause_video', { currentTime });
  } else {
    const currentTime = player.getCurrentTime();
    player.playVideo();
    socket.emit('play_video', { currentTime });
  }
}

function onSeekInput() {
  if (!isHost || !player || !playerReady) return;
  isSeeking = true;
}

function onSeekChange(e) {
  if (!isHost || !player || !playerReady) return;
  const percent = parseFloat(e.target.value);
  const duration = player.getDuration();
  const time = (percent / 100) * duration;
  player.seekTo(time, true);
  socket.emit('seek_video', { currentTime: time });
  setTimeout(() => { isSeeking = false; }, 100);
}

function updatePlayerUI() {
  if (!player || !playerReady) return;
  
  try {
    const currentTime = player.getCurrentTime();
    const duration = player.getDuration();
    
    if (duration && !isSeeking) {
      const percent = (currentTime / duration) * 100;
      document.getElementById('seekBar').value = percent;
      document.getElementById('timeDisplay').textContent = `${formatTime(currentTime)} / ${formatTime(duration)}`;
    }
    
    const playBtn = document.getElementById('playPauseBtn');
    const state = player.getPlayerState();
    playBtn.textContent = state === 1 ? '⏸' : '▶';
  } catch(e) {}
}

// Setup intervals
setInterval(() => {
  updatePlayerUI();
}, 300);

// Event listeners
document.getElementById('tabCreate').addEventListener('click', () => {
  document.getElementById('createForm').style.display = 'block';
  document.getElementById('joinForm').style.display = 'none';
  document.getElementById('tabCreate').classList.add('active');
  document.getElementById('tabJoin').classList.remove('active');
  document.getElementById('lobbyError').textContent = '';
});

document.getElementById('tabJoin').addEventListener('click', () => {
  document.getElementById('createForm').style.display = 'none';
  document.getElementById('joinForm').style.display = 'block';
  document.getElementById('tabJoin').classList.add('active');
  document.getElementById('tabCreate').classList.remove('active');
  document.getElementById('lobbyError').textContent = '';
});

document.getElementById('createRoomBtn').addEventListener('click', createRoom);
document.getElementById('joinRoomBtn').addEventListener('click', joinRoom);

document.getElementById('copyRoomCode').addEventListener('click', () => {
  if (roomId) {
    navigator.clipboard.writeText(roomId);
    showToast('Room code copied!');
  }
});

document.getElementById('loadVideoBtn').addEventListener('click', loadVideo);
document.getElementById('videoUrl').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') loadVideo();
});

document.getElementById('playPauseBtn').addEventListener('click', togglePlayPause);
document.getElementById('seekBar').addEventListener('input', onSeekInput);
document.getElementById('seekBar').addEventListener('change', onSeekChange);

document.getElementById('volumeSlider').addEventListener('input', (e) => {
  if (player && playerReady) {
    player.setVolume(parseInt(e.target.value));
  }
});

// Chat
document.getElementById('sendBtn').addEventListener('click', () => {
  const input = document.getElementById('chatMessage');
  const text = input.value.trim();
  if (!text) return;
  socket.emit('chat_send', { text });
  input.value = '';
});

document.getElementById('chatMessage').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    document.getElementById('sendBtn').click();
  }
});
</script>
