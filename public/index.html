<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#0a0a0f"/>
<title>Sync Watch Party 🎬</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://www.youtube.com/iframe_api"></script>
<script src="/socket.io/socket.io.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --sur2: #1a1a26;
    --accent: #7c3aed;
    --accent2: #a855f7;
    --text: #f0eeff;
    --muted: #8884a8;
    --border: rgba(255,255,255,0.07);
    --success: #10b981;
    --danger: #ef4444;
    --header-height: 56px;
    --sidebar-width: 300px;
  }
  
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    height: 100vh;
    width: 100%;
    position: fixed;
  }
  
  /* Lobby */
  #lobby {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(124,58,237,0.15), var(--bg));
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
    overflow-y: auto;
  }
  
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 40px;
    width: 440px;
    max-width: 100%;
    animation: slideUp 0.4s ease;
    box-shadow: 0 25px 50px rgba(0,0,0,0.5);
  }
  
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    background: linear-gradient(135deg, #a78bfa, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  
  .sub {
    color: var(--muted);
    font-size: 13px;
    margin: 8px 0 32px 0;
    line-height: 1.5;
  }
  
  .tabs {
    display: flex;
    gap: 8px;
    background: rgba(255,255,255,0.05);
    padding: 4px;
    border-radius: 16px;
    margin-bottom: 28px;
  }
  
  .tab {
    flex: 1;
    padding: 12px;
    background: transparent;
    border: none;
    color: var(--muted);
    font-weight: 600;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.2s;
    font-size: 14px;
  }
  
  .tab.active {
    background: var(--accent);
    color: white;
    box-shadow: 0 2px 8px rgba(124,58,237,0.3);
  }
  
  .field {
    margin-bottom: 18px;
  }
  
  .field label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  
  .field input {
    width: 100%;
    padding: 14px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    transition: 0.2s;
  }
  
  .field input:focus {
    border-color: var(--accent);
    background: rgba(124,58,237,0.1);
  }
  
  .btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    border: none;
    border-radius: 14px;
    color: white;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: 0.2s;
    margin-top: 8px;
  }
  
  .btn:hover {
    background: var(--accent2);
    transform: translateY(-2px);
  }
  
  .err {
    color: var(--danger);
    font-size: 12px;
    margin-top: 12px;
    text-align: center;
  }
  
  /* App */
  #app {
    display: none;
    height: 100vh;
    flex-direction: column;
  }
  
  #app.active {
    display: flex;
  }
  
  /* Top Bar */
  .topbar {
    height: var(--header-height);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    flex-shrink: 0;
    z-index: 10;
    gap: 10px;
  }
  
  .topbar-left {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    flex: 1;
  }
  
  .app-logo {
    font-weight: 800;
    font-size: 16px;
    white-space: nowrap;
  }
  
  .room-info {
    background: rgba(255,255,255,0.08);
    padding: 5px 12px;
    border-radius: 24px;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  
  .room-code-text {
    font-weight: 700;
    letter-spacing: 1px;
  }
  
  .copy-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    padding: 4px;
    transition: 0.2s;
  }
  
  .copy-btn:active {
    transform: scale(0.95);
  }
  
  .host-badge {
    background: var(--accent);
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    white-space: nowrap;
  }
  
  .sync-status {
    font-size: 10px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 5px;
    background: rgba(255,255,255,0.05);
    padding: 4px 10px;
    border-radius: 20px;
  }
  
  .sync-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--success);
    animation: pulse 2s infinite;
  }
  
  .sync-dot.warning {
    background: var(--danger);
  }
  
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  
  .member-count {
    font-size: 12px;
    color: var(--muted);
    background: rgba(255,255,255,0.05);
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }
  
  /* Main Layout */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
    position: relative;
  }
  
  /* Video Panel */
  .video-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #000;
    min-width: 0;
  }
  
  .url-bar {
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  
  .url-bar input {
    flex: 1;
    padding: 12px 14px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    font-size: 14px;
    min-width: 180px;
  }
  
  .url-bar input:focus {
    border-color: var(--accent);
    outline: none;
  }
  
  .url-bar button {
    padding: 12px 24px;
    background: var(--accent);
    border: none;
    border-radius: 14px;
    color: white;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: 0.2s;
    white-space: nowrap;
  }
  
  .url-bar button:active {
    transform: scale(0.97);
  }
  
  .url-bar button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  
  .player-container {
    flex: 1;
    position: relative;
    background: #000;
    min-height: 200px;
  }
  
  .player-wrapper {
    width: 100%;
    height: 100%;
  }
  
  #youtube-player {
    width: 100%;
    height: 100%;
  }
  
  .placeholder {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: var(--muted);
    z-index: 10;
    background: #000;
    padding: 24px;
    border-radius: 20px;
    pointer-events: none;
  }
  
  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  
  .control-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--border);
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transition: 0.2s;
    flex-shrink: 0;
  }
  
  .control-btn:active {
    transform: scale(0.95);
    background: var(--accent);
  }
  
  .control-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  
  .seek-bar {
    flex: 1;
    height: 5px;
    border-radius: 3px;
    background: var(--sur2);
    -webkit-appearance: none;
    min-width: 80px;
  }
  
  .seek-bar::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }
  
  .time {
    font-size: 12px;
    font-family: monospace;
    color: var(--muted);
    min-width: 100px;
    text-align: center;
  }
  
  .volume-slider {
    width: 80px;
    height: 4px;
    -webkit-appearance: none;
    background: var(--sur2);
    border-radius: 2px;
  }
  
  .volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }
  
  .fullscreen-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    padding: 10px;
    border-radius: 12px;
    transition: 0.2s;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .fullscreen-btn:active {
    transform: scale(0.95);
    background: var(--accent);
  }
  
  /* Sidebar */
  .sidebar {
    width: var(--sidebar-width);
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  
  .sidebar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }
  
  .close-sidebar-btn {
    background: rgba(255,255,255,0.08);
    border: none;
    color: var(--muted);
    font-size: 20px;
    cursor: pointer;
    padding: 8px;
    border-radius: 10px;
    transition: 0.2s;
    display: none;
  }
  
  .members-section {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    max-height: 180px;
    overflow-y: auto;
  }
  
  .section-title {
    font-size: 11px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  
  .member-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  
  .member-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    padding: 6px 8px;
    border-radius: 12px;
    transition: background 0.2s;
  }
  
  .member-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 13px;
    flex-shrink: 0;
  }
  
  .member-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  
  .host-tag {
    font-size: 9px;
    background: var(--accent);
    padding: 3px 8px;
    border-radius: 12px;
    flex-shrink: 0;
    font-weight: 600;
  }
  
  .chat-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  
  .message {
    display: flex;
    flex-direction: column;
    gap: 4px;
    animation: fadeIn 0.2s ease;
  }
  
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  .message.system {
    align-items: center;
  }
  
  .system-text {
    font-size: 11px;
    background: rgba(255,255,255,0.05);
    padding: 5px 14px;
    border-radius: 20px;
    color: var(--muted);
  }
  
  .message-header {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    padding: 0 4px;
  }
  
  .message-name {
    font-weight: 700;
  }
  
  .message-time {
    color: var(--muted);
    font-size: 10px;
  }
  
  .message-bubble {
    background: rgba(255,255,255,0.08);
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 13px;
    max-width: 240px;
    word-wrap: break-word;
    line-height: 1.4;
  }
  
  .message.mine {
    align-items: flex-end;
  }
  
  .message.mine .message-bubble {
    background: var(--accent);
  }
  
  .chat-input {
    display: flex;
    gap: 10px;
    padding: 12px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--surface);
  }
  
  .chat-input input {
    flex: 1;
    padding: 12px;
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--border);
    border-radius: 28px;
    color: var(--text);
    outline: none;
    font-size: 14px;
  }
  
  .chat-input input:focus {
    border-color: var(--accent);
  }
  
  .chat-input button {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    color: white;
    cursor: pointer;
    transition: 0.2s;
    flex-shrink: 0;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  #toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--sur2);
    padding: 10px 20px;
    border-radius: 28px;
    font-size: 13px;
    z-index: 1000;
    opacity: 0;
    transition: 0.2s;
    pointer-events: none;
    text-align: center;
    max-width: 90vw;
    font-weight: 500;
  }
  
  #toast.show {
    opacity: 1;
  }
  
  /* Mobile Styles */
  @media (max-width: 768px) {
    .sidebar {
      position: fixed;
      right: -100%;
      top: 0;
      bottom: 0;
      width: 85%;
      max-width: 320px;
      z-index: 200;
      transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: -5px 0 30px rgba(0,0,0,0.5);
      border-left: none;
      border-radius: 20px 0 0 20px;
    }
    
    .sidebar.open {
      right: 0;
    }
    
    .close-sidebar-btn {
      display: flex;
    }
    
    .chat-toggle {
      display: flex;
      position: fixed;
      bottom: 20px;
      right: 16px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: white;
      font-size: 24px;
      cursor: pointer;
      z-index: 150;
      box-shadow: 0 4px 15px rgba(124,58,237,0.4);
      align-items: center;
      justify-content: center;
      transition: 0.2s;
    }
    
    .controls {
      gap: 8px;
      padding: 10px 12px;
    }
    
    .control-btn {
      width: 40px;
      height: 40px;
      font-size: 16px;
    }
    
    .fullscreen-btn {
      width: 40px;
      height: 40px;
      font-size: 16px;
    }
    
    .time {
      min-width: 70px;
      font-size: 11px;
    }
    
    .url-bar {
      flex-direction: column;
    }
    
    .url-bar input {
      width: 100%;
    }
    
    .url-bar button {
      width: 100%;
    }
    
    .member-count {
      font-size: 11px;
    }
    
    .message-bubble {
      max-width: 180px;
    }
  }
  
  @media (min-width: 769px) {
    .chat-toggle {
      display: none;
    }
    
    .sidebar {
      position: relative;
      right: auto !important;
    }
  }
  
  @media (max-width: 480px) {
    .control-btn {
      width: 36px;
      height: 36px;
      font-size: 14px;
    }
    
    .fullscreen-btn {
      width: 36px;
      height: 36px;
      font-size: 14px;
    }
    
    .time {
      min-width: 60px;
      font-size: 10px;
    }
    
    .chat-toggle {
      width: 48px;
      height: 48px;
      font-size: 20px;
    }
  }
  
  /* Fullscreen */
  .player-container:fullscreen {
    background: #000;
  }
  
  .player-container:fullscreen .controls,
  .player-container:fullscreen .url-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background: rgba(18, 18, 26, 0.95);
    backdrop-filter: blur(10px);
  }
</style>
</head>
<body>

<div id="lobby">
  <div class="card">
    <div class="logo">Sync Watch Party</div>
    <p class="sub">Watch YouTube with friends — perfectly synced!</p>
    <div class="tabs">
      <button class="tab active" id="tabCreate">Create Room</button>
      <button class="tab" id="tabJoin">Join Room</button>
    </div>
    <div id="createForm">
      <div class="field">
        <label>Your Name</label>
        <input type="text" id="createName" placeholder="e.g. Alex" maxlength="24" autocomplete="off">
      </div>
      <button class="btn" id="createRoomBtn">🚀 Create Room</button>
    </div>
    <div id="joinForm" style="display: none;">
      <div class="field">
        <label>Your Name</label>
        <input type="text" id="joinName" placeholder="e.g. Sam" maxlength="24" autocomplete="off">
      </div>
      <div class="field">
        <label>Room Code</label>
        <input type="text" id="joinCode" placeholder="e.g. AB12CD" maxlength="6" style="text-transform: uppercase;" autocomplete="off">
      </div>
      <button class="btn" id="joinRoomBtn">🔗 Join Room</button>
    </div>
    <div class="err" id="lobbyError"></div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <span class="app-logo">🎬 Sync Party</span>
      <div class="room-info">
        <span>Room: <strong class="room-code-text" id="roomCode">------</strong></span>
        <button class="copy-btn" id="copyRoomCode">📋</button>
      </div>
      <span class="host-badge" id="hostBadge" style="display: none;">HOST</span>
      <div class="sync-status">
        <div class="sync-dot" id="syncDot"></div>
        <span id="syncText">Synced</span>
      </div>
    </div>
    <span class="member-count" id="memberCount">0/20 members</span>
  </div>
  
  <div class="main">
    <div class="video-panel">
      <div class="url-bar" id="hostControls">
        <input type="text" id="videoUrl" placeholder="Paste YouTube URL (e.g., https://youtube.com/watch?v=...)" autocomplete="off">
        <button id="loadVideoBtn">🎬 Load Video</button>
      </div>
      <div class="url-bar" id="guestControls" style="display: none;">
        <span style="color: var(--muted);">⏳ Waiting for host to load a video...</span>
      </div>
      
      <div class="player-container" id="playerContainer">
        <div class="player-wrapper">
          <div id="youtube-player"></div>
        </div>
        <div class="placeholder" id="placeholder">
          <div style="font-size: 56px; margin-bottom: 16px;">🎬</div>
          <p style="font-size: 16px; font-weight: 600;">No video loaded</p>
          <p style="font-size: 12px; margin-top: 8px; opacity: 0.7;">Host: Paste a YouTube URL and click Load</p>
        </div>
      </div>
      
      <div class="controls">
        <button class="control-btn" id="playPauseBtn" disabled>▶</button>
        <input type="range" class="seek-bar" id="seekBar" min="0" max="100" value="0" step="0.1" disabled>
        <span class="time" id="timeDisplay">0:00 / 0:00</span>
        <div style="display: flex; align-items: center; gap: 8px;">
          <span>🔊</span>
          <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80">
        </div>
        <button class="fullscreen-btn" id="fullscreenBtn" title="Fullscreen">⛶</button>
      </div>
    </div>
    
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="section-title">💬 Chat & Members</div>
        <button class="close-sidebar-btn" id="closeSidebarBtn">✕</button>
      </div>
      <div class="members-section">
        <div class="section-title">👥 Members</div>
        <div class="member-list" id="membersList"></div>
      </div>
      <div class="chat-section">
        <div class="section-title" style="padding: 0 16px;">💬 Chat</div>
        <div class="messages" id="messages"></div>
        <div class="chat-input">
          <input type="text" id="chatMessage" placeholder="Say something..." maxlength="300" autocomplete="off">
          <button id="sendBtn">➤</button>
        </div>
      </div>
    </div>
  </div>
</div>

<button class="chat-toggle" id="chatToggleBtn" style="display: none;">💬</button>
<div id="toast"></div>

<script>
// Global variables
let socket;
let myId;
let myName;
let roomId;
let isHost = false;
let player = null;
let playerReady = false;
let isSeeking = false;
let currentVideoId = null;
let syncInterval;
let lastSyncTime = 0;
let pendingRequestId = null;

const SYNC_THRESHOLD = 0.8; // seconds

// Helper functions
function showToast(msg, duration = 2500) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), duration);
}

function showError(msg) {
  document.getElementById('lobbyError').textContent = msg;
}

function formatTime(seconds) {
  if (isNaN(seconds) || !isFinite(seconds)) return '0:00';
  const mins = Math.floor(seconds / 60);
  const secs = Math.floor(seconds % 60);
  return `${mins}:${secs.toString().padStart(2, '0')}`;
}

function extractYouTubeId(url) {
  if (!url) return null;
  const patterns = [
    /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|m\.youtube\.com\/watch\?v=)([^&?#]+)/,
    /youtube\.com\/shorts\/([^?&]+)/
  ];
  for (const pattern of patterns) {
    const match = url.match(pattern);
    if (match) return match[1];
  }
  return null;
}

// Create YouTube player
function createPlayer(videoId, startTime = 0, autoPlay = false) {
  const placeholder = document.getElementById('placeholder');
  placeholder.style.display = 'none';
  
  if (player) {
    try { player.destroy(); } catch(e) {}
    player = null;
    playerReady = false;
  }
  
  player = new YT.Player('youtube-player', {
    height: '100%',
    width: '100%',
    videoId: videoId,
    playerVars: {
      controls: 0,
      disablekb: 1,
      modestbranding: 1,
      rel: 0,
      origin: window.location.origin,
      autoplay: autoPlay ? 1 : 0,
      start: Math.floor(startTime)
    },
    events: {
      onReady: (event) => {
        playerReady = true;
        const volume = parseInt(document.getElementById('volumeSlider').value);
        event.target.setVolume(volume);
        
        if (startTime > 0 && !autoPlay) {
          event.target.seekTo(startTime, true);
          event.target.pauseVideo();
        }
        
        showToast('✅ Player ready!');
        document.getElementById('syncText').textContent = 'Synced';
        document.getElementById('syncDot').classList.remove('warning');
        
        // Start sync intervals
        if (isHost) {
          startHostSync();
        } else {
          startGuestSync();
        }
      },
      onStateChange: (event) => {
        const playBtn = document.getElementById('playPauseBtn');
        const state = event.data;
        
        if (state === YT.PlayerState.PLAYING) {
          playBtn.textContent = '⏸';
          document.getElementById('syncText').textContent = 'Playing';
        } else if (state === YT.PlayerState.PAUSED) {
          playBtn.textContent = '▶';
          document.getElementById('syncText').textContent = 'Paused';
        } else if (state === YT.PlayerState.BUFFERING) {
          document.getElementById('syncText').textContent = 'Buffering...';
        } else if (state === YT.PlayerState.ENDED) {
          playBtn.textContent = '▶';
          document.getElementById('syncText').textContent = 'Ended';
        }
        
        // Host sends state changes to all clients
        if (isHost && playerReady && !isSeeking) {
          const currentTime = player.getCurrentTime();
          if (state === YT.PlayerState.PLAYING) {
            socket.emit('play_video', { currentTime, requestId: Date.now() });
          } else if (state === YT.PlayerState.PAUSED) {
            socket.emit('pause_video', { currentTime, requestId: Date.now() });
          }
        }
      },
      onError: (event) => {
        console.error('YouTube error:', event.data);
        let errorMsg = 'Failed to load video. ';
        if (event.data === 2) errorMsg += 'Invalid video ID.';
        else if (event.data === 5) errorMsg += 'HTML5 player error.';
        else if (event.data === 100) errorMsg += 'Video not found.';
        else if (event.data === 101 || event.data === 150) errorMsg += 'Video cannot be embedded.';
        else errorMsg += 'Try another video.';
        showToast('❌ ' + errorMsg);
        document.getElementById('placeholder').style.display = 'flex';
        playerReady = false;
      }
    }
  });
}

function startHostSync() {
  if (syncInterval) clearInterval(syncInterval);
  
  // Host sends heartbeat every 2 seconds
  syncInterval = setInterval(() => {
    if (player && playerReady && !isSeeking) {
      const currentTime = player.getCurrentTime();
      socket.emit('sync_request', { currentTime });
    }
  }, 2000);
}

function startGuestSync() {
  if (syncInterval) clearInterval(syncInterval);
  
  // Guests request sync every 2 seconds
  syncInterval = setInterval(() => {
    if (player && playerReady) {
      socket.emit('sync_request', { currentTime: player.getCurrentTime() });
    }
  }, 2000);
}

// Apply video state from server
function applyVideoState(state) {
  if (!player || !playerReady) return;
  
  try {
    const currentTime = player.getCurrentTime();
    const targetTime = state.currentTime;
    const diff = Math.abs(currentTime - targetTime);
    
    // Seek if difference is significant
    if (diff > SYNC_THRESHOLD) {
      player.seekTo(targetTime, true);
      showToast(`🔧 Syncing... (${diff.toFixed(1)}s diff)`, 1000);
      document.getElementById('syncDot').classList.add('warning');
      setTimeout(() => document.getElementById('syncDot').classList.remove('warning'), 1000);
    }
    
    // Handle play/pause
    if (state.isPlaying && player.getPlayerState() !== 1) {
      player.playVideo();
    } else if (!state.isPlaying && player.getPlayerState() === 1) {
      player.pauseVideo();
    }
    
    lastSyncTime = Date.now();
  } catch(e) {
    console.warn('Sync error:', e);
  }
}

// Socket event handlers
function initSocket(name, callback) {
  socket = io({ 
    transports: ['websocket', 'polling'],
    reconnection: true,
    reconnectionAttempts: 5,
    reconnectionDelay: 1000
  });
  
  socket.on('connect', () => {
    myId = socket.id;
    myName = name;
    callback();
  });
  
  socket.on('connect_error', () => showError('Cannot connect to server'));
  socket.on('disconnect', () => showToast('⚠️ Disconnected - reconnecting...'));
  socket.on('reconnect', () => {
    showToast('✅ Reconnected!');
    if (roomId) {
      socket.emit('join_room', { roomId, name: myName });
    }
  });
  
  socket.on('room_update', (info) => updateRoomUI(info));
  
  socket.on('you_are_host', () => {
    isHost = true;
    updateUI();
    showToast('👑 You are now the host!');
    if (player && playerReady) {
      startHostSync();
    }
  });
  
  socket.on('host_changed', () => {
    isHost = false;
    updateUI();
    showToast('Host left - you are now a viewer');
    if (player && playerReady) {
      startGuestSync();
    }
  });
  
  socket.on('video_loaded', ({ videoId, currentTime, isPlaying }) => {
    if (videoId && currentVideoId !== videoId) {
      currentVideoId = videoId;
      createPlayer(videoId, currentTime, isPlaying);
    }
  });
  
  socket.on('video_state', ({ videoId, currentTime, isPlaying }) => {
    if (videoId && currentVideoId !== videoId) {
      currentVideoId = videoId;
      createPlayer(videoId, currentTime, isPlaying);
    } else if (player && playerReady) {
      applyVideoState({ currentTime, isPlaying });
    }
  });
  
  socket.on('video_play', ({ currentTime }) => {
    if (!isHost && player && playerReady) {
      const diff = Math.abs(player.getCurrentTime() - currentTime);
      if (diff > SYNC_THRESHOLD) {
        player.seekTo(currentTime, true);
      }
      setTimeout(() => {
        if (player && playerReady && player.getPlayerState() !== 1) {
          player.playVideo();
        }
      }, 50);
    }
  });
  
  socket.on('video_pause', ({ currentTime }) => {
    if (!isHost && player && playerReady) {
      const diff = Math.abs(player.getCurrentTime() - currentTime);
      if (diff > SYNC_THRESHOLD) {
        player.seekTo(currentTime, true);
      }
      setTimeout(() => {
        if (player && playerReady && player.getPlayerState() === 1) {
          player.pauseVideo();
        }
      }, 50);
    }
  });
  
  socket.on('video_seek', ({ currentTime }) => {
    if (!isHost && player && playerReady) {
      player.seekTo(currentTime, true);
    }
  });
  
  socket.on('sync_response', ({ videoId, isPlaying, currentTime }) => {
    if (!isHost && player && playerReady && videoId === currentVideoId) {
      applyVideoState({ currentTime, isPlaying });
    }
  });
  
  socket.on('chat_message', (msg) => addChatMessage(msg));
}

function updateUI() {
  const hostControls = document.getElementById('hostControls');
  const guestControls = document.getElementById('guestControls');
  const hostBadge = document.getElementById('hostBadge');
  const playPauseBtn = document.getElementById('playPauseBtn');
  const seekBar = document.getElementById('seekBar');
  
  if (isHost) {
    hostControls.style.display = 'flex';
    guestControls.style.display = 'none';
    hostBadge.style.display = 'inline-block';
    playPauseBtn.disabled = false;
    seekBar.disabled = false;
  } else {
    hostControls.style.display = 'none';
    guestControls.style.display = 'flex';
    hostBadge.style.display = 'none';
    playPauseBtn.disabled = true;
    seekBar.disabled = true;
  }
}

function updateRoomUI(info) {
  document.getElementById('memberCount').textContent = `${info.members.length}/20 members`;
  const membersList = document.getElementById('membersList');
  membersList.innerHTML = '';
  
  info.members.forEach(m => {
    const div = document.createElement('div');
    div.className = 'member-item';
    
    const avatar = document.createElement('div');
    avatar.className = 'member-avatar';
    avatar.style.background = m.color + '33';
    avatar.style.color = m.color;
    avatar.textContent = m.name[0].toUpperCase();
    
    const nameSpan = document.createElement('span');
    nameSpan.className = 'member-name';
    nameSpan.textContent = m.name;
    
    div.appendChild(avatar);
    div.appendChild(nameSpan);
    
    if (m.id === info.host) {
      const tag = document.createElement('span');
      tag.className = 'host-tag';
      tag.textContent = 'HOST';
      div.appendChild(tag);
    }
    
    membersList.appendChild(div);
  });
}

function addChatMessage(msg) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message';
  
  if (msg.system) {
    div.classList.add('system');
    const sysText = document.createElement('div');
    sysText.className = 'system-text';
    sysText.textContent = msg.text;
    div.appendChild(sysText);
  } else {
    const mine = msg.senderId === myId;
    if (mine) div.classList.add('mine');
    
    const header = document.createElement('div');
    header.className = 'message-header';
    const name = document.createElement('span');
    name.className = 'message-name';
    name.style.color = msg.color;
    name.textContent = mine ? 'You' : msg.name;
    const time = document.createElement('span');
    time.className = 'message-time';
    time.textContent = new Date(msg.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    header.appendChild(name);
    header.appendChild(time);
    
    const bubble = document.createElement('div');
    bubble.className = 'message-bubble';
    bubble.textContent = msg.text;
    
    div.appendChild(header);
    div.appendChild(bubble);
  }
  
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

// Room actions
function createRoom() {
  const name = document.getElementById('createName').value.trim();
  if (!name) {
    showError('Enter your name');
    return;
  }
  
  initSocket(name, () => {
    socket.emit('create_room', { name }, (res) => {
      if (!res.ok) {
        showError(res.error);
        return;
      }
      isHost = true;
      roomId = res.roomId;
      enterApp(res.info);
    });
  });
}

function joinRoom() {
  const name = document.getElementById('joinName').value.trim();
  const code = document.getElementById('joinCode').value.trim().toUpperCase();
  
  if (!name) {
    showError('Enter your name');
    return;
  }
  if (!code) {
    showError('Enter room code');
    return;
  }
  
  initSocket(name, () => {
    socket.emit('join_room', { roomId: code, name }, (res) => {
      if (!res.ok) {
        showError(res.error);
        return;
      }
      isHost = false;
      roomId = res.roomId;
      enterApp(res.info);
    });
  });
}

function enterApp(info) {
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('app').classList.add('active');
  document.getElementById('roomCode').textContent = roomId;
  updateRoomUI(info);
  updateUI();
  
  // Mobile chat setup
  const sidebar = document.getElementById('sidebar');
  const chatToggle = document.getElementById('chatToggleBtn');
  const closeSidebar = document.getElementById('closeSidebarBtn');
  
  if (window.innerWidth <= 768) {
    chatToggle.style.display = 'flex';
    
    chatToggle.onclick = (e) => {
      e.stopPropagation();
      sidebar.classList.add('open');
    };
    
    closeSidebar.onclick = () => {
      sidebar.classList.remove('open');
    };
  }
  
  if (info.videoId) {
    currentVideoId = info.videoId;
    createPlayer(info.videoId, info.currentTime, info.isPlaying);
  }
}

// Load video (host only)
function loadVideo() {
  if (!isHost) return;
  
  const url = document.getElementById('videoUrl').value.trim();
  if (!url) {
    showToast('Please enter a YouTube URL');
    return;
  }
  
  const videoId = extractYouTubeId(url);
  if (!videoId) {
    showToast('❌ Invalid YouTube URL');
    return;
  }
  
  showToast('📡 Loading video...');
  socket.emit('load_video', { videoId }, (res) => {
    if (res.success) {
      showToast('✅ Video loaded for everyone!');
      currentVideoId = videoId;
      createPlayer(videoId, 0, false);
    } else {
      showToast('❌ Failed to load video');
    }
  });
}

// Video controls (host only)
function togglePlayPause() {
  if (!isHost || !player || !playerReady) return;
  
  const state = player.getPlayerState();
  if (state === 1) {
    const currentTime = player.getCurrentTime();
    player.pauseVideo();
    socket.emit('pause_video', { currentTime, requestId: Date.now() });
  } else {
    const currentTime = player.getCurrentTime();
    player.playVideo();
    socket.emit('play_video', { currentTime, requestId: Date.now() });
  }
}

function onSeekInput() {
  if (!isHost || !player || !playerReady) return;
  isSeeking = true;
}

function onSeekChange(e) {
  if (!isHost || !player || !playerReady) return;
  const percent = parseFloat(e.target.value);
  const duration = player.getDuration();
  const time = (percent / 100) * duration;
  player.seekTo(time, true);
  socket.emit('seek_video', { currentTime: time, requestId: Date.now() });
  setTimeout(() => { isSeeking = false; }, 100);
}

function updatePlayerUI() {
  if (!player || !playerReady) return;
  
  try {
    const currentTime = player.getCurrentTime();
    const duration = player.getDuration();
    
    if (duration && !isSeeking) {
      const percent = (currentTime / duration) * 100;
      document.getElementById('seekBar').value = percent;
      document.getElementById('timeDisplay').textContent = `${formatTime(currentTime)} / ${formatTime(duration)}`;
    }
  } catch(e) {}
}

function toggleFullscreen() {
  const container = document.getElementById('playerContainer');
  if (!document.fullscreenElement) {
    container.requestFullscreen().catch(err => {
      showToast(`Fullscreen error: ${err.message}`);
    });
  } else {
    document.exitFullscreen();
  }
}

// Event listeners
document.getElementById('tabCreate').addEventListener('click', () => {
  document.getElementById('createForm').style.display = 'block';
  document.getElementById('joinForm').style.display = 'none';
  document.getElementById('tabCreate').classList.add('active');
  document.getElementById('tabJoin').classList.remove('active');
  document.getElementById('lobbyError').textContent = '';
});

document.getElementById('tabJoin').addEventListener('click', () => {
  document.getElementById('createForm').style.display = 'none';
  document.getElementById('joinForm').style.display = 'block';
  document.getElementById('tabJoin').classList.add('active');
  document.getElementById('tabCreate').classList.remove('active');
  document.getElementById('lobbyError').textContent = '';
});

document.getElementById('createRoomBtn').addEventListener('click', createRoom);
document.getElementById('joinRoomBtn').addEventListener('click', joinRoom);
document.getElementById('copyRoomCode').addEventListener('click', () => {
  if (roomId) {
    navigator.clipboard.writeText(roomId);
    showToast('Room code copied!');
  }
});

document.getElementById('loadVideoBtn').addEventListener('click', loadVideo);
document.getElementById('videoUrl').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') loadVideo();
});

document.getElementById('playPauseBtn').addEventListener('click', togglePlayPause);
document.getElementById('seekBar').addEventListener('input', onSeekInput);
document.getElementById('seekBar').addEventListener('change', onSeekChange);

document.getElementById('volumeSlider').addEventListener('input', (e) => {
  const volume = parseInt(e.target.value);
  if (player && playerReady) {
    player.setVolume(volume);
  }
  localStorage.setItem('volume', volume);
});

document.getElementById('fullscreenBtn').addEventListener('click', toggleFullscreen);

// Chat
document.getElementById('sendBtn').addEventListener('click', () => {
  const input = document.getElementById('chatMessage');
  const text = input.value.trim();
  if (!text) return;
  socket.emit('chat_send', { text });
  input.value = '';
});

document.getElementById('chatMessage').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    document.getElementById('sendBtn').click();
  }
});

// Window resize handler
window.addEventListener('resize', () => {
  const sidebar = document.getElementById('sidebar');
  const chatToggle = document.getElementById('chatToggleBtn');
  if (window.innerWidth <= 768) {
    chatToggle.style.display = 'flex';
    sidebar.classList.remove('open');
  } else {
    chatToggle.style.display = 'none';
    sidebar.classList.remove('open');
  }
});

// UI update loop
setInterval(updatePlayerUI, 300);

// Load saved volume
const savedVolume = localStorage.getItem('volume');
if (savedVolume) {
  document.getElementById('volumeSlider').value = savedVolume;
}
</script>
</body>
</html>
